
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 게시판 - 정보 클래스룸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Pretendard', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .card { background:#fff; border-radius:1.5rem; border:1px solid #f1f5f9; box-shadow:0 1px 3px rgba(0,0,0,.06); }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" style="background-image:radial-gradient(#e2e8f0 1px,transparent 1px);background-size:32px 32px;">

    <!-- 접근 차단 오버레이 -->
    <div id="access-denied" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 bg-rose-100 text-rose-500 rounded-3xl flex items-center justify-center mb-6">
            <i data-lucide="shield-off" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-900 mb-2">접근 권한 없음</h2>
        <p class="text-slate-500 font-medium mb-8">관리자만 접근할 수 있는 페이지입니다.</p>
        <a href="index.html" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors">메인으로 돌아가기</a>
    </div>

    <!-- 네비게이션 -->
    <nav class="fixed w-full top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
        <div class="max-w-[1400px] mx-auto px-6">
            <div class="flex justify-between items-center h-16 lg:h-20">
                
                <!-- 좌측 타이틀 영역 -->
                <div class="flex items-center space-x-4 shrink-0">
                    <a href="index.html" class="text-slate-400 hover:text-slate-700 transition-colors p-2 rounded-lg hover:bg-slate-100">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-500 to-orange-500 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/30">
                            <i data-lucide="shield" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <span class="font-black text-base text-slate-900">관리자 설정</span>
                            <span class="ml-1.5 text-[10px] bg-amber-100 text-amber-600 font-bold px-1.5 py-0.5 rounded-full relative -top-0.5">Admin</span>
                        </div>
                    </div>
                </div>

                <!-- 우측 메뉴 영역 -->
                <div class="flex items-center">
                    
                    <div class="hidden lg:flex items-center space-x-6 xl:space-x-8 text-[15px] font-bold text-slate-600">
                        <a href="learning_admin.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">학습 현황</a>
                        <a href="notices_admin.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">공지사항</a>
                        <a href="materials_admin.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">학습자료</a>
                        <a href="st_gallery_admin.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">학생 작품</a>
                        <a href="gallery_admin.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">갤러리</a>
                        <a href="assignments.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">수행평가</a>
                        <a href="members.html" class="hover:text-blue-600 border-b-2 border-transparent hover:border-blue-600 py-1 transition-all duration-200">가입 학생</a>
                        
                        <!-- 활성화된 현재 메뉴 표기 (파란색 고정) -->
                        <a href="my_board.html" class="text-blue-600 border-b-2 border-blue-600 py-1 transition-all duration-200">내 게시판</a>
                    </div>

                    <div class="hidden md:flex items-center space-x-5 ml-6 pl-6 border-l border-slate-200 h-8">
                        <div class="flex items-center space-x-1.5">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                            <span id="admin-name" class="text-sm font-bold text-slate-700"></span>
                        </div>
                        <button onclick="handleSignOut()" class="text-sm font-bold text-slate-400 hover:text-rose-500 transition-colors">
                            로그아웃
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-4xl mx-auto px-6 pt-28 pb-24 fade-in">
        
        <!-- 타이틀 및 글쓰기 버튼 -->
        <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 mb-2">내 게시판</h1>
                <p class="text-slate-500 font-medium">자유롭게 기록을 남기고 관리할 수 있는 게시판입니다.</p>
            </div>
            <button onclick="openPostModal('create')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold flex items-center justify-center space-x-2 transition-all hover:shadow-lg hover:-translate-y-0.5">
                <i data-lucide="pen-square" class="w-5 h-5"></i>
                <span>새 글 작성</span>
            </button>
        </div>

        <!-- 게시글 목록 렌더링 영역 -->
        <div id="board-list" class="space-y-5">
            <!-- 로딩 상태 -->
            <div class="py-16 flex flex-col items-center justify-center space-y-3">
                <i data-lucide="loader" class="w-8 h-8 text-blue-500 animate-spin"></i>
                <span class="text-slate-500 font-medium">게시글을 불러오는 중입니다...</span>
            </div>
        </div>
    </main>

    <!-- 글쓰기 / 수정 통합 모달 -->
    <div id="post-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4"
        onclick="if(event.target===this) closePostModal()">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl transform transition-all duration-300 scale-95 opacity-0" id="post-modal-content">
            
            <div class="flex items-center justify-between px-8 py-6 border-b border-slate-100">
                <h3 class="text-xl font-black text-slate-900 flex items-center space-x-2" id="post-modal-title">
                    <i data-lucide="edit-3" class="w-6 h-6 text-blue-600"></i>
                    <span>게시글 작성</span>
                </h3>
                <button onclick="closePostModal()" class="text-slate-400 hover:text-slate-600 p-2 rounded-xl hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="px-8 py-6 space-y-5">
                <input type="hidden" id="post-mode" value="create">
                <input type="hidden" id="post-id" value="">
                
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">제목</label>
                    <input type="text" id="post-title" placeholder="게시글 제목을 입력하세요."
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">내용</label>
                    <textarea id="post-content" rows="8" placeholder="게시글 내용을 입력하세요."
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all resize-none"></textarea>
                </div>
            </div>

            <div class="px-8 pb-8 flex space-x-3">
                <button onclick="closePostModal()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-colors">취소</button>
                <button onclick="savePost()" id="post-save-btn"
                    class="flex-[2] bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-2xl hover:shadow-lg transition-all flex items-center justify-center space-x-2">
                    <i data-lucide="save" class="w-5 h-5"></i><span id="post-btn-text">등록하기</span>
                </button>
            </div>

        </div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900/95 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-32 opacity-0 z-50 flex items-center space-x-3 border border-slate-700">
        <div class="p-1.5 rounded-full" id="toast-icon-wrapper">
            <i data-lucide="check" class="w-4 h-4 text-emerald-400" id="toast-icon"></i>
        </div>
        <span class="font-medium text-sm" id="toast-msg"></span>
    </div>

    <script>
        // ==========================================
        // Firebase 초기화 및 설정 (기존과 동일)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM",
            authDomain: "book-c2d05.firebaseapp.com",
            databaseURL: "https://book-c2d05-default-rtdb.firebaseio.com",
            projectId: "book-c2d05",
            storageBucket: "book-c2d05.firebasestorage.app",
            messagingSenderId: "566939045493",
            appId: "1:566939045493:web:da65c6ad61f528d446f23c"
        };

        const ADMIN_EMAILS = ['sungce27@gmail.com'];

        const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);
        const db   = firebase.firestore(app);

        let currentUser = null;
        let boardPosts = [];

        // 인증 상태 확인
        auth.onAuthStateChanged((user) => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('access-denied').classList.remove('hidden');
                lucide.createIcons();
                return;
            }
            currentUser = user;
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('admin-name').textContent = name;
            lucide.createIcons();
            
            // 게시글 불러오기 실행
            loadBoardPosts();
        });

        async function handleSignOut() {
            await auth.signOut();
            window.location.href = 'index.html';
        }

        // ==========================================
        // 게시판 데이터 로드 및 렌더링
        // ==========================================
        async function loadBoardPosts() {
            const listContainer = document.getElementById('board-list');
            
            try {
                // 작성일 기준 내림차순(최신순) 정렬
                const snapshot = await db.collection('my_board')
                    .orderBy('createdAt', 'desc').get();

                boardPosts = snapshot.docs.map(doc => {
                    const data = doc.data();
                    let dateStr = '';
                    if(data.createdAt) {
                        const d = data.createdAt.toDate();
                        dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    }
                    return { id: doc.id, title: data.title, content: data.content, date: dateStr };
                });

                renderPosts();
            } catch (error) {
                console.error("데이터 로딩 에러:", error);
                listContainer.innerHTML = `
                    <div class="py-16 flex flex-col items-center text-rose-500">
                        <i data-lucide="alert-circle" class="w-8 h-8 mb-2"></i>
                        <span class="font-medium">데이터를 불러오는 중 오류가 발생했습니다.</span>
                    </div>`;
                lucide.createIcons();
            }
        }

        function renderPosts() {
            const listContainer = document.getElementById('board-list');

            if (boardPosts.length === 0) {
                listContainer.innerHTML = `
                    <div class="card py-20 flex flex-col items-center justify-center text-slate-400 border-dashed border-2 bg-slate-50/50">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="inbox" class="w-8 h-8 text-slate-300"></i>
                        </div>
                        <p class="text-lg font-bold text-slate-600 mb-1">등록된 게시글이 없습니다.</p>
                        <p class="text-sm">우측 상단의 '새 글 작성' 버튼을 눌러 첫 글을 남겨보세요!</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            listContainer.innerHTML = boardPosts.map(post => `
                <div class="card p-6 md:p-8 hover:shadow-md transition-shadow group relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <div class="pr-12">
                            <h2 class="text-xl font-black text-slate-900 mb-2">${escapeHtml(post.title)}</h2>
                            <p class="text-xs font-medium text-slate-400 flex items-center space-x-1.5">
                                <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                                <span>${post.date}</span>
                            </p>
                        </div>
                        
                        <!-- 관리 버튼 (수정/삭제) -->
                        <div class="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity absolute top-6 right-6">
                            <button onclick="openPostModal('edit', '${post.id}')" class="p-2.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors" title="수정">
                                <i data-lucide="pencil" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deletePost('${post.id}')" class="p-2.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors" title="삭제">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="text-slate-600 font-medium leading-relaxed whitespace-pre-wrap text-[15px] bg-slate-50 p-4 rounded-xl border border-slate-100">${escapeHtml(post.content)}</div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        // ==========================================
        // 모달 관리 (작성 / 수정)
        // ==========================================
        function openPostModal(mode, id = null) {
            const modal = document.getElementById('post-modal');
            const modalContent = document.getElementById('post-modal-content');
            
            document.getElementById('post-mode').value = mode;
            
            if (mode === 'create') {
                document.getElementById('post-modal-title').innerHTML = '<i data-lucide="edit-3" class="w-6 h-6 text-blue-600"></i><span>게시글 작성</span>';
                document.getElementById('post-btn-text').textContent = '등록하기';
                document.getElementById('post-title').value = '';
                document.getElementById('post-content').value = '';
                document.getElementById('post-id').value = '';
            } else if (mode === 'edit') {
                const post = boardPosts.find(p => p.id === id);
                if(!post) return;
                
                document.getElementById('post-modal-title').innerHTML = '<i data-lucide="pencil" class="w-6 h-6 text-indigo-600"></i><span>게시글 수정</span>';
                document.getElementById('post-btn-text').textContent = '수정하기';
                document.getElementById('post-title').value = post.title;
                document.getElementById('post-content').value = post.content;
                document.getElementById('post-id').value = post.id;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
            
            // 애니메이션 효과
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closePostModal() {
            const modal = document.getElementById('post-modal');
            const modalContent = document.getElementById('post-modal-content');
            
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300); // 트랜지션 시간 대기
        }

        // ==========================================
        // 데이터베이스 저장 / 수정 / 삭제 로직
        // ==========================================
        async function savePost() {
            const mode = document.getElementById('post-mode').value;
            const id = document.getElementById('post-id').value;
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();

            if (!title || !content) {
                showToast('제목과 내용을 모두 입력해주세요.', 'error');
                return;
            }

            const btn = document.getElementById('post-save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i><span>처리 중...</span>';
            lucide.createIcons();

            try {
                if (mode === 'create') {
                    await db.collection('my_board').add({
                        title: title,
                        content: content,
                        author: currentUser.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showToast('게시글이 성공적으로 등록되었습니다! ✅');
                } else if (mode === 'edit' && id) {
                    await db.collection('my_board').doc(id).update({
                        title: title,
                        content: content
                    });
                    showToast('게시글이 수정되었습니다! 📝');
                }
                
                closePostModal();
                loadBoardPosts(); // 목록 새로고침
            } catch (error) {
                console.error("저장 오류:", error);
                showToast('오류가 발생했습니다: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i><span>${mode === 'create' ? '등록하기' : '수정하기'}</span>`;
                lucide.createIcons();
            }
        }

        async function deletePost(id) {
            if (!confirm('정말로 이 게시글을 삭제하시겠습니까? 삭제 후 복구할 수 없습니다.')) return;
            
            try {
                await db.collection('my_board').doc(id).delete();
                showToast('게시글이 삭제되었습니다. 🗑️');
                loadBoardPosts(); // 목록 새로고침
            } catch (error) {
                console.error("삭제 오류:", error);
                showToast('삭제 중 오류가 발생했습니다.', 'error');
            }
        }

        // ==========================================
        // 유틸리티 함수
        // ==========================================
        
        // HTML 이스케이프 (XSS 방지)
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast   = document.getElementById('toast');
            const wrapper = document.getElementById('toast-icon-wrapper');
            const icon    = document.getElementById('toast-icon');
            const msg     = document.getElementById('toast-msg');
            msg.textContent = message;
            
            if (type === 'error') {
                wrapper.className = 'p-1.5 rounded-full bg-rose-500/20';
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.className = 'w-4 h-4 text-rose-400';
            } else {
                wrapper.className = 'p-1.5 rounded-full bg-blue-500/20';
                icon.setAttribute('data-lucide', 'check');
                icon.className = 'w-4 h-4 text-blue-400';
            }
            
            lucide.createIcons();
            clearTimeout(toastTimeout);
            toast.classList.remove('translate-y-32', 'opacity-0');
            toastTimeout = setTimeout(() => toast.classList.add('translate-y-32', 'opacity-0'), 3000);
        }

        // 초기 아이콘 렌더링
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
