<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>질문있어요 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f8fafc; }
  .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
</style>
</head>
<body class="min-h-screen">

  <main class="max-w-7xl mx-auto px-6 pt-8 pb-16">
     <!-- 1. 네이티브 콘텐츠 영역 -->
        
    <div class="mb-8">
      <div class="inline-flex items-center space-x-2 bg-violet-50 text-violet-700 px-3 py-1.5 rounded-full text-xs font-bold mb-4 border border-violet-100">
        <i data-lucide="help-circle" class="w-3.5 h-3.5"></i><span>질문 & 답변</span>
      </div>
      <h1 class="text-4xl font-black text-slate-900 mb-3">질문있어요 <span class="text-violet-500">✋</span></h1>
      <p class="text-lg text-slate-500 font-medium">궁금한 점을 자유롭게 질문해보세요. 선생님이 답변해드립니다.</p>
    </div>

    <!-- 질문 작성 -->
    <div class="card p-7 mb-8">
      <h2 class="text-base font-black text-slate-800 mb-5 flex items-center space-x-2">
        <i data-lucide="pencil" class="w-5 h-5 text-violet-500"></i><span>질문 작성</span>
      </h2>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">제목</label>
          <input type="text" id="q-title" placeholder="질문 제목을 입력하세요"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all">
        </div>
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">카테고리</label>
          <div class="flex flex-wrap gap-2" id="categories">
            <button onclick="selectCat(this,'수업 내용')" class="cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-violet-200 bg-violet-50 text-violet-600 transition-colors">수업 내용</button>
            <button onclick="selectCat(this,'과제')" class="cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-slate-200 text-slate-500 hover:border-violet-200 transition-colors">과제</button>
            <button onclick="selectCat(this,'코딩')" class="cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-slate-200 text-slate-500 hover:border-violet-200 transition-colors">코딩</button>
            <button onclick="selectCat(this,'데이터')" class="cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-slate-200 text-slate-500 hover:border-violet-200 transition-colors">데이터</button>
            <button onclick="selectCat(this,'AI')" class="cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-slate-200 text-slate-500 hover:border-violet-200 transition-colors">AI</button>
            <button onclick="selectCat(this,'기타')" class="cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-slate-200 text-slate-500 hover:border-violet-200 transition-colors">기타</button>
          </div>
        </div>
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">내용</label>
          <textarea id="q-content" rows="5" placeholder="질문 내용을 자세히 작성해주세요."
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all resize-none"></textarea>
        </div>
        <button onclick="submitQuestion()"
          class="w-full bg-gradient-to-r from-violet-500 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-lg transition-all flex items-center justify-center space-x-2">
          <i data-lucide="send" class="w-4 h-4"></i><span>질문 등록하기</span>
        </button>
      </div>
    </div>

    <!-- 질문 목록 -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-black text-slate-800">등록된 질문</h2>
      <button onclick="loadQuestions()" class="text-xs font-bold text-slate-400 hover:text-slate-600 flex items-center space-x-1">
        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i><span>새로고침</span>
      </button>
    </div>
    <div id="questions-list">
      <div class="card p-8 text-center text-slate-400 text-sm font-medium">불러오는 중...</div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    let selectedCat = '수업 내용';

    const firebaseConfig = { apiKey:"AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM", authDomain:"book-c2d05.firebaseapp.com", projectId:"book-c2d05", storageBucket:"book-c2d05.firebasestorage.app", messagingSenderId:"566939045493", appId:"1:566939045493:web:da65c6ad61f528d446f23c" };
    const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(app);
    const db   = firebase.firestore(app);

    function selectCat(btn, cat) {
      selectedCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => {
        const active = b === btn;
        b.className = active
          ? 'cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-violet-400 bg-violet-100 text-violet-700 transition-colors'
          : 'cat-btn text-xs font-bold px-3 py-1.5 rounded-xl border border-slate-200 text-slate-500 hover:border-violet-200 transition-colors';
      });
    }

    const MAIN_GS_URL = 'https://script.google.com/macros/s/AKfycbywcUQg705jicQUv-i7RiqAm5-FoogN3d2efXLrg9xGAkfP_OQw6jW3XnrGlsBSa-LN/exec';

    async function submitQuestion() {
      const title   = document.getElementById('q-title').value.trim();
      const content = document.getElementById('q-content').value.trim();
      if (!title || !content) { alert('제목과 내용을 입력해주세요.'); return; }
      const user = auth.currentUser;
      const userName  = user ? (user.displayName || user.email.split('@')[0]) : '익명';
      const studentId = user ? (localStorage.getItem('studentId_' + user.uid) || '') : '';
      try {
        // 1. Firestore 저장
        await db.collection('questions').add({
          title, content, category: selectedCat, userName, studentId,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          answered: false
        });
        // 2. Google Sheets 저장
        fetch(MAIN_GS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ type:'question', userName, studentId, category: selectedCat, title, content })
        }).catch(() => {});
        document.getElementById('q-title').value = '';
        document.getElementById('q-content').value = '';
        loadQuestions();
        alert('질문이 등록되었습니다! ✅');
      } catch(e) { alert('오류: ' + e.message); }
    }

    async function loadQuestions() {
      const list = document.getElementById('questions-list');
      const user = auth.currentUser;
      const isAdmin = user && user.email === 'sungce27@gmail.com';
      try {
        const snap = await db.collection('questions').orderBy('createdAt','desc').limit(50).get();
        if (snap.empty) { list.innerHTML = '<div class="card p-8 text-center text-slate-400 text-sm font-medium">아직 등록된 질문이 없습니다.</div>'; return; }
        list.innerHTML = snap.docs.map(doc => {
          const d = doc.data();
          const id = doc.id;
          const isMine = user && (d.uid === user.uid || d.userName === (user.displayName || user.email.split('@')[0]));
          const canEdit = isMine || isAdmin;
          const catColors = { '수업 내용':'bg-violet-100 text-violet-700', '과제':'bg-blue-100 text-blue-700', '코딩':'bg-green-100 text-green-700', '데이터':'bg-orange-100 text-orange-700', 'AI':'bg-pink-100 text-pink-700', '기타':'bg-slate-100 text-slate-600' };
          const cc = catColors[d.category] || 'bg-slate-100 text-slate-600';
          const date = d.createdAt ? d.createdAt.toDate().toLocaleDateString('ko-KR') : '';
          const answerHtml = d.answer ? `
            <div class="mt-4 bg-emerald-50 border border-emerald-100 rounded-2xl p-4">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-black text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-full">✅ 선생님 답변</span>
                <span class="text-xs text-slate-400">${d.answeredAt ? new Date(d.answeredAt.seconds*1000).toLocaleDateString('ko-KR') : ''}</span>
              </div>
              <p class="text-sm text-slate-700 font-medium leading-relaxed whitespace-pre-wrap">${d.answer}</p>
            </div>` : '';
          return `<div class="card p-5 mb-3" id="q-card-${id}">
            <div class="flex items-start justify-between mb-2">
              <div class="flex items-center space-x-2 flex-wrap gap-1">
                <span class="text-xs font-black px-2 py-0.5 rounded-full ${cc}">${d.category||'기타'}</span>
                ${d.answered ? '<span class="text-xs font-black px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">✅ 답변완료</span>' : '<span class="text-xs font-black px-2 py-0.5 rounded-full bg-amber-100 text-amber-600">⏳ 답변대기</span>'}
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <span class="text-xs text-slate-400 font-medium">${date}</span>
                ${isAdmin ? `
                <button onclick="openAnswerModal('${id}','${(d.answer||'').replace(/'/g,"\\'").replace(/\n/g,'\\n')}')"
                  class="p-1.5 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors" title="답변">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </button>` : ''}
                ${canEdit ? `
                <button onclick="openEditQuestion('${id}','${(d.title||'').replace(/'/g,"\\'")}','${(d.content||'').replace(/'/g,"\\'").replace(/\n/g,'\\n')}','${d.category||'기타'}')"
                  class="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="수정">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button onclick="deleteQuestion('${id}')"
                  class="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="삭제">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                </button>` : ''}
              </div>
            </div>
            <h3 class="text-sm font-black text-slate-800 mb-1">${d.title}</h3>
            <p class="text-xs text-slate-500 font-medium leading-relaxed">${(d.content||'').replace(/\n/g,'<br>')}</p>
            <p class="text-xs text-slate-400 font-medium mt-2">— ${d.userName}${d.studentId?' ('+d.studentId+')':''}</p>
            ${answerHtml}
          </div>`;
        }).join('');
      } catch(e) { list.innerHTML = '<div class="card p-8 text-center text-slate-400 text-sm font-medium">불러오기 실패. 로그인 후 다시 시도해주세요.</div>'; }
    }

    // ── 답변 모달 ──────────────────────────────────────
    let answeringId = null;
    function openAnswerModal(id, existingAnswer) {
      answeringId = id;
      document.getElementById('answer-content').value = (existingAnswer||'').replace(/\\n/g,'\n');
      document.getElementById('answer-modal').classList.remove('hidden');
      document.getElementById('answer-modal').classList.add('flex');
    }
    function closeAnswerModal() {
      document.getElementById('answer-modal').classList.add('hidden');
      document.getElementById('answer-modal').classList.remove('flex');
      answeringId = null;
    }
    async function saveAnswer() {
      if (!answeringId) return;
      const answer = document.getElementById('answer-content').value.trim();
      if (!answer) { alert('답변 내용을 입력해주세요.'); return; }
      const btn = document.getElementById('answer-save-btn');
      btn.disabled = true; btn.textContent = '저장 중...';
      try {
        await db.collection('questions').doc(answeringId).update({
          answer, answered: true,
          answeredAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        closeAnswerModal();
        loadQuestions();
      } catch(e) { alert('답변 저장 오류: ' + e.message); }
      finally { btn.disabled = false; btn.textContent = '답변 등록'; }
    }

    // 수정
    let editingId = null;
    function openEditQuestion(id, title, content, category) {
      editingId = id;
      document.getElementById('edit-q-title').value = title;
      document.getElementById('edit-q-content').value = content.replace(/\\n/g,'\n');
      document.getElementById('edit-q-category').value = category;
      document.getElementById('edit-modal').classList.remove('hidden');
      document.getElementById('edit-modal').classList.add('flex');
    }
    function closeEditQuestion() {
      document.getElementById('edit-modal').classList.add('hidden');
      document.getElementById('edit-modal').classList.remove('flex');
      editingId = null;
    }
    async function saveEditQuestion() {
      if (!editingId) return;
      const title   = document.getElementById('edit-q-title').value.trim();
      const content = document.getElementById('edit-q-content').value.trim();
      const category = document.getElementById('edit-q-category').value;
      if (!title || !content) { alert('제목과 내용을 입력해주세요.'); return; }
      const btn = document.getElementById('edit-save-btn');
      btn.disabled = true; btn.textContent = '저장 중...';
      try {
        await db.collection('questions').doc(editingId).update({ title, content, category });
        closeEditQuestion();
        loadQuestions();
      } catch(e) { alert('수정 오류: ' + e.message); }
      finally { btn.disabled = false; btn.textContent = '저장'; }
    }

    // 삭제
    async function deleteQuestion(id) {
      if (!confirm('이 질문을 삭제할까요?')) return;
      try {
        await db.collection('questions').doc(id).delete();
        const card = document.getElementById('q-card-' + id);
        if (card) card.remove();
      } catch(e) { alert('삭제 오류: ' + e.message); }
    }

    loadQuestions();
  </script>
  <!-- 답변 모달 (관리자 전용) -->
  <div id="answer-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4"
    onclick="if(event.target===this) closeAnswerModal()">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg">
      <div class="flex items-center justify-between px-7 py-5 border-b border-slate-100">
        <h3 class="text-lg font-black text-slate-900 flex items-center space-x-2">
          <span class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-sm">💬</span>
          <span>선생님 답변</span>
        </h3>
        <button onclick="closeAnswerModal()" class="text-slate-400 hover:text-slate-600 p-2 rounded-xl hover:bg-slate-100 transition-colors">✕</button>
      </div>
      <div class="px-7 py-6">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">답변 내용</label>
        <textarea id="answer-content" rows="6"
          placeholder="학생의 질문에 대한 답변을 작성해주세요."
          class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all resize-none leading-relaxed"></textarea>
      </div>
      <div class="px-7 pb-7 flex space-x-3">
        <button onclick="closeAnswerModal()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3.5 rounded-2xl hover:bg-slate-200 transition-colors">취소</button>
        <button onclick="saveAnswer()" id="answer-save-btn"
          class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold py-3.5 rounded-2xl hover:shadow-lg transition-all flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          답변 등록
        </button>
      </div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div id="edit-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4"
    onclick="if(event.target===this) closeEditQuestion()">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg">
      <div class="flex items-center justify-between px-7 py-5 border-b border-slate-100">
        <h3 class="text-lg font-black text-slate-900 flex items-center space-x-2">
          <span class="w-8 h-8 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center text-sm">✏️</span>
          <span>질문 수정</span>
        </h3>
        <button onclick="closeEditQuestion()" class="text-slate-400 hover:text-slate-600 p-2 rounded-xl hover:bg-slate-100 transition-colors">✕</button>
      </div>
      <div class="px-7 py-6 space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">카테고리</label>
          <select id="edit-q-category" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500">
            <option>수업 내용</option><option>과제</option><option>코딩</option><option>데이터</option><option>AI</option><option>기타</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">제목</label>
          <input type="text" id="edit-q-title" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all">
        </div>
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1.5">내용</label>
          <textarea id="edit-q-content" rows="5" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all resize-none"></textarea>
        </div>
      </div>
      <div class="px-7 pb-7 flex space-x-3">
        <button onclick="closeEditQuestion()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3.5 rounded-2xl hover:bg-slate-200 transition-colors">취소</button>
        <button onclick="saveEditQuestion()" id="edit-save-btn"
          class="flex-1 bg-gradient-to-r from-violet-500 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-lg transition-all">저장</button>
      </div>
    </div>
  </div>

</body>
</html>
