                    </div>

                </div>

            <div class="flex items-center space-x-3">
                    <a href="st_gallery.html" target="_blank"
                        class="hidden sm:flex items-center space-x-2 text-slate-600 hover:text-orange-600 bg-slate-50 hover:bg-orange-50 border border-slate-200 hover:border-orange-200 px-3 py-2 rounded-xl text-sm font-bold transition-all">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                        <span>갤러리 보기</span>

                <div class="hidden sm:flex items-center space-x-2 bg-slate-100 px-4 py-2 rounded-xl">

    <main class="max-w-6xl mx-auto px-6 pt-28 pb-24 fade-in">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

            <!-- 작품 등록 폼 -->
            <div class="lg:col-span-2 card p-7">
                <h2 class="text-lg font-black text-slate-900 mb-5 flex items-center space-x-2">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-orange-500"></i><span>학생 작품 등록</span>
                </h2>
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">년도</label>
                        <input type="number" id="work-year" placeholder="예: 2026" value="2026"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">팀명</label>
                        <input type="text" id="work-team" placeholder="예: Team Alpha"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">작품명</label>
                        <input type="text" id="work-title" placeholder="작품 제목"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">설명</label>
                        <textarea id="work-desc" rows="3" placeholder="작품 설명"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all resize-none"></textarea>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">프로젝트 링크 (선택)</label>
                        <input type="url" id="work-link" placeholder="https://..."
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">썸네일 이미지 (선택)</label>
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-200 rounded-xl cursor-pointer hover:border-orange-400 hover:bg-orange-50 transition-all relative overflow-hidden" id="work-thumb-zone">
                            <img id="work-thumb-preview" class="absolute inset-0 w-full h-full object-cover rounded-xl hidden" alt="">
                            <div id="work-thumb-placeholder" class="flex flex-col items-center space-y-1">
                                <i data-lucide="image-plus" class="w-7 h-7 text-slate-300"></i>
                                <p class="text-xs font-bold text-slate-400">클릭하여 썸네일 업로드</p>
                                <p class="text-xs text-slate-300">JPG, PNG (최대 5MB)</p>
                            </div>
                            <input type="file" id="work-thumb" class="hidden" accept="image/*">
                        </label>
                        <div id="work-thumb-progress" class="hidden">
                            <div class="flex justify-between text-xs font-bold mb-1"><span class="text-slate-500">업로드 중...</span><span class="text-orange-500" id="work-thumb-pct">0%</span></div>
                            <div class="w-full bg-slate-100 rounded-full h-1.5"><div id="work-thumb-bar" class="bg-orange-500 h-1.5 rounded-full transition-all" style="width:0%"></div></div>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">첨부 파일 (선택, 최대 10MB)</label>
                        <label class="flex items-center space-x-3 w-full border border-slate-200 rounded-xl px-4 py-3 cursor-pointer hover:border-orange-400 hover:bg-orange-50 transition-all">
                            <i data-lucide="paperclip" class="w-4 h-4 text-slate-400 shrink-0"></i>
                            <span class="text-sm font-medium text-slate-400" id="work-file-label">파일을 클릭하여 첨부</span>
                            <input type="file" id="work-file" class="hidden" accept=".pdf,.zip,.ppt,.pptx,.doc,.docx,.hwp,.mp4">
                        </label>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">카드 색상 (썸네일 없을 때 표시)</label>
                        <select id="work-color" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
                            <option value="from-blue-400 to-indigo-500">파란색</option>
                            <option value="from-emerald-400 to-teal-500">초록색</option>
                            <option value="from-orange-400 to-rose-400">주황색</option>
                            <option value="from-purple-400 to-pink-500">보라색</option>
                            <option value="from-cyan-400 to-blue-500">하늘색</option>
                            <option value="from-lime-400 to-emerald-500">연두색</option>
                            <option value="from-amber-400 to-orange-500">황금색</option>
                        </select>
                    </div>
                    <button onclick="addWork()" id="work-add-btn"
                        class="w-full bg-gradient-to-r from-orange-400 to-rose-500 text-white font-bold py-3 rounded-xl hover:shadow-lg hover:shadow-orange-500/20 transition-all flex items-center justify-center space-x-2">
                        <i data-lucide="plus" class="w-4 h-4"></i><span>작품 등록</span>
                    </button>
                </div>
            </div>

            <!-- 작품 목록 -->
            <div class="lg:col-span-3 card p-7">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-black text-slate-900 flex items-center space-x-2">
                        <i data-lucide="gallery-horizontal" class="w-5 h-5 text-orange-500"></i><span>등록된 학생 작품</span>
                    </h2>
                    <button onclick="loadWorks()" class="flex items-center space-x-1.5 text-xs font-bold text-slate-500 hover:text-orange-600 bg-slate-50 hover:bg-orange-50 px-3 py-2 rounded-xl border border-slate-100 hover:border-orange-100 transition-all">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i><span>새로고침</span>
                    </button>
                </div>
                <div id="works-list">
                    <div class="py-10 flex flex-col items-center space-y-2 text-slate-400">
                        <i data-lucide="loader" class="w-6 h-6 animate-spin text-orange-400"></i>
                        <span class="text-sm font-medium">불러오는 중...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900/95 text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-32 opacity-0 z-50 flex items-center space-x-3 border border-slate-700">
        <div class="p-1.5 rounded-full bg-emerald-500/20"><i data-lucide="check" class="w-4 h-4 text-emerald-400" id="toast-icon"></i></div>
        <span class="font-medium text-sm" id="toast-msg"></span>
    </div>

    <script>
        const firebaseConfig = { apiKey:"AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM", authDomain:"book-c2d05.firebaseapp.com", projectId:"book-c2d05", storageBucket:"book-c2d05.firebasestorage.app", messagingSenderId:"566939045493", appId:"1:566939045493:web:da65c6ad61f528d446f23c" };
        const ADMIN_EMAILS = ['sungce27@gmail.com'];
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app), db = firebase.firestore(app);

        auth.onAuthStateChanged(user => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) { document.getElementById('access-denied').classList.remove('hidden'); document.getElementById('access-denied').classList.add('flex'); lucide.createIcons(); return; }
            document.getElementById('admin-name').textContent = user.displayName || user.email.split('@')[0];
            lucide.createIcons(); loadWorks();
        });
        async function handleSignOut() { await auth.signOut(); window.location.href = 'index.html'; }

        const CLOUDINARY_CLOUD_NAME = 'dudh0etdr', CLOUDINARY_UPLOAD_PRESET = 'school_materials';

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // 썸네일 미리보기
            document.getElementById('work-thumb').addEventListener('change', function() {
                const file = this.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('work-thumb-preview').src = e.target.result;
                    document.getElementById('work-thumb-preview').classList.remove('hidden');
                    document.getElementById('work-thumb-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            });
            // 파일 첨부 라벨
            document.getElementById('work-file').addEventListener('change', function() {
                const file = this.files[0];
                document.getElementById('work-file-label').textContent = file
                    ? file.name + ' (' + (file.size/1024/1024).toFixed(1) + 'MB)'
                    : '파일을 클릭하여 첨부';
            });
        });

        async function uploadToCloudinary(file, folder, progressBarId, progressPctId, progressWrapId) {
            if (progressWrapId) document.getElementById(progressWrapId).classList.remove('hidden');
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', folder);
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD_NAME + '/auto/upload');
                if (progressBarId) {
                    xhr.upload.onprogress = e => {
                        if (e.lengthComputable) {
                            const pct = Math.round(e.loaded/e.total*100);
                            document.getElementById(progressBarId).style.width = pct+'%';
                            if (progressPctId) document.getElementById(progressPctId).textContent = pct+'%';
                        }
                    };
                }
                xhr.onload = () => xhr.status===200 ? resolve(JSON.parse(xhr.responseText).secure_url) : reject(new Error('업로드 실패'));
                xhr.onerror  = () => reject(new Error('네트워크 오류'));
                xhr.send(formData);
            });
        }

        async function addWork() {
            const year  = document.getElementById('work-year').value;
            const team  = document.getElementById('work-team').value.trim();
            const title = document.getElementById('work-title').value.trim();
            const desc  = document.getElementById('work-desc').value.trim();
            const link  = document.getElementById('work-link').value.trim();
            const imgColor = document.getElementById('work-color').value;
            const thumbFile = document.getElementById('work-thumb').files[0];
            const attachFile = document.getElementById('work-file').files[0];
            if (!title || !team) { showToast('팀명과 작품명을 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('work-add-btn');
            btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>등록 중...</span>'; lucide.createIcons();
            try {
                let thumbUrl = '', attachUrl = '', attachName = '';

                if (thumbFile) {
                    if (thumbFile.size > 5*1024*1024) { showToast('썸네일은 5MB 이하여야 합니다.', 'error'); return; }
                    btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>썸네일 업로드 중...</span>'; lucide.createIcons();
                    thumbUrl = await uploadToCloudinary(thumbFile, 'student_works/thumbs', 'work-thumb-bar', 'work-thumb-pct', 'work-thumb-progress');
                }
                if (attachFile) {
                    if (attachFile.size > 10*1024*1024) { showToast('첨부 파일은 10MB 이하여야 합니다.', 'error'); return; }
                    btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>파일 업로드 중...</span>'; lucide.createIcons();
                    attachUrl  = await uploadToCloudinary(attachFile, 'student_works/files', null, null, null);
                    attachName = attachFile.name;
                }

                await db.collection('student_works').add({
                    year: parseInt(year), team, title, desc, link,
                    imgColor, thumbUrl, attachUrl, attachName,
                    likes: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                ['work-team','work-title','work-desc','work-link'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('work-thumb').value = '';
                document.getElementById('work-file').value  = '';
                document.getElementById('work-thumb-preview').classList.add('hidden');
                document.getElementById('work-thumb-placeholder').classList.remove('hidden');
                document.getElementById('work-file-label').textContent = '파일을 클릭하여 첨부';
                document.getElementById('work-thumb-progress').classList.add('hidden');
                showToast('"'+title+'" 작품이 등록되었습니다! 🎨');
                loadWorks();
            } catch(e) { showToast('오류: ' + e.message, 'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i data-lucide="plus" class="w-4 h-4"></i><span>작품 등록</span>'; lucide.createIcons(); }
        }

        async function loadWorks() {
            const c = document.getElementById('works-list');
            c.innerHTML = `<div class="py-8 flex flex-col items-center space-y-2 text-slate-400"><i data-lucide="loader" class="w-5 h-5 animate-spin text-orange-400"></i><span class="text-sm">불러오는 중...</span></div>`;
            lucide.createIcons();
            try {
                const snap = await db.collection('student_works').orderBy('createdAt','desc').get();
                allWorks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderWorks();
            } catch(e) { c.innerHTML = `<p class="text-center text-sm text-slate-400 py-8">오류: ${e.message}</p>`; }
        }

        function renderWorks() {
            const c = document.getElementById('works-list');
            if (!allWorks.length) { c.innerHTML=`<div class="py-10 flex flex-col items-center space-y-2 text-slate-400"><i data-lucide="inbox" class="w-8 h-8 text-slate-300"></i><p class="text-sm font-medium">등록된 작품이 없습니다.</p></div>`; lucide.createIcons(); return; }
            c.innerHTML = `<div class="space-y-3">${allWorks.map(w=>`
                <div class="flex items-start justify-between p-4 bg-slate-50 hover:bg-white border border-slate-100 hover:border-slate-200 rounded-2xl transition-all">
                    <div class="flex items-center space-x-4 min-w-0">
                        <div class="w-14 h-14 rounded-xl overflow-hidden shrink-0 ${w.thumbUrl ? '' : 'bg-gradient-to-br '+( w.imgColor||'from-orange-400 to-rose-400')+' flex items-center justify-center'}">
                            ${w.thumbUrl
                                ? `<img src="${w.thumbUrl}" class="w-full h-full object-cover" alt="">`
                                : `<i data-lucide="image" class="w-5 h-5 text-white"></i>`}
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center space-x-2">
                                <p class="text-sm font-bold text-slate-800 truncate">${w.title}</p>
                                <span class="text-xs bg-slate-100 text-slate-500 font-bold px-2 py-0.5 rounded-lg shrink-0">${w.year}</span>
                            </div>
                            <p class="text-xs text-slate-400 font-medium">${w.team||''}</p>
                            <p class="text-xs text-slate-500 mt-1 line-clamp-1">${w.desc||''}</p>
                            ${w.attachUrl ? `<a href="${w.attachUrl}" target="_blank" class="text-xs text-blue-500 font-bold hover:underline flex items-center space-x-1 mt-1"><i data-lucide="paperclip" class="w-3 h-3"></i><span>${w.attachName||'첨부파일'}</span></a>` : ''}
                        </div>
                    </div>
                    <button onclick="deleteWork('${w.id}','${(w.title||'').replace(/'/g,"\\'")}')"
                        class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors ml-2 shrink-0">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>`).join('')}</div>`;
            lucide.createIcons();
        }

        async function addWork() {
            const year  = document.getElementById('work-year').value;
            const team  = document.getElementById('work-team').value.trim();
            const title = document.getElementById('work-title').value.trim();
            const desc  = document.getElementById('work-desc').value.trim();
            const link  = document.getElementById('work-link').value.trim();
            const imgColor = document.getElementById('work-color').value;
            if (!title || !team) { showToast('팀명과 작품명을 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('work-add-btn');
            btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>등록 중...</span>'; lucide.createIcons();
            try {
                await db.collection('student_works').add({ year: parseInt(year), team, title, desc, link, imgColor, likes: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                ['work-team','work-title','work-desc','work-link'].forEach(id => document.getElementById(id).value = '');
                showToast(`"${title}" 작품이 등록되었습니다! 🎨`);
                loadWorks();
            } catch(e) { showToast('오류: ' + e.message, 'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i data-lucide="plus" class="w-4 h-4"></i><span>작품 등록</span>'; lucide.createIcons(); }
        }

        async function deleteWork(id, title) {
            if (!confirm(`"${title}" 작품을 삭제할까요?`)) return;
            await db.collection('student_works').doc(id).delete();
            allWorks = allWorks.filter(w => w.id !== id);
            renderWorks();
            showToast('작품이 삭제되었습니다.');
        }

        let toastTimeout;
        function showToast(message, type='success') {
            const toast=document.getElementById('toast'), icon=document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent=message;
            icon.className = type==='error' ? 'w-4 h-4 text-rose-400' : 'w-4 h-4 text-emerald-400';
            icon.setAttribute('data-lucide', type==='error'?'alert-circle':'check'); lucide.createIcons();
            clearTimeout(toastTimeout); toast.classList.remove('translate-y-32','opacity-0');
            toastTimeout = setTimeout(()=>toast.classList.add('translate-y-32','opacity-0'),4000);
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
