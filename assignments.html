<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 관리 - 정보 클래스룸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .card { background:#fff; border-radius:1.5rem; border:1px solid #f1f5f9; box-shadow:0 1px 4px rgba(0,0,0,.05); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" style="background-image:radial-gradient(#e2e8f0 1px,transparent 1px);background-size:32px 32px;">

    <!-- 접근 차단 -->
    <div id="access-denied" class="fixed inset-0 z-[200] bg-white hidden flex-col items-center justify-center">
        <div class="w-16 h-16 bg-rose-100 text-rose-500 rounded-3xl flex items-center justify-center mb-6">
            <i data-lucide="shield-off" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-900 mb-2">접근 권한 없음</h2>
        <p class="text-slate-500 font-medium mb-8">관리자만 접근할 수 있는 페이지입니다.</p>
        <a href="index.html" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors">메인으로</a>
    </div>

    <!-- 네비게이션 -->
    <nav class="fixed w-full top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-4">
                    <a href="admin.html" class="text-slate-400 hover:text-slate-700 p-2 rounded-lg hover:bg-slate-100 transition-colors">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-violet-500 to-purple-600 text-white p-2.5 rounded-xl shadow-lg shadow-violet-500/30">
                            <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <span class="font-black text-lg text-slate-900">수행평가 관리</span>
                            <span class="ml-2 text-xs bg-violet-100 text-violet-700 font-bold px-2 py-0.5 rounded-full">Admin</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="hidden sm:flex items-center space-x-2 bg-slate-100 px-4 py-2 rounded-xl">
                        <i data-lucide="user-check" class="w-4 h-4 text-slate-500"></i>
                        <span id="admin-name" class="text-sm font-bold text-slate-700"></span>
                    </div>
                    <button onclick="handleSignOut()"
                        class="flex items-center space-x-1.5 text-slate-500 hover:text-rose-500 px-3 py-2 rounded-xl hover:bg-rose-50 text-sm font-bold transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">로그아웃</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-28 pb-24 fade-in">

        <!-- 통계 카드 -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
            <div class="card p-5">
                <div class="w-9 h-9 bg-violet-50 text-violet-600 rounded-xl flex items-center justify-center mb-3">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                </div>
                <p class="text-2xl font-black text-slate-900" id="stat-total-assign">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">등록된 과제</p>
            </div>
            <div class="card p-5">
                <div class="w-9 h-9 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-3">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </div>
                <p class="text-2xl font-black text-slate-900" id="stat-total-submit">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">총 제출 수</p>
            </div>
            <div class="card p-5">
                <div class="w-9 h-9 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3">
                    <i data-lucide="users" class="w-4 h-4"></i>
                </div>
                <p class="text-2xl font-black text-slate-900" id="stat-unique-students">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">제출 학생 수</p>
            </div>
            <div class="card p-5">
                <div class="w-9 h-9 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center mb-3">
                    <i data-lucide="link" class="w-4 h-4"></i>
                </div>
                <a href="https://docs.google.com/spreadsheets/d/1EIA8zU82F9UXBOQz-6u92Su1zUFPsT_RFqS0Yuqpz2c/edit" target="_blank"
                    class="text-sm font-bold text-amber-600 hover:underline flex items-center space-x-1 mt-1">
                    <span>시트 열기</span><i data-lucide="external-link" class="w-3 h-3"></i>
                </a>
                <p class="text-xs font-medium text-slate-400 mt-0.5">제출 DB</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- 과제 등록 + 목록 -->
            <div class="space-y-6">
                <!-- 과제 추가 -->
                <div class="card p-6">
                    <h2 class="text-base font-black text-slate-900 mb-4 flex items-center space-x-2">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-violet-500"></i>
                        <span>과제 추가</span>
                    </h2>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1">과제명</label>
                            <input type="text" id="assign-title" placeholder="예: [1차] 나만의 웹 프로필"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1">설명 (선택)</label>
                            <input type="text" id="assign-desc" placeholder="간단한 설명"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1">마감일</label>
                            <input type="date" id="assign-due"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all">
                        </div>
                        <!-- 파일 첨부 -->
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1">과제 안내 파일 (선택, 최대 10MB)</label>
                            <label id="assign-file-zone"
                                class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-slate-200 rounded-xl cursor-pointer hover:border-violet-400 hover:bg-violet-50 transition-all">
                                <i data-lucide="upload-cloud" class="w-5 h-5 text-slate-300 mb-1" id="assign-file-icon"></i>
                                <p class="text-xs font-bold text-slate-400" id="assign-file-label">클릭 또는 드래그</p>
                                <input type="file" id="assign-file" class="hidden" accept=".pdf,.ppt,.pptx,.hwp,.hwpx,.doc,.docx,.zip,.png,.jpg">
                            </label>
                            <div id="assign-upload-wrap" class="hidden mt-2">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-xs font-bold text-slate-500" id="assign-upload-text">업로드 중...</span>
                                    <span class="text-xs font-bold text-violet-600" id="assign-upload-pct">0%</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-1.5">
                                    <div id="assign-upload-bar" class="bg-violet-500 h-1.5 rounded-full transition-all" style="width:0%"></div>
                                </div>
                            </div>
                        </div>
                        <button onclick="addAssignment()" id="add-btn"
                            class="w-full bg-gradient-to-r from-violet-600 to-purple-600 text-white font-bold py-3 rounded-xl hover:shadow-lg hover:shadow-violet-500/20 transition-all flex items-center justify-center space-x-2">
                            <i data-lucide="plus" class="w-4 h-4"></i><span>과제 등록</span>
                        </button>
                    </div>
                </div>

                <!-- 과제 목록 -->
                <div class="card p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-base font-black text-slate-900 flex items-center space-x-2">
                            <i data-lucide="list" class="w-4 h-4 text-violet-500"></i>
                            <span>등록된 과제</span>
                        </h2>
                        <button onclick="loadAssignments()"
                            class="text-xs font-bold text-slate-400 hover:text-violet-600 p-1.5 rounded-lg hover:bg-violet-50 transition-colors">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <div id="assign-list">
                        <div class="py-8 flex flex-col items-center space-y-2 text-slate-400">
                            <i data-lucide="loader" class="w-5 h-5 animate-spin text-violet-400"></i>
                            <span class="text-xs">불러오는 중...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 제출 현황 -->
            <div class="lg:col-span-2 card p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-base font-black text-slate-900 flex items-center space-x-2">
                        <i data-lucide="bar-chart-2" class="w-4 h-4 text-emerald-500"></i>
                        <span>학생 제출 현황</span>
                    </h2>
                    <div class="flex items-center space-x-2">
                        <!-- 과제 필터 -->
                        <select id="submit-filter"
                            onchange="filterSubmissions()"
                            class="text-xs font-bold bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                            <option value="all">전체 과제</option>
                        </select>
                        <button onclick="loadSubmissions()"
                            class="flex items-center space-x-1.5 text-xs font-bold text-slate-500 hover:text-emerald-600 bg-slate-50 hover:bg-emerald-50 px-3 py-2 rounded-xl border border-slate-100 hover:border-emerald-100 transition-all">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                            <span>새로고침</span>
                        </button>
                    </div>
                </div>

                <!-- 검색 -->
                <div class="relative mb-4">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="submit-search" placeholder="학생 이름 또는 학번 검색..."
                        oninput="filterSubmissions()"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                </div>

                <!-- 제출 테이블 -->
                <div class="overflow-x-auto rounded-2xl border border-slate-100">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">번호</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">학번</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">이름</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">과제명</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">제출물</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">제출일</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">관리</th>
                            </tr>
                        </thead>
                        <tbody id="submit-tbody">
                            <tr>
                                <td colspan="6" class="text-center py-12 text-slate-400">
                                    <div class="flex flex-col items-center space-y-2">
                                        <i data-lucide="loader" class="w-5 h-5 animate-spin text-emerald-400"></i>
                                        <span class="text-sm font-medium">불러오는 중...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p class="text-xs text-slate-400 font-medium mt-2" id="submit-count-label"></p>
            </div>
        </div>
    </main>

    <!-- 제출 수정 모달 -->
    <div id="submit-edit-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4"
        onclick="if(event.target===this) closeSubmitEdit()">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md">
            <div class="flex items-center justify-between px-8 py-6 border-b border-slate-100">
                <h3 class="text-lg font-black text-slate-900 flex items-center space-x-2">
                    <i data-lucide="pencil" class="w-5 h-5 text-emerald-500"></i>
                    <span>제출 내역 수정</span>
                </h3>
                <button onclick="closeSubmitEdit()" class="text-slate-400 hover:text-slate-600 p-2 rounded-xl hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-8 py-6 space-y-4">
                <input type="hidden" id="edit-submit-row">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">학번</label>
                    <input type="text" id="edit-submit-studentid"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">이름</label>
                    <input type="text" id="edit-submit-name"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">과제명</label>
                    <input type="text" id="edit-submit-assignment"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">제출물 (URL 또는 텍스트)</label>
                    <input type="text" id="edit-submit-link" placeholder="https:// 또는 내용"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                </div>
                <p class="text-xs text-slate-400 font-medium flex items-center space-x-1">
                    <i data-lucide="info" class="w-3.5 h-3.5"></i>
                    <span>Google Sheets의 해당 행이 직접 업데이트됩니다.</span>
                </p>
            </div>
            <div class="px-8 pb-8 flex space-x-3">
                <button onclick="closeSubmitEdit()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3.5 rounded-2xl hover:bg-slate-200 transition-colors">취소</button>
                <button onclick="saveSubmitEdit()" id="submit-save-btn"
                    class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold py-3.5 rounded-2xl hover:shadow-lg transition-all flex items-center justify-center space-x-2">
                    <i data-lucide="save" class="w-4 h-4"></i><span>저장</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 토스트 -->
    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900/95 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-32 opacity-0 z-50 flex items-center space-x-3 border border-slate-700">
        <div class="p-1.5 rounded-full bg-emerald-500/20" id="toast-icon-wrap">
            <i data-lucide="check" class="w-4 h-4 text-emerald-400" id="toast-icon"></i>
        </div>
        <span class="font-medium text-sm" id="toast-msg"></span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM",
            authDomain: "book-c2d05.firebaseapp.com",
            projectId: "book-c2d05",
            storageBucket: "book-c2d05.firebasestorage.app",
            messagingSenderId: "566939045493",
            appId: "1:566939045493:web:da65c6ad61f528d446f23c"
        };
        const ADMIN_EMAILS    = ['sungce27@gmail.com'];
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwmN8kW5ZIUBpfSupZ_M8BJMZbMLleyw7MGV0CEh-wdcv1csV0-ZUMxFlKM_XE9uzM/exec';

        const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);
        const db   = firebase.firestore(app);

        // ── 인증 ─────────────────────────────────────────────
        auth.onAuthStateChanged(user => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('access-denied').classList.remove('hidden');
                document.getElementById('access-denied').classList.add('flex');
                lucide.createIcons(); return;
            }
            document.getElementById('admin-name').textContent = user.displayName || user.email.split('@')[0];
            lucide.createIcons();
            loadAssignments();
            loadSubmissions();
        });

        async function handleSignOut() {
            await auth.signOut();
            window.location.href = 'index.html';
        }

        // ── 과제 관리 (Firestore) ────────────────────────────
        let allAssignments = [];

        async function loadAssignments() {
            document.getElementById('assign-list').innerHTML =
                `<div class="py-6 flex flex-col items-center space-y-2 text-slate-400">
                    <i data-lucide="loader" class="w-5 h-5 animate-spin text-violet-400"></i>
                    <span class="text-xs">불러오는 중...</span></div>`;
            lucide.createIcons();
            try {
                const snap = await db.collection('assignments').orderBy('createdAt','asc').get();
                allAssignments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                document.getElementById('stat-total-assign').textContent = allAssignments.length;
                renderAssignments();
                updateFilterOptions();
            } catch(e) {
                document.getElementById('assign-list').innerHTML =
                    `<p class="text-xs text-slate-400 text-center py-4">불러오기 실패: ${e.message}</p>`;
            }
        }

        function renderAssignments() {
            const el = document.getElementById('assign-list');
            if (!allAssignments.length) {
                el.innerHTML = `<div class="py-8 flex flex-col items-center space-y-2 text-slate-400">
                    <i data-lucide="inbox" class="w-7 h-7 text-slate-300"></i>
                    <p class="text-xs font-medium">등록된 과제가 없습니다.</p></div>`;
                lucide.createIcons(); return;
            }
            el.innerHTML = `<div class="space-y-2">
                ${allAssignments.map(a => `
                <div class="flex items-start justify-between p-3.5 bg-slate-50 hover:bg-white border border-slate-100 hover:border-violet-100 rounded-2xl transition-all group">
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-bold text-slate-800 leading-snug">${a.title}</p>
                        ${a.desc ? `<p class="text-xs text-slate-400 mt-0.5">${a.desc}</p>` : ''}
                        ${a.due  ? `<p class="text-xs text-amber-500 font-bold mt-1">마감: ${a.due}</p>` : ''}
                        ${a.fileUrl ? `<a href="${a.fileUrl}" target="_blank" class="text-xs text-violet-500 font-bold hover:underline flex items-center space-x-1 mt-1"><i data-lucide="paperclip" class="w-3 h-3"></i><span>${a.fileName||'첨부파일'}</span></a>` : ''}
                    </div>
                    <button onclick="deleteAssignment('${a.id}','${(a.title||'').replace(/'/g,"\\'")}')"
                        class="p-1.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors ml-2 shrink-0">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>`).join('')}
            </div>`;
            lucide.createIcons();
        }

        const CLOUDINARY_CLOUD_NAME    = 'dudh0etdr';
        const CLOUDINARY_UPLOAD_PRESET = 'school_materials';

        // 파일 선택 시 라벨 업데이트
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const fi = document.getElementById('assign-file');
            if (fi) fi.addEventListener('change', () => {
                const file = fi.files[0];
                if (!file) return;
                document.getElementById('assign-file-label').textContent = `${file.name} (${(file.size/1024/1024).toFixed(1)}MB)`;
                document.getElementById('assign-file-label').classList.add('text-violet-600');
                document.getElementById('assign-file-icon').setAttribute('data-lucide','file-check');
                document.getElementById('assign-file-icon').classList.remove('text-slate-300');
                document.getElementById('assign-file-icon').classList.add('text-violet-500');
                lucide.createIcons();
            });
        });

        async function addAssignment() {
            const title = document.getElementById('assign-title').value.trim();
            const desc  = document.getElementById('assign-desc').value.trim();
            const due   = document.getElementById('assign-due').value;
            const file  = document.getElementById('assign-file').files[0];
            if (!title) { showToast('과제명을 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('add-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>등록 중...</span>';
            lucide.createIcons();

            try {
                let fileUrl = '', fileName = '';

                if (file) {
                    if (file.size > 10*1024*1024) { showToast('파일 크기는 10MB 이하여야 합니다.', 'error'); return; }
                    document.getElementById('assign-upload-wrap').classList.remove('hidden');
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                    formData.append('folder', 'assignments');
                    fileUrl = await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`);
                        xhr.upload.onprogress = e => {
                            if (e.lengthComputable) {
                                const pct = Math.round(e.loaded/e.total*100);
                                document.getElementById('assign-upload-bar').style.width = pct+'%';
                                document.getElementById('assign-upload-pct').textContent  = pct+'%';
                            }
                        };
                        xhr.onload = () => xhr.status===200 ? resolve(JSON.parse(xhr.responseText).secure_url) : reject(new Error('업로드 실패'));
                        xhr.onerror = () => reject(new Error('네트워크 오류'));
                        xhr.send(formData);
                    });
                    fileName = file.name;
                    document.getElementById('assign-upload-text').textContent = '업로드 완료!';
                }

                await db.collection('assignments').add({
                    title, desc, due, fileUrl, fileName,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 폼 초기화
                ['assign-title','assign-desc','assign-due','assign-file'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('assign-file-label').textContent = '클릭 또는 드래그';
                document.getElementById('assign-file-label').classList.remove('text-violet-600');
                document.getElementById('assign-file-icon').setAttribute('data-lucide','upload-cloud');
                document.getElementById('assign-file-icon').classList.add('text-slate-300');
                document.getElementById('assign-file-icon').classList.remove('text-violet-500');
                document.getElementById('assign-upload-wrap').classList.add('hidden');
                document.getElementById('assign-upload-bar').style.width = '0%';
                lucide.createIcons();

                showToast(`"${title}" 과제가 등록되었습니다! ✅`);
                await loadAssignments();
            } catch(e) {
                showToast('오류: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="plus" class="w-4 h-4"></i><span>과제 등록</span>';
                lucide.createIcons();
            }
        }

        async function deleteAssignment(id, title) {
            if (!confirm(`"${title}" 과제를 삭제할까요?`)) return;
            await db.collection('assignments').doc(id).delete();
            allAssignments = allAssignments.filter(a => a.id !== id);
            document.getElementById('stat-total-assign').textContent = allAssignments.length;
            renderAssignments();
            updateFilterOptions();
            showToast('과제가 삭제되었습니다.');
        }

        function updateFilterOptions() {
            const sel = document.getElementById('submit-filter');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">전체 과제</option>';
            allAssignments.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.title; opt.textContent = a.title;
                if (a.title === cur) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        // ── 제출 현황 (Google Sheets JSONP) ─────────────────
        let allSubmissions = [];

        function loadSubmissions() {
            const tbody = document.getElementById('submit-tbody');
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-slate-400">
                <div class="flex flex-col items-center space-y-2">
                    <i data-lucide="loader" class="w-5 h-5 animate-spin text-emerald-400"></i>
                    <span class="text-sm font-medium">불러오는 중...</span>
                </div></td></tr>`;
            lucide.createIcons();

            const old = document.getElementById('jsonp-submits');
            if (old) old.remove();

            const timer = setTimeout(() => {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400 font-medium text-sm">데이터를 불러오지 못했습니다.</td></tr>`;
            }, 8000);

            window.__submitsCallback = function(data) {
                clearTimeout(timer);
                const s = document.getElementById('jsonp-submits');
                if (s) s.remove();
                allSubmissions = (data.submissions || []).reverse();

                // 통계
                document.getElementById('stat-total-submit').textContent = allSubmissions.length;
                const unique = new Set(allSubmissions.map(s => s.studentId || s.email)).size;
                document.getElementById('stat-unique-students').textContent = unique;

                filterSubmissions();
            };

            const script = document.createElement('script');
            script.id  = 'jsonp-submits';
            script.src = `${APPS_SCRIPT_URL}?action=getAllSubmissions&callback=__submitsCallback`;
            document.body.appendChild(script);
        }

        function filterSubmissions() {
            const q      = (document.getElementById('submit-search').value || '').toLowerCase();
            const filter = document.getElementById('submit-filter').value;

            let list = allSubmissions.filter(s => {
                const matchFilter = filter === 'all' || (s.assignment || '').includes(filter);
                const matchQ = !q ||
                    (s.name        || '').toLowerCase().includes(q) ||
                    (s.studentId   || '').toLowerCase().includes(q) ||
                    (s.email       || '').toLowerCase().includes(q);
                return matchFilter && matchQ;
            });

            document.getElementById('submit-count-label').textContent =
                `총 ${list.length}건${q || filter !== 'all' ? ' (필터 적용)' : ''}`;
            renderSubmissions(list);
        }

        function renderSubmissions(list) {
            const tbody = document.getElementById('submit-tbody');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-slate-400 font-medium">제출 내역이 없습니다.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map((s, i) => {
                const raw = (s.link || '').trim();
                const isUrl = raw.startsWith('http://') || raw.startsWith('https://');
                const linkHtml = raw
                    ? isUrl
                        ? `<a href="${raw}" target="_blank" rel="noopener noreferrer"
                                class="text-blue-500 hover:underline font-medium truncate max-w-[180px] block"
                                title="${raw}">${raw.length > 30 ? raw.slice(0,30)+'…' : raw}</a>`
                        : `<span class="text-slate-600 text-xs font-medium truncate max-w-[180px] block" title="${raw}">${raw.length > 35 ? raw.slice(0,35)+'…' : raw}</span>`
                    : `<span class="text-slate-300 text-xs">-</span>`;
                const globalIdx = allSubmissions.indexOf(s);
                return `<tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3.5 text-xs font-bold text-slate-400">${i+1}</td>
                    <td class="px-4 py-3.5 text-slate-500 font-medium text-sm">${s.studentId || '-'}</td>
                    <td class="px-4 py-3.5 font-bold text-slate-800">${s.name || '-'}</td>
                    <td class="px-4 py-3.5 text-slate-600 font-medium text-sm max-w-[140px]">
                        <span class="bg-violet-50 text-violet-700 text-xs font-bold px-2 py-0.5 rounded-lg">${s.assignment || '-'}</span>
                    </td>
                    <td class="px-4 py-3.5 max-w-[180px]">${linkHtml}</td>
                    <td class="px-4 py-3.5 text-slate-400 text-xs font-medium whitespace-nowrap">${s.date ? s.date.substring(0,16) : '-'}</td>
                    <td class="px-4 py-3.5">
                        <div class="flex items-center space-x-1">
                            <button onclick="openSubmitEdit(${globalIdx})"
                                class="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors" title="수정">
                                <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                            </button>
                            <button onclick="deleteSubmission(${globalIdx}, '${(s.name||'').replace(/'/g,"\\'")}', '${(s.assignment||'').replace(/'/g,"\\'")}')"
                                class="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors" title="삭제">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
            lucide.createIcons();
        }

        // ── 제출 수정 ──────────────────────────────────────────
        function openSubmitEdit(idx) {
            const s = allSubmissions[idx]; if (!s) return;
            document.getElementById('edit-submit-row').value        = idx;
            document.getElementById('edit-submit-studentid').value  = s.studentId  || '';
            document.getElementById('edit-submit-name').value       = s.name       || '';
            document.getElementById('edit-submit-assignment').value = s.assignment || '';
            document.getElementById('edit-submit-link').value       = s.link       || '';
            const modal = document.getElementById('submit-edit-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeSubmitEdit() {
            document.getElementById('submit-edit-modal').classList.add('hidden');
            document.getElementById('submit-edit-modal').classList.remove('flex');
        }

        async function saveSubmitEdit() {
            const idx        = parseInt(document.getElementById('edit-submit-row').value);
            const studentId  = document.getElementById('edit-submit-studentid').value.trim();
            const name       = document.getElementById('edit-submit-name').value.trim();
            const assignment = document.getElementById('edit-submit-assignment').value.trim();
            const link       = document.getElementById('edit-submit-link').value.trim();
            if (!name || !assignment) { showToast('이름과 과제명을 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('submit-save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>저장 중...</span>';
            lucide.createIcons();

            try {
                const s = allSubmissions[idx];
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ type: 'updateSubmission', email: s.email, date: s.date, studentId, name, assignment, link })
                });
                Object.assign(allSubmissions[idx], { studentId, name, assignment, link });
                filterSubmissions();
                closeSubmitEdit();
                showToast('제출 내역이 수정되었습니다! ✅');
            } catch(e) { showToast('수정 오류: ' + e.message, 'error'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i><span>저장</span>';
                lucide.createIcons();
            }
        }

        // ── 제출 삭제 ──────────────────────────────────────────
        async function deleteSubmission(idx, name, assignment) {
            if (!confirm(`"${name}" 학생의 "${assignment}" 제출을 삭제할까요?`)) return;
            const s = allSubmissions[idx];
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ type: 'deleteSubmission', email: s.email, date: s.date, assignment: s.assignment })
                });
                allSubmissions.splice(idx, 1);
                document.getElementById('stat-total-submit').textContent = allSubmissions.length;
                filterSubmissions();
                showToast(`${name} 학생의 제출이 삭제되었습니다.`);
            } catch(e) { showToast('삭제 오류: ' + e.message, 'error'); }
        }

        // ── 토스트 ────────────────────────────────────────────
        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon  = document.getElementById('toast-icon');
            const wrap  = document.getElementById('toast-icon-wrap');
            document.getElementById('toast-msg').textContent = message;
            if (type === 'error') {
                wrap.className = 'p-1.5 rounded-full bg-rose-500/20';
                icon.setAttribute('data-lucide','alert-circle');
                icon.className = 'w-4 h-4 text-rose-400';
            } else {
                wrap.className = 'p-1.5 rounded-full bg-emerald-500/20';
                icon.setAttribute('data-lucide','check');
                icon.className = 'w-4 h-4 text-emerald-400';
            }
            lucide.createIcons();
            clearTimeout(toastTimeout);
            toast.classList.remove('translate-y-32','opacity-0');
            toastTimeout = setTimeout(() => toast.classList.add('translate-y-32','opacity-0'), 4000);
        }

        // icons init handled above
    </script>
</body>
</html>
