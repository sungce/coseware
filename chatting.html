<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Room — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
  body { font-family:'Pretendard',-apple-system,sans-serif; background:#f8fafc; margin:0; overflow:hidden; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
  .msg-enter { animation: fadeSlide .25s ease-out; }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .channel-btn.active { background:#e0e7ff; color:#4338ca; font-weight:700; }
  .channel-btn { width:100%; display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:10px; font-size:13px; font-weight:500; color:#475569; transition:all .15s; cursor:pointer; border:none; background:transparent; outline:none; }
  .channel-btn:hover { background:#f1f5f9; }
  #chat-input { resize:none; overflow:hidden; min-height:36px; max-height:120px; }
  .avatar { width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; }
</style>
</head>
<body class="h-screen flex flex-col">

<!-- ══ 네비게이션 1줄 ══════════════════════════════════════ -->
<nav class="shrink-0 w-full z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
  <div class="max-w-[1400px] mx-auto px-4 md:px-6">
    <div class="flex justify-between items-center h-14">
      <!-- 로고 -->
      <a href="index.html" class="flex items-center space-x-2 shrink-0 outline-none focus:outline-none">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold">AI</div>
        <div>
          <div class="text-[15px] font-bold text-slate-900 leading-tight">Sungce <span class="text-blue-600">AI-ON</span></div>
          <div class="text-[12px] font-medium text-slate-500 leading-tight">정보 교과 클래스룸</div>
        </div>
      </a>
      <!-- 메뉴 + 사용자 -->
      <div class="flex items-center gap-6">
        <div class="hidden md:flex items-center gap-6 text-[13px] font-bold text-slate-600">
          <a href="curriculum/index.html" target="_blank" class="hover:text-blue-600 transition-colors">교과 수업</a>
          <a href="code_play.html" target="_blank" class="hover:text-blue-600 transition-colors">코드 놀이터</a>
          <a href="data_play.html" target="_blank" class="hover:text-blue-600 transition-colors">데이터 실습실</a>
          <span class="text-blue-600 border-b-2 border-blue-600 pb-0.5">Vibe Room</span>
        </div>
        <div class="flex items-center gap-3">
          <div id="nav-user" class="hidden items-center gap-2 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-xl">
            <div id="nav-avatar" class="avatar w-6 h-6 rounded-lg text-[10px]"></div>
            <span id="nav-name" class="text-sm font-bold text-slate-700"></span>
          </div>
          <a href="index.html" class="flex items-center gap-1.5 text-slate-500 hover:text-blue-600 text-sm font-bold bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-xl transition-colors outline-none">
            <i data-lucide="home" class="w-4 h-4"></i><span class="hidden sm:inline">메인으로</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- 로그인 필요 -->
<div id="login-wall" class="hidden flex-1 flex-col items-center justify-center bg-slate-50">
  <div class="bg-white rounded-3xl p-10 border border-slate-100 shadow-sm text-center max-w-sm w-full mx-4">
    <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <i data-lucide="message-square" class="w-8 h-8"></i>
    </div>
    <h2 class="text-xl font-black text-slate-900 mb-2">Vibe Room</h2>
    <p class="text-sm text-slate-500 font-medium mb-6">채팅에 참여하려면 로그인이 필요합니다.</p>
    <a href="index.html" class="bg-indigo-600 text-white font-bold px-6 py-3 rounded-2xl hover:bg-indigo-700 transition-colors inline-block">로그인하러 가기</a>
  </div>
</div>

<!-- 메인 채팅 레이아웃 -->
<main id="chat-app" class="hidden flex-1 overflow-hidden w-full bg-white border-x border-slate-200">
  <div class="flex h-full">

    <!-- 사이드바 -->
    <aside class="w-56 bg-slate-50 border-r border-slate-200 flex-col hidden md:flex shrink-0 h-full">
      <div class="p-4 border-b border-slate-200">
        <h2 class="text-sm font-black text-slate-800 flex items-center gap-2">
          <i data-lucide="message-circle" class="w-4 h-4 text-indigo-500"></i>Vibe Room
        </h2>
        <p class="text-xs text-slate-400 mt-0.5">실시간 학급 채팅방</p>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-4">
        <div>
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2">채널</p>
          <div id="channel-list" class="space-y-0.5">
            <button class="channel-btn active" data-room="team1" onclick="switchRoom('team1','모둠1 수다방',this)"><i data-lucide="users" class="w-3.5 h-3.5"></i>모둠1 수다방</button>
            <button class="channel-btn" data-room="team2" onclick="switchRoom('team2','모둠2 수다방',this)"><i data-lucide="users" class="w-3.5 h-3.5"></i>모둠2 수다방</button>
            <button class="channel-btn" data-room="team3" onclick="switchRoom('team3','모둠3 수다방',this)"><i data-lucide="users" class="w-3.5 h-3.5"></i>모둠3 수다방</button>
            <button class="channel-btn" data-room="team4" onclick="switchRoom('team4','모둠4 수다방',this)"><i data-lucide="users" class="w-3.5 h-3.5"></i>모둠4 수다방</button>
            <button class="channel-btn" data-room="general" onclick="switchRoom('general','자유 수다방',this)"><i data-lucide="hash" class="w-3.5 h-3.5"></i>자유 수다방</button>
            <button class="channel-btn" data-room="qna" onclick="switchRoom('qna','질문 및 답변',this)"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i>질문 및 답변</button>
          </div>
        </div>
        <div>
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2 flex justify-between">
            <span>접속 중</span><span id="online-count" class="bg-emerald-100 text-emerald-600 px-1.5 rounded-full text-[10px] font-black">0</span>
          </p>
          <div id="online-list" class="space-y-1"></div>
        </div>
      </div>
      <div class="p-3 border-t border-slate-200 bg-white">
        <div class="flex items-center gap-2 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2">
          <div id="my-avatar" class="avatar w-7 h-7 rounded-lg text-[10px]"></div>
          <div class="flex-1 min-w-0">
            <p id="my-name" class="text-xs font-bold text-slate-800 truncate"></p>
            <p class="text-[10px] text-emerald-500 font-bold flex items-center gap-1"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full inline-block"></span>온라인</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- 채팅 영역 -->
    <section class="flex-1 flex flex-col h-full min-w-0">
      <header class="h-12 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-2">
          <i data-lucide="hash" class="w-4 h-4 text-slate-400"></i>
          <h2 id="room-title" class="text-sm font-black text-slate-800">자유 수다방</h2>
          <span id="room-count" class="text-xs text-slate-400 font-medium ml-2"></span>
        </div>
        <button onclick="clearMyMessages()" class="text-xs text-slate-400 hover:text-rose-500 font-bold transition-colors outline-none flex items-center gap-1">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>내 메시지 삭제
        </button>
      </header>

      <!-- 메시지 목록 (핵심: flex-1 으로 남은 공간 모두 사용) -->
      <div id="chat-messages" class="flex-1 overflow-y-auto px-8 py-6 space-y-5 bg-white">
        <div id="msgs-loading" class="flex justify-center py-16">
          <p class="text-sm text-slate-400 font-medium">메시지 불러오는 중...</p>
        </div>
      </div>

      <!-- 입력창 -->
      <div class="shrink-0 bg-white border-t border-slate-200 px-6 py-5">
        <div class="flex items-end gap-4 bg-slate-50 border-2 border-slate-200 rounded-2xl px-5 py-4 focus-within:border-indigo-400 focus-within:bg-white focus-within:shadow-md transition-all">
          <div id="input-avatar" class="avatar w-9 h-9 rounded-xl text-[12px] shrink-0 mb-0.5"></div>
          <textarea id="chat-input"
            class="flex-1 bg-transparent text-base text-slate-800 placeholder-slate-400 outline-none font-medium leading-relaxed"
            placeholder="메시지를 입력하세요… (Enter: 전송 / Shift+Enter: 줄바꿈)"
            rows="2"></textarea>
          <button onclick="sendMessage()" id="send-btn"
            class="w-11 h-11 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white rounded-xl flex items-center justify-center transition-all shrink-0 outline-none mb-0.5 shadow-sm">
            <i data-lucide="send" class="w-5 h-5"></i>
          </button>
        </div>
        <p class="text-[11px] text-slate-400 font-medium mt-2 pl-1">Enter로 전송 · Shift+Enter로 줄바꿈</p>
      </div>
    </section>

  </div>
</main>

<script>
  lucide.createIcons();

  // Firebase 초기화
  const cfg = { apiKey:"AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM", authDomain:"book-c2d05.firebaseapp.com", projectId:"book-c2d05", storageBucket:"book-c2d05.firebasestorage.app", messagingSenderId:"566939045493", appId:"1:566939045493:web:da65c6ad61f528d446f23c" };
  const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(cfg);
  const auth = firebase.auth(app);
  const db   = firebase.firestore(app);

  let currentUser = null;
  let userName    = '';
  let studentId   = '';
  let currentRoom = 'general';
  let unsubscribeMessages = null;
  let unsubscribePresence = null;
  let presenceDocId = null;

  // 아바타 색상 배열
  const COLORS = [
    ['bg-blue-100','text-blue-700'],['bg-violet-100','text-violet-700'],
    ['bg-emerald-100','text-emerald-700'],['bg-rose-100','text-rose-700'],
    ['bg-amber-100','text-amber-700'],['bg-cyan-100','text-cyan-700'],
    ['bg-pink-100','text-pink-700'],['bg-indigo-100','text-indigo-700'],
  ];
  function getColor(name) {
    let n = 0; for (const c of (name||'?')) n += c.charCodeAt(0);
    return COLORS[n % COLORS.length];
  }
  function makeAvatar(name) {
    const [bg, text] = getColor(name);
    return `${bg} ${text}`;
  }

  // ── 인증 ──────────────────────────────────────────────
  auth.onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('login-wall').classList.replace('hidden','flex');
      return;
    }
    currentUser = user;
    userName  = user.displayName || user.email.split('@')[0];
    studentId = localStorage.getItem('studentId_' + user.uid) || '';

    // 네비 업데이트
    const [bg, tc] = getColor(userName);
    document.getElementById('nav-avatar').className = `avatar w-6 h-6 rounded-lg text-[10px] ${bg} ${tc}`;
    document.getElementById('nav-avatar').textContent = userName.charAt(0);
    document.getElementById('nav-name').textContent   = userName;
    document.getElementById('nav-user').classList.replace('hidden','flex');

    document.getElementById('my-avatar').className   = `avatar w-7 h-7 rounded-lg text-[10px] ${bg} ${tc}`;
    document.getElementById('my-avatar').textContent  = userName.charAt(0);
    document.getElementById('my-name').textContent = userName;
    const ia = document.getElementById('input-avatar');
    if(ia){ia.className=`avatar w-8 h-8 rounded-xl text-[11px] shrink-0 mb-0.5 ${bg} ${tc}`;ia.textContent=userName.charAt(0);}

    document.getElementById('chat-app').classList.replace('hidden','flex');
    lucide.createIcons();

    // 접속자 등록
    await registerPresence();
    listenPresence();
    switchRoom('general', '# 자유 수다방');
  });

  // ── 접속자 관리 ───────────────────────────────────────
  async function registerPresence() {
    try {
      const ref = await db.collection('chat_presence').add({
        uid: currentUser.uid, name: userName, studentId,
        joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
        room: currentRoom
      });
      presenceDocId = ref.id;
      window.addEventListener('beforeunload', removePresence);
    } catch(e) { console.warn('presence error:', e); }
  }
  async function updatePresenceRoom(room) {
    if (!presenceDocId) return;
    try { await db.collection('chat_presence').doc(presenceDocId).update({ room }); } catch(e) {}
  }
  function removePresence() {
    if (presenceDocId)
      db.collection('chat_presence').doc(presenceDocId).delete().catch(()=>{});
  }
  function listenPresence() {
    if (unsubscribePresence) unsubscribePresence();
    unsubscribePresence = db.collection('chat_presence')
      .onSnapshot(snap => {
        const users = snap.docs.map(d => d.data()).filter(d => d.uid);
        const unique = Object.values(Object.fromEntries(users.map(u => [u.uid, u])));
        document.getElementById('online-count').textContent = unique.length;
        const list = document.getElementById('online-list');
        list.innerHTML = unique.map(u => {
          const [bg, tc] = getColor(u.name);
          const isMe = u.uid === currentUser.uid;
          return `<div class="flex items-center gap-2 px-2 py-1.5 rounded-lg ${isMe?'bg-indigo-50':''}">
            <div class="relative">
              <div class="avatar w-7 h-7 rounded-lg text-[10px] ${bg} ${tc}">${(u.name||'?').charAt(0)}</div>
              <div class="absolute bottom-0 right-0 w-2 h-2 bg-emerald-400 border-2 border-white rounded-full"></div>
            </div>
            <div class="min-w-0">
              <p class="text-xs font-bold text-slate-700 truncate">${u.name}${isMe?' (나)':''}</p>
              ${u.studentId ? `<p class="text-[10px] text-slate-400">${u.studentId}</p>` : ''}
            </div>
          </div>`;
        }).join('');
      });
  }

  // ── 채팅방 전환 ───────────────────────────────────────
  function switchRoom(room, title, btn) {
    currentRoom = room;
    document.getElementById('room-title').textContent = title.replace('# ','');

    // 채널 버튼 활성화
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    updatePresenceRoom(room);
    listenMessages(room);
    lucide.createIcons();
  }

  // ── 메시지 실시간 구독 ────────────────────────────────
  function listenMessages(room) {
    if (unsubscribeMessages) unsubscribeMessages();
    document.getElementById('chat-messages').innerHTML =
      '<div id="msgs-loading" class="flex justify-center py-8"><div class="text-sm text-slate-400 font-medium">불러오는 중...</div></div>';

    unsubscribeMessages = db.collection('chat_rooms').doc(room)
      .collection('messages')
      .orderBy('createdAt','asc')
      .limitToLast(100)
      .onSnapshot(snap => {
        const msgs = document.getElementById('chat-messages');

        snap.docChanges().forEach(change => {
          if (change.type === 'added') {
            // 로딩 제거
            const loading = document.getElementById('msgs-loading');
            if (loading) loading.remove();

            const d   = change.doc.data();
            const mid = change.doc.id;
            if (!document.getElementById('msg-' + mid)) {
              const el = document.createElement('div');
              el.id = 'msg-' + mid;
              el.className = 'msg-enter';
              const isMine = d.uid === currentUser.uid;
              el.innerHTML = renderMessage(d, mid, isMine);
              msgs.appendChild(el);
              scrollBottom();
              lucide.createIcons();
            }
          }
          if (change.type === 'removed') {
            const el = document.getElementById('msg-' + change.doc.id);
            if (el) el.remove();
          }
        });

        // 메시지 없을 때
        if (snap.empty) {
          msgs.innerHTML = '<div class="flex flex-col items-center py-12 text-slate-400 space-y-2"><i data-lucide="message-square" class="w-10 h-10 text-slate-200"></i><p class="text-sm font-medium">첫 메시지를 남겨보세요!</p></div>';
          lucide.createIcons();
        }

        // 방 메시지 수
        document.getElementById('room-count').textContent = snap.size + '개 메시지';
      });
  }

  function renderMessage(d, mid, isMine) {
    const [bg, tc] = getColor(d.userName||'?');
    const time = d.createdAt ? formatTime(d.createdAt.toDate()) : '';
    const text = (d.text||'').replace(/\n/g,'<br>').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/&lt;br&gt;/g,'<br>');

    if (isMine) {
      return `<div class="flex items-end justify-end gap-3">
        <div class="flex flex-col items-end">
          <div class="flex items-baseline gap-2 mb-1.5">
            <span class="text-[12px] text-slate-400">${time}</span>
            <span class="text-sm font-black text-slate-700">${d.userName||'-'}${d.studentId?' ('+d.studentId+')':''}</span>
          </div>
          <div class="bg-indigo-600 text-white px-5 py-3 rounded-2xl rounded-br-sm text-[15px] leading-relaxed max-w-lg break-words shadow-sm">
            ${text}
          </div>
        </div>
        <div class="avatar ${bg} ${tc} mb-1 w-10 h-10 rounded-xl text-[13px]">${(d.userName||'?').charAt(0)}</div>
      </div>`;
    } else {
      return `<div class="flex items-end gap-3">
        <div class="avatar ${bg} ${tc} mb-1 w-10 h-10 rounded-xl text-[13px]">${(d.userName||'?').charAt(0)}</div>
        <div class="flex flex-col">
          <div class="flex items-baseline gap-2 mb-1.5">
            <span class="text-sm font-black text-slate-700">${d.userName||'-'}${d.studentId?' ('+d.studentId+')':''}</span>
            <span class="text-[12px] text-slate-400">${time}</span>
          </div>
          <div class="bg-white border border-slate-200 text-slate-800 px-5 py-3 rounded-2xl rounded-bl-sm text-[15px] leading-relaxed max-w-lg break-words shadow-sm">
            ${text}
          </div>
        </div>
      </div>`;
    }
  }

  function formatTime(date) {
    let h = date.getHours(), m = date.getMinutes();
    const ap = h >= 12 ? '오후' : '오전';
    h = h % 12 || 12;
    return `${ap} ${h}:${m.toString().padStart(2,'0')}`;
  }

  // ── 메시지 전송 ───────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text || !currentUser) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    try {
      await db.collection('chat_rooms').doc(currentRoom)
        .collection('messages').add({
          uid: currentUser.uid,
          userName, studentId, text,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(e) { alert('메시지 전송 실패: ' + e.message); input.value = text; }
    finally { btn.disabled = false; input.focus(); }
  }

  // ── 내 메시지 삭제 ─────────────────────────────────────
  async function clearMyMessages() {
    if (!confirm('이 채팅방에서 내가 보낸 메시지를 모두 삭제할까요?')) return;
    try {
      const snap = await db.collection('chat_rooms').doc(currentRoom)
        .collection('messages').where('uid','==',currentUser.uid).get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    } catch(e) { alert('삭제 오류: ' + e.message); }
  }

  function scrollBottom() {
    const el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
  }

  // 입력창 키 이벤트
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
