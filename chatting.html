    <!-- 채팅 영역 (w-full 추가하여 오른쪽 전체 채움) -->

      <!-- 헤더 -->

<!-- 모둠 회원 설정 모달 -->

      <h3 class="text-lg font-black text-slate-900 flex items-center gap-2">

      <div id="group-mgmt-content" class="text-center py-8 text-slate-400 text-sm">학생 목록 불러오는 중...</div>

    <div class="px-7 py-5 border-t border-slate-100 shrink-0 flex justify-between items-center">

      <button onclick="closeGroupMgmt()" class="bg-indigo-600 text-white font-bold px-6 py-2.5 rounded-xl hover:bg-indigo-700 transition-colors text-sm">완료</button>
    </div>
  </div>
</div>

<script>
  const ADMIN_EMAIL = 'sungce27@gmail.com';
  const TEAMS = ['team1','team2','team3','team4','team5','team6'];
  const TEAM_LABELS = { team1:'모둠1', team2:'모둠2', team3:'모둠3', team4:'모둠4', team5:'모둠5', team6:'모둠6' };

  function toggleTeamDropdown() {
    const dd   = document.getElementById('team-dropdown');
    const chev = document.getElementById('team-chevron');
    const open = !dd.classList.contains('hidden');
    dd.classList.toggle('hidden', open);
    chev.style.transform = open ? '' : 'rotate(180deg)';
    lucide.createIcons();
  }

  lucide.createIcons();

  if (window.self !== window.top) {
    const nav = document.querySelector('nav');
    if (nav) { nav.style.display = 'none'; nav.style.height = '0'; }
  }

  const cfg = { apiKey:"AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM", authDomain:"book-c2d05.firebaseapp.com", projectId:"book-c2d05", storageBucket:"book-c2d05.firebasestorage.app", messagingSenderId:"566939045493", appId:"1:566939045493:web:da65c6ad61f528d446f23c" };
  const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(cfg);
  const auth = firebase.auth(app);
  const db   = firebase.firestore(app);

  let currentUser = null;
  let userName    = '';
  let studentId   = '';
  let currentRoom = 'general';
  let unsubscribeMessages = null;
  let unsubscribePresence = null;
  let presenceDocId = null;

  const COLORS = [
    ['bg-blue-100','text-blue-700'],['bg-violet-100','text-violet-700'],
    ['bg-emerald-100','text-emerald-700'],['bg-rose-100','text-rose-700'],
    ['bg-amber-100','text-amber-700'],['bg-cyan-100','text-cyan-700'],
    ['bg-pink-100','text-pink-700'],['bg-indigo-100','text-indigo-700'],
  ];
  function getColor(name) {
    let n = 0; for (const c of (name||'?')) n += c.charCodeAt(0);
    return COLORS[n % COLORS.length];
  }
  function makeAvatar(name) {
    const [bg, text] = getColor(name);
    return `${bg} ${text}`;
  }

  auth.onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('login-wall').classList.replace('hidden','flex');
      return;
    }
    currentUser = user;
    userName  = user.displayName || user.email.split('@')[0];
    studentId = localStorage.getItem('studentId_' + user.uid) || '';

    const [bg, tc] = getColor(userName);
    document.getElementById('nav-avatar').className = `avatar w-6 h-6 rounded-lg text-[10px] ${bg} ${tc}`;
    document.getElementById('nav-avatar').textContent = userName.charAt(0);
    document.getElementById('nav-name').textContent   = userName;
    document.getElementById('nav-user').classList.replace('hidden','flex');

    document.getElementById('my-avatar').className   = `avatar w-7 h-7 rounded-lg text-[10px] ${bg} ${tc}`;
    document.getElementById('my-avatar').textContent  = userName.charAt(0);
    document.getElementById('my-name').textContent = userName;
    const ia = document.getElementById('input-avatar');
    if(ia){ia.className=`avatar w-8 h-8 rounded-xl text-[11px] shrink-0 mb-0.5 ${bg} ${tc}`;ia.textContent=userName.charAt(0);}

    document.getElementById('chat-app').classList.replace('hidden','flex');
    lucide.createIcons();

    if (currentUser.email === ADMIN_EMAIL) {
      const btn = document.getElementById('group-mgmt-btn');
      btn.classList.remove('hidden'); btn.classList.add('flex');
    }

    await loadMyTeam();
    await registerPresence();
    listenPresence();
    switchRoom('general', '자유 수다방');
  });

  async function registerPresence() {
    try {
      const ref = await db.collection('chat_presence').add({
        uid: currentUser.uid, name: userName, studentId,
        joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
        room: currentRoom
      });
      presenceDocId = ref.id;
      window.addEventListener('beforeunload', removePresence);
    } catch(e) { console.warn('presence error:', e); }
  }
  async function updatePresenceRoom(room) {
    if (!presenceDocId) return;
    try { await db.collection('chat_presence').doc(presenceDocId).update({ room }); } catch(e) {}
  }
  function removePresence() {
    if (presenceDocId) db.collection('chat_presence').doc(presenceDocId).delete().catch(()=>{});
  }
  function listenPresence() {
    if (unsubscribePresence) unsubscribePresence();
    unsubscribePresence = db.collection('chat_presence').onSnapshot(snap => {
      const users = snap.docs.map(d => d.data()).filter(d => d.uid);
      const unique = Object.values(Object.fromEntries(users.map(u => [u.uid, u])));
      document.getElementById('online-count').textContent = unique.length;
      const list = document.getElementById('online-list');
      list.innerHTML = unique.map(u => {
        const [bg, tc] = getColor(u.name);
        const isMe = u.uid === currentUser.uid;
        return `<div class="flex items-center gap-2 px-2 py-1.5 rounded-lg ${isMe?'bg-indigo-50':''}">
          <div class="relative">
            <div class="avatar w-7 h-7 rounded-lg text-[10px] ${bg} ${tc}">${(u.name||'?').charAt(0)}</div>
            <div class="absolute bottom-0 right-0 w-2 h-2 bg-emerald-400 border-2 border-white rounded-full"></div>
          </div>
          <div class="min-w-0">
            <p class="text-xs font-bold text-slate-700 truncate">${u.name}${isMe?' (나)':''}</p>
            ${u.studentId ? `<p class="text-[10px] text-slate-400">${u.studentId}</p>` : ''}
          </div>
        </div>`;
      }).join('');
    });
  }

  async function loadMyTeam() {
    try {
      const snap = await db.collection('chat_groups').where('uid','==', currentUser.uid).limit(1).get();
      if (!snap.empty) {
        const myGroup = snap.docs[0].data().group;
        const badge = document.getElementById('my-team-badge-' + myGroup);
        if (badge) badge.classList.remove('hidden');
        const nameEl = document.getElementById('my-name');
        if (nameEl && TEAM_LABELS[myGroup]) {
          nameEl.innerHTML = `${userName} <span class="text-[10px] text-indigo-500 font-black">${TEAM_LABELS[myGroup]}</span>`;
        }
      }
    } catch(e) {}
  }

  function openGroupMgmt() {
    document.getElementById('group-mgmt-modal').classList.remove('hidden');
    document.getElementById('group-mgmt-modal').classList.add('flex');
    renderGroupMgmt();
  }
  function closeGroupMgmt() {
    document.getElementById('group-mgmt-modal').classList.add('hidden');
    document.getElementById('group-mgmt-modal').classList.remove('flex');
  }

  async function renderGroupMgmt() {
    const content = document.getElementById('group-mgmt-content');
    content.innerHTML = '<div class="text-center py-4 text-slate-400 text-sm">불러오는 중...</div>';
    try {
      const presenceSnap = await db.collection('chat_presence').get().catch(e => { return { docs: [] }; });
      const groupSnap = await db.collection('chat_groups').get();
      
      const groupMap = {}; 
      groupSnap.docs.forEach(d => { groupMap[d.data().uid] = d.data().group; });

      const usersMap = {};
      presenceSnap.docs.forEach(d => {
        const u = d.data();
        if (u.uid) usersMap[u.uid] = u;
      });

      let membersList = Object.values(usersMap);
      try {
        const ms = await db.collection('members').get();
        if (!ms.empty) membersList = ms.docs.map(d => d.data());
      } catch(e) {}

      if (!membersList.length) {
        content.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">접속한 학생이 없습니다. 학생들이 먼저 로그인해야 합니다.</div>';
        return;
      }

      content.innerHTML = `
        <div class="space-y-4">
          ${TEAMS.map(team => {
            const members = membersList.filter(u => groupMap[u.uid] === team);
            return `<div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
              <p class="text-sm font-black text-slate-700 mb-3 flex items-center gap-2">
                <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-xs font-black">${team.replace('team','')}</span>
                ${TEAM_LABELS[team]} 수다방
                <span class="text-xs text-slate-400 font-normal">(${members.length}명)</span>
              </p>
              ${members.map(u => `
                <div class="flex items-center justify-between bg-white rounded-xl px-3 py-2 mb-1.5 border border-slate-100">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold ${makeAvatar(u.name||u.userName||'?')}">${(u.name||u.userName||'?').charAt(0)}</div>
                    <div>
                      <p class="text-xs font-bold text-slate-700">${u.name||u.userName||'-'}</p>
                      <p class="text-[10px] text-slate-400">${u.studentId||''}</p>
                    </div>
                  </div>
                  <button onclick="removeFromGroup('${u.uid}')" class="text-xs text-rose-400 hover:text-rose-600 font-bold">제거</button>
                </div>`).join('')}
            </div>`;
          }).join('')}

          <div class="bg-amber-50 rounded-2xl p-4 border border-amber-100">
            <p class="text-sm font-black text-amber-700 mb-3">미배정 학생</p>
            ${membersList.filter(u => !groupMap[u.uid]).map(u => `
              <div class="flex items-center justify-between bg-white rounded-xl px-3 py-2 mb-1.5 border border-slate-100">
                <div class="flex items-center gap-2">
                  <div class="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold ${makeAvatar(u.name||u.userName||'?')}">${(u.name||u.userName||'?').charAt(0)}</div>
                  <div>
                    <p class="text-xs font-bold text-slate-700">${u.name||u.userName||'-'}</p>
                    <p class="text-[10px] text-slate-400">${u.studentId||''}</p>
                  </div>
                </div>
                <select onchange="assignToGroup('${u.uid}','${u.name||u.userName||''}','${u.studentId||''}', this.value)"
                  class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 font-bold focus:outline-none focus:ring-2 focus:ring-indigo-400">
                  <option value="">모둠 선택</option>
                  ${TEAMS.map(t=>`<option value="${t}">${TEAM_LABELS[t]}</option>`).join('')}
                </select>
              </div>`).join('') || '<p class="text-xs text-amber-500 font-medium">모든 학생이 모둠에 배정되었습니다 ✅</p>'}
          </div>
        </div>`;
    } catch(e) {
      content.innerHTML = `
        <div class="text-center py-8 text-rose-500 text-sm font-bold flex flex-col items-center gap-2">
          <i data-lucide="shield-alert" class="w-8 h-8"></i>
          오류: Firebase 보안 규칙 권한이 부족합니다.
          <span class="text-slate-500 font-medium text-xs mt-2 text-left block max-w-sm">
            Firebase 콘솔 > Firestore Database > Rules 탭에서 읽기/쓰기 권한(allow read, write: if request.auth != null;)을 허용으로 변경해주세요.
          </span>
        </div>`;
      lucide.createIcons();
    }
  }

  async function assignToGroup(uid, name, studentId, group) {
    if (!group) return;
    try {
      const old = await db.collection('chat_groups').where('uid','==',uid).get();
      const batch = db.batch();
      old.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
      await db.collection('chat_groups').add({ uid, name, studentId, group, assignedAt: firebase.firestore.FieldValue.serverTimestamp() });
      renderGroupMgmt();
    } catch(e) { alert('배정 오류: ' + e.message); }
  }

  async function removeFromGroup(uid) {
    try {
      const snap = await db.collection('chat_groups').where('uid','==',uid).get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
      renderGroupMgmt();
    } catch(e) { alert('제거 오류: ' + e.message); }
  }

  function switchRoom(room, title, btn) {
    currentRoom = room;
    document.getElementById('room-title').textContent = title.replace('# ','');
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    updatePresenceRoom(room);
    listenMessages(room);
    lucide.createIcons();
  }

  function listenMessages(room) {
    if (unsubscribeMessages) unsubscribeMessages();
    document.getElementById('chat-messages').innerHTML = '<div id="msgs-loading" class="flex justify-center py-8"><div class="text-sm text-slate-400 font-medium">불러오는 중...</div></div>';

    unsubscribeMessages = db.collection('chat_rooms').doc(room).collection('messages').orderBy('createdAt','asc').limitToLast(100).onSnapshot(snap => {
        const msgs = document.getElementById('chat-messages');
        snap.docChanges().forEach(change => {
          if (change.type === 'added') {
            const loading = document.getElementById('msgs-loading');
            if (loading) loading.remove();

            const d   = change.doc.data();
            const mid = change.doc.id;
            if (!document.getElementById('msg-' + mid)) {
              const el = document.createElement('div');
              el.id = 'msg-' + mid;
              el.className = 'msg-enter';
              const isMine = d.uid === currentUser.uid;
              el.innerHTML = renderMessage(d, mid, isMine);
              msgs.appendChild(el);
              scrollBottom();
              lucide.createIcons();
            }
          }
          if (change.type === 'removed') {
            const el = document.getElementById('msg-' + change.doc.id);
            if (el) el.remove();
          }
        });

        if (snap.empty) {
          msgs.innerHTML = '<div class="flex flex-col items-center py-12 text-slate-400 space-y-2"><i data-lucide="message-square" class="w-10 h-10 text-slate-200"></i><p class="text-sm font-medium">첫 메시지를 남겨보세요!</p></div>';
          lucide.createIcons();
        }
        document.getElementById('room-count').textContent = snap.size + '개 메시지';
      });
  }

  // ★ 말풍선 최대 너비를 85%까지 사용할 수 있도록 변경하여 넓은 화면을 꽉 채웁니다.
  function renderMessage(d, mid, isMine) {
    const [bg, tc] = getColor(d.userName||'?');
    const time = d.createdAt ? formatTime(d.createdAt.toDate()) : '';
    const text = (d.text||'').replace(/\n/g,'<br>').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/&lt;br&gt;/g,'<br>');

    if (isMine) {
      return `<div class="flex items-end justify-end gap-3">
        <div class="flex flex-col items-end max-w-[85%]">
          <div class="flex items-baseline gap-2 mb-1.5">
            <span class="text-[12px] text-slate-400">${time}</span>
            <span class="text-sm font-black text-slate-700">${d.userName||'-'}${d.studentId?' ('+d.studentId+')':''}</span>
          </div>
          <div class="bg-indigo-600 text-white px-5 py-3 rounded-2xl rounded-br-sm text-[15px] leading-relaxed break-words shadow-sm w-fit">
            ${text}
          </div>
        </div>
        <div class="avatar ${bg} ${tc} mb-1 w-10 h-10 rounded-xl text-[13px]">${(d.userName||'?').charAt(0)}</div>
      </div>`;
    } else {
      return `<div class="flex items-end gap-3">
        <div class="avatar ${bg} ${tc} mb-1 w-10 h-10 rounded-xl text-[13px]">${(d.userName||'?').charAt(0)}</div>
        <div class="flex flex-col max-w-[85%]">
          <div class="flex items-baseline gap-2 mb-1.5">
            <span class="text-sm font-black text-slate-700">${d.userName||'-'}${d.studentId?' ('+d.studentId+')':''}</span>
            <span class="text-[12px] text-slate-400">${time}</span>
          </div>
          <div class="bg-white border border-slate-200 text-slate-800 px-5 py-3 rounded-2xl rounded-bl-sm text-[15px] leading-relaxed break-words shadow-sm w-fit">
            ${text}
          </div>
        </div>
      </div>`;
    }
  }

  function formatTime(date) {
    let h = date.getHours(), m = date.getMinutes();
    const ap = h >= 12 ? '오후' : '오전';
    h = h % 12 || 12;
    return `${ap} ${h}:${m.toString().padStart(2,'0')}`;
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text || !currentUser) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    try {
      await db.collection('chat_rooms').doc(currentRoom).collection('messages').add({
          uid: currentUser.uid, userName, studentId, text,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(e) { alert('메시지 전송 실패: ' + e.message); input.value = text; }
    finally { btn.disabled = false; input.focus(); }
  }

  async function clearMyMessages() {
    if (!confirm('이 채팅방에서 내가 보낸 메시지를 모두 삭제할까요?')) return;
    try {
      const snap = await db.collection('chat_rooms').doc(currentRoom).collection('messages').where('uid','==',currentUser.uid).get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    } catch(e) { alert('삭제 오류: ' + e.message); }
  }

  function scrollBottom() {
    const el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
  }

  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
