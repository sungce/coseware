<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 놀이터 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f8fafc; }
  .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
</style>
</head>
<body class="min-h-screen">
  <!-- 네비게이션 바 (1줄 레이아웃으로 변경) -->
  <nav class="fixed w-full top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
    <div class="max-w-[1400px] mx-auto px-4 md:px-6">
      <div class="flex justify-between items-center h-16 lg:h-20">
        <!-- 1. 로고 (좌측) -->
        <a href="index.html" class="flex items-center space-x-2 shrink-0">
          <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white w-9 h-9 rounded-xl flex items-center justify-center text-xs font-bold">AI</div>
          <div>
            <div class="text-[15px] font-bold text-slate-900 leading-tight">Sungce <span class="text-blue-600">AI-ON</span></div>
            <div class="text-[12px] font-medium text-slate-500 leading-tight">정보 교과 클래스룸</div>
          </div>
        </a>

        <!-- 2. 우측 영역 (메뉴 + 버튼) -->
        <div class="flex items-center space-x-6 lg:space-x-8">
          
          <!-- 메뉴 링크 -->
          <div class="hidden md:flex items-center space-x-6 xl:space-x-8 text-[14px] font-bold text-slate-600">
            <a href="curriculum/index.html" class="hover:text-blue-600 transition-colors">교과 수업</a>
            <span class="text-blue-600 border-b-2 border-blue-600 pb-1">코드 놀이터</span>
            <a href="data_play.html" class="hover:text-blue-600 transition-colors">데이터 실습실</a>
            <a href="chatting.html" class="hover:text-blue-600 transition-colors">Vibe Room</a>
          </div>

          <!-- 메인으로 버튼 -->
          <a href="index.html" class="flex items-center space-x-2 text-slate-500 hover:text-blue-600 text-sm font-bold bg-slate-50 border border-slate-200 px-3.5 py-2 rounded-xl transition-colors shrink-0">
            <i data-lucide="home" class="w-4 h-4"></i><span class="hidden sm:inline">메인으로</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 pt-28 pb-16">
    <!-- 헤더 -->
    <div class="mb-10">
      <div class="inline-flex items-center space-x-2 bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold mb-4 border border-green-100">
        <i data-lucide="code-2" class="w-3.5 h-3.5"></i><span>인터렉티브 수업실</span>
      </div>
      <h1 class="text-4xl font-black text-slate-900 mb-3">코드 놀이터 <span class="text-green-500">🎮</span></h1>
      <p class="text-lg text-slate-500 font-medium">직접 코드를 작성하고 결과를 바로 확인해보세요.</p>
    </div>

    <!-- 에디터 영역 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <div class="card p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-black text-slate-800 flex items-center space-x-2">
            <i data-lucide="file-code" class="w-5 h-5 text-green-500"></i><span>Python 코드 작성</span>
          </h2>
          <button onclick="runCode()" class="bg-green-500 hover:bg-green-600 text-white text-sm font-bold px-4 py-2 rounded-xl transition-colors flex items-center space-x-1.5">
            <i data-lucide="play" class="w-4 h-4"></i><span>실행</span>
          </button>
        </div>
        <textarea id="code-input" rows="16"
          class="w-full bg-slate-900 text-green-400 font-mono text-sm p-4 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-green-500 leading-relaxed"
          placeholder="# Python 코드를 입력하세요&#10;&#10;print('안녕하세요!')&#10;&#10;for i in range(5):&#10;    print(f'{i+1}번째 출력')">print('안녕하세요, 코드 놀이터!')

for i in range(5):
    print(f'{i+1}번째: {"⭐" * (i+1)}')</textarea>
      </div>
      <div class="card p-6">
        <h2 class="text-base font-black text-slate-800 flex items-center space-x-2 mb-4">
          <i data-lucide="terminal" class="w-5 h-5 text-slate-600"></i><span>실행 결과</span>
        </h2>
        <div id="output" class="bg-slate-900 text-slate-300 font-mono text-sm p-4 rounded-xl h-[calc(100%-52px)] min-h-[280px] whitespace-pre-wrap overflow-y-auto leading-relaxed">
          <span class="text-slate-500">▶ 실행 버튼을 눌러 결과를 확인하세요</span>
        </div>
      </div>
    </div>

    <!-- 예제 카드 -->
    <h2 class="text-lg font-black text-slate-800 mb-4">🧩 예제 코드 모음</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <button onclick="loadExample('hello')" class="card p-5 text-left hover:border-green-200 hover:bg-green-50/40 transition-all group">
        <div class="w-10 h-10 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform"><i data-lucide="smile" class="w-5 h-5"></i></div>
        <p class="text-sm font-black text-slate-800">Hello, World!</p>
        <p class="text-xs text-slate-400 mt-1">기본 출력 예제</p>
      </button>
      <button onclick="loadExample('loop')" class="card p-5 text-left hover:border-blue-200 hover:bg-blue-50/40 transition-all group">
        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform"><i data-lucide="repeat" class="w-5 h-5"></i></div>
        <p class="text-sm font-black text-slate-800">반복문 예제</p>
        <p class="text-xs text-slate-400 mt-1">for / while 반복</p>
      </button>
      <button onclick="loadExample('list')" class="card p-5 text-left hover:border-purple-200 hover:bg-purple-50/40 transition-all group">
        <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform"><i data-lucide="list" class="w-5 h-5"></i></div>
        <p class="text-sm font-black text-slate-800">리스트 예제</p>
        <p class="text-xs text-slate-400 mt-1">리스트 생성과 활용</p>
      </button>
    </div>
  </main>

  <script>
    lucide.createIcons();
    const examples = {
      hello: `# Hello, World! 예제\nprint("Hello, World!")\nprint("안녕하세요, Python!")\nname = "학생"\nprint(f"반갑습니다, {name}님!")`,
      loop: `# 반복문 예제\nprint("=== for 반복문 ===")\nfor i in range(1, 6):\n    print(f"  {i}번: {'★' * i}")\n\nprint("\\n=== while 반복문 ===")\nn = 1\nwhile n <= 5:\n    print(f"  {n} × {n} = {n*n}")\n    n += 1`,
      list: `# 리스트 예제\nfruits = ["사과", "바나나", "딸기", "포도"]\nprint("과일 목록:")\nfor i, fruit in enumerate(fruits, 1):\n    print(f"  {i}. {fruit}")\n\nprint(f"\\n총 {len(fruits)}개의 과일")\nfruits.append("망고")\nprint(f"망고 추가 후: {fruits}")`
    };

    function loadExample(key) {
      document.getElementById('code-input').value = examples[key];
    }

    function runCode() {
      const code = document.getElementById('code-input').value;
      const out  = document.getElementById('output');
      out.innerHTML = '<span class="text-yellow-400">⚡ Python 실행 환경은 서버 연동이 필요합니다.</span>\n\n<span class="text-slate-400">▶ 아래 온라인 환경을 활용해보세요:</span>\n\n<a href="https://colab.research.google.com" target="_blank" class="text-blue-400 underline">Google Colab 열기 →</a>\n<a href="https://replit.com" target="_blank" class="text-green-400 underline">Replit 열기 →</a>';
    }
  </script>
</body>
</html>
