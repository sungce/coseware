<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러리 관리 - 정보 클래스룸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family:'Pretendard',sans-serif; -webkit-font-smoothing:antialiased; }
        .fade-in { animation:fadeIn .45s cubic-bezier(.16,1,.3,1) forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .card { background:#fff; border-radius:1.5rem; border:1px solid #f1f5f9; box-shadow:0 1px 4px rgba(0,0,0,.05); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" style="background-image:radial-gradient(#e2e8f0 1px,transparent 1px);background-size:32px 32px;">

    <div id="access-denied" class="fixed inset-0 z-[200] bg-white hidden flex-col items-center justify-center">
        <i data-lucide="shield-off" class="w-10 h-10 text-rose-400 mb-4"></i>
        <h2 class="text-xl font-black text-slate-900 mb-2">접근 권한 없음</h2>
        <a href="index.html" class="mt-4 bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold">메인으로</a>
    </div>

    <nav class="fixed w-full top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center py-4">
            <div class="flex items-center space-x-4">
                <a href="admin.html" class="text-slate-400 hover:text-slate-700 p-2 rounded-lg hover:bg-slate-100 transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-br from-amber-400 to-orange-500 text-white p-2.5 rounded-xl shadow-lg shadow-amber-500/30">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                    </div>
                    <span class="font-black text-lg text-slate-900">My Project Gallery 관리</span>
                    <span class="text-xs bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full">Admin</span>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <a href="gallery.html" target="_blank" class="hidden sm:flex items-center space-x-2 text-slate-500 hover:text-amber-600 bg-slate-50 hover:bg-amber-50 border border-slate-200 hover:border-amber-200 px-3 py-2 rounded-xl text-sm font-bold transition-all">
                    <i data-lucide="external-link" class="w-4 h-4"></i><span>갤러리 보기</span>
                </a>
                <div class="hidden sm:flex items-center space-x-2 bg-slate-100 px-4 py-2 rounded-xl">
                    <i data-lucide="user-check" class="w-4 h-4 text-slate-500"></i>
                    <span id="admin-name" class="text-sm font-bold text-slate-700"></span>
                </div>
                <button onclick="handleSignOut()" class="flex items-center space-x-1.5 text-slate-500 hover:text-rose-500 px-3 py-2 rounded-xl hover:bg-rose-50 text-sm font-bold transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i><span class="hidden sm:inline">로그아웃</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-28 pb-24 fade-in">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

            <!-- 프로젝트 등록 폼 -->
            <div class="lg:col-span-2 card p-7">
                <h2 class="text-lg font-black text-slate-900 mb-5 flex items-center space-x-2">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-amber-500"></i><span>프로젝트 등록</span>
                </h2>
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">년도</label>
                        <input type="number" id="proj-year" placeholder="예: 2026" value="2026"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">팀명</label>
                        <input type="text" id="proj-team" placeholder="예: Team Alpha"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">프로젝트명</label>
                        <input type="text" id="proj-title" placeholder="프로젝트 이름"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">설명</label>
                        <textarea id="proj-desc" rows="3" placeholder="프로젝트 설명"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all resize-none"></textarea>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">프로젝트 링크 (선택)</label>
                        <input type="url" id="proj-link" placeholder="https://..."
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">카드 색상</label>
                        <select id="proj-color" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all">
                            <option value="from-blue-400 to-indigo-500">파란색</option>
                            <option value="from-emerald-400 to-teal-500">초록색</option>
                            <option value="from-orange-400 to-rose-400">주황색</option>
                            <option value="from-purple-400 to-pink-500">보라색</option>
                            <option value="from-cyan-400 to-blue-500">하늘색</option>
                            <option value="from-amber-400 to-orange-500">황금색</option>
                        </select>
                    </div>
                    <button onclick="addProject()" id="proj-add-btn"
                        class="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold py-3 rounded-xl hover:shadow-lg hover:shadow-amber-500/20 transition-all flex items-center justify-center space-x-2">
                        <i data-lucide="plus" class="w-4 h-4"></i><span>프로젝트 등록</span>
                    </button>
                </div>
            </div>

            <!-- 프로젝트 목록 -->
            <div class="lg:col-span-3 card p-7">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-black text-slate-900 flex items-center space-x-2">
                        <i data-lucide="layout-grid" class="w-5 h-5 text-amber-500"></i><span>등록된 프로젝트</span>
                    </h2>
                    <button onclick="loadProjects()" class="flex items-center space-x-1.5 text-xs font-bold text-slate-500 hover:text-amber-600 bg-slate-50 hover:bg-amber-50 px-3 py-2 rounded-xl border border-slate-100 hover:border-amber-100 transition-all">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i><span>새로고침</span>
                    </button>
                </div>
                <div id="projects-list">
                    <div class="py-10 flex flex-col items-center space-y-2 text-slate-400">
                        <i data-lucide="loader" class="w-6 h-6 animate-spin text-amber-400"></i>
                        <span class="text-sm font-medium">불러오는 중...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900/95 text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-32 opacity-0 z-50 flex items-center space-x-3 border border-slate-700">
        <div class="p-1.5 rounded-full bg-emerald-500/20"><i data-lucide="check" class="w-4 h-4 text-emerald-400" id="toast-icon"></i></div>
        <span class="font-medium text-sm" id="toast-msg"></span>
    </div>

    <script>
        const firebaseConfig = { apiKey:"AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM", authDomain:"book-c2d05.firebaseapp.com", projectId:"book-c2d05", storageBucket:"book-c2d05.firebasestorage.app", messagingSenderId:"566939045493", appId:"1:566939045493:web:da65c6ad61f528d446f23c" };
        const ADMIN_EMAILS = ['sungce27@gmail.com'];
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app), db = firebase.firestore(app);

        auth.onAuthStateChanged(user => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) { document.getElementById('access-denied').classList.remove('hidden'); document.getElementById('access-denied').classList.add('flex'); lucide.createIcons(); return; }
            document.getElementById('admin-name').textContent = user.displayName || user.email.split('@')[0];
            lucide.createIcons(); loadProjects();
        });
        async function handleSignOut() { await auth.signOut(); window.location.href = 'index.html'; }

        let allProjects = [];

        async function loadProjects() {
            const c = document.getElementById('projects-list');
            c.innerHTML = `<div class="py-8 flex flex-col items-center space-y-2 text-slate-400"><i data-lucide="loader" class="w-5 h-5 animate-spin text-amber-400"></i><span class="text-sm">불러오는 중...</span></div>`;
            lucide.createIcons();
            try {
                const snap = await db.collection('gallery_projects').orderBy('createdAt','desc').get();
                allProjects = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProjects();
            } catch(e) { c.innerHTML = `<p class="text-center text-sm text-slate-400 py-8">오류: ${e.message}</p>`; }
        }

        function renderProjects() {
            const c = document.getElementById('projects-list');
            if (!allProjects.length) { c.innerHTML=`<div class="py-10 flex flex-col items-center space-y-2 text-slate-400"><i data-lucide="inbox" class="w-8 h-8 text-slate-300"></i><p class="text-sm font-medium">등록된 프로젝트가 없습니다.</p></div>`; lucide.createIcons(); return; }
            c.innerHTML = `<div class="space-y-3">${allProjects.map(p=>`
                <div class="flex items-start justify-between p-4 bg-slate-50 hover:bg-white border border-slate-100 hover:border-slate-200 rounded-2xl transition-all">
                    <div class="flex items-center space-x-4 min-w-0">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${p.imgColor||'from-amber-400 to-orange-500'} flex items-center justify-center shrink-0 shadow-sm">
                            <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center space-x-2">
                                <p class="text-sm font-bold text-slate-800 truncate">${p.title}</p>
                                <span class="text-xs bg-amber-50 text-amber-600 font-bold px-2 py-0.5 rounded-lg shrink-0">${p.year}</span>
                            </div>
                            <p class="text-xs text-slate-400 font-medium">${p.team||''}</p>
                            <p class="text-xs text-slate-500 mt-1 line-clamp-1">${p.desc||''}</p>
                            ${p.link ? `<a href="${p.link}" target="_blank" class="text-xs text-blue-500 hover:underline">${p.link.slice(0,40)}...</a>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center space-x-1 ml-2 shrink-0">
                        <span class="text-xs text-slate-400 flex items-center space-x-0.5"><i data-lucide="heart" class="w-3 h-3 text-rose-400"></i><span>${p.likes||0}</span></span>
                        <button onclick="deleteProject('${p.id}','${(p.title||'').replace(/'/g,"\\'")}')"
                            class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>`).join('')}</div>`;
            lucide.createIcons();
        }

        async function addProject() {
            const year=document.getElementById('proj-year').value, team=document.getElementById('proj-team').value.trim(), title=document.getElementById('proj-title').value.trim(), desc=document.getElementById('proj-desc').value.trim(), link=document.getElementById('proj-link').value.trim(), imgColor=document.getElementById('proj-color').value;
            if (!title||!team) { showToast('팀명과 프로젝트명을 입력해주세요.','error'); return; }
            const btn=document.getElementById('proj-add-btn');
            btn.disabled=true; btn.innerHTML='<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>등록 중...</span>'; lucide.createIcons();
            try {
                await db.collection('gallery_projects').add({ year:parseInt(year), team, title, desc, link, imgColor, likes:0, createdAt:firebase.firestore.FieldValue.serverTimestamp() });
                ['proj-team','proj-title','proj-desc','proj-link'].forEach(id=>document.getElementById(id).value='');
                showToast(`"${title}" 프로젝트가 등록되었습니다! ✨`);
                loadProjects();
            } catch(e) { showToast('오류: '+e.message,'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i data-lucide="plus" class="w-4 h-4"></i><span>프로젝트 등록</span>'; lucide.createIcons(); }
        }

        async function deleteProject(id, title) {
            if (!confirm(`"${title}" 프로젝트를 삭제할까요?`)) return;
            await db.collection('gallery_projects').doc(id).delete();
            allProjects = allProjects.filter(p=>p.id!==id);
            renderProjects(); showToast('프로젝트가 삭제되었습니다.');
        }

        let toastTimeout;
        function showToast(message,type='success') {
            const toast=document.getElementById('toast'),icon=document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent=message;
            icon.className=type==='error'?'w-4 h-4 text-rose-400':'w-4 h-4 text-emerald-400';
            icon.setAttribute('data-lucide',type==='error'?'alert-circle':'check'); lucide.createIcons();
            clearTimeout(toastTimeout); toast.classList.remove('translate-y-32','opacity-0');
            toastTimeout=setTimeout(()=>toast.classList.add('translate-y-32','opacity-0'),4000);
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
