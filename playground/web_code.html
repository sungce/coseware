
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹 실습실 — Sungce AI-ON</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.378.0/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8fafc;
    --bg3: #f1f5f9;
    --bg4: #e2e8f0;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --accent: #3b82f6;
    --accent2: #2563eb;
    --accent-glow: rgba(59,130,246,0.18);
    --green: #059669;
    --green-dim: rgba(5,150,105,0.08);
    --red: #ef4444;
    --amber: #d97706;
    --purple: #7c3aed;
    --tab-active: #3b82f6;
    --radius: 10px;
    --radius-lg: 16px;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'Pretendard', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── NAV ── */
  nav {
    height: 56px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    z-index: 100;
    flex-shrink: 0;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    margin-right: 24px;
  }
  .nav-logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: white;
    letter-spacing: 0.02em;
  }
  .nav-logo-text { line-height: 1.2; }
  .nav-logo-title { font-size: 14px; font-weight: 800; color: #0f172a; }
  .nav-logo-title span { color: var(--accent); }
  .nav-logo-sub { font-size: 11px; font-weight: 500; color: var(--text3); }

  .nav-divider { width: 1px; height: 22px; background: var(--border2); margin: 0 20px; }

  .nav-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    color: #065f46;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .nav-badge svg { width: 11px; height: 11px; }

  .nav-title {
    font-size: 16px; font-weight: 800; color: var(--text);
    margin-left: 12px;
  }

  .nav-spacer { flex: 1; }

  .nav-actions { display: flex; align-items: center; gap: 8px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.15s;
    text-decoration: none;
  }
  .btn svg { width: 14px; height: 14px; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 0 0 var(--accent-glow);
  }
  .btn-primary:hover { background: #2563eb; box-shadow: 0 0 16px var(--accent-glow); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-run {
    background: #dcfce7;
    border: 1px solid #bbf7d0;
    color: #166534;
    font-size: 13px; font-weight: 700;
    padding: 7px 18px;
  }
  .btn-run:hover { background: #bbf7d0; box-shadow: 0 0 10px rgba(5,150,105,0.15); }
  .btn-run:active { transform: scale(0.97); }

  /* ── TOOLBAR ── */
  .toolbar {
    height: 44px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 6px;
    flex-shrink: 0;
  }

  .toolbar-tabs { display: flex; align-items: center; gap: 2px; flex: 1; }

  .tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 7px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    border: 1px solid transparent;
    color: var(--text3);
    background: transparent;
    font-family: var(--sans);
    white-space: nowrap;
  }
  .tab svg { width: 13px; height: 13px; }
  .tab:hover { color: var(--text2); background: var(--bg3); }

  .tab.active-html { color: #f97316; background: rgba(249,115,22,0.1); border-color: rgba(249,115,22,0.2); }
  .tab.active-css  { color: #3b82f6; background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
  .tab.active-js   { color: #f59e0b; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); }

  .tab-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-html { background: #f97316; }
  .dot-css  { background: #3b82f6; }
  .dot-js   { background: #f59e0b; }

  .toolbar-right { display: flex; align-items: center; gap: 6px; }

  .icon-btn {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 7px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; color: var(--text3);
    transition: all 0.15s; font-family: var(--sans);
  }
  .icon-btn svg { width: 14px; height: 14px; }
  .icon-btn:hover { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

  /* ── LAYOUT ── */
  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .panel-editor {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── EDITOR ── */
  .editor-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .code-editor {
    position: absolute; inset: 0;
    background: #fafbfc;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.7;
    color: #1e293b;
    padding: 16px 16px 16px 56px;
    border: none; outline: none; resize: none;
    width: 100%; height: 100%;
    tab-size: 2;
    caret-color: var(--accent);
    overflow: auto;
  }

  .code-editor:focus { outline: none; }

  .line-numbers {
    position: absolute;
    top: 0; left: 0;
    width: 44px;
    padding: 16px 8px 16px 0;
    text-align: right;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    color: var(--text3);
    background: #fafbfc;
    pointer-events: none;
    border-right: 1px solid var(--border);
    overflow: hidden;
    user-select: none;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    height: 26px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px;
    gap: 16px;
    flex-shrink: 0;
  }

  .status-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text3);
    font-family: var(--mono);
  }
  .status-item svg { width: 11px; height: 11px; }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }

  /* ── PREVIEW ── */
  .preview-header {
    height: 44px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
  }

  .traffic-lights { display: flex; align-items: center; gap: 5px; }
  .light {
    width: 11px; height: 11px; border-radius: 50%;
    cursor: default;
  }
  .light-red { background: #ff5f57; }
  .light-amber { background: #febc2e; }
  .light-green { background: #28c840; }

  .url-bar {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    height: 28px;
    display: flex; align-items: center;
    padding: 0 10px;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }
  .url-bar svg { width: 12px; height: 12px; color: #10b981; }

  .preview-frame {
    flex: 1;
    background: white;
    border: none;
    width: 100%;
  }

  /* ── EXAMPLES DRAWER ── */
  .examples-panel {
    width: 200px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .examples-header {
    padding: 12px 14px 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .example-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    transition: all 0.12s;
    border-bottom: 1px solid var(--border);
    border: none; background: transparent;
    width: 100%; text-align: left;
    font-family: var(--sans);
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .example-item:hover { background: var(--bg3); color: var(--text); }
  .example-item:last-child { border-bottom: none; }

  .example-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .example-info { min-width: 0; }
  .example-name { font-size: 12px; font-weight: 700; line-height: 1.2; }
  .example-desc { font-size: 10px; color: var(--text3); line-height: 1.2; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── SPLITTER ── */
  .splitter {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .splitter:hover { background: var(--accent); }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── NOTIFICATIONS ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: #ffffff;
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    color: #059669;
    transform: translateY(60px); opacity: 0;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast svg { width: 15px; height: 15px; }

  /* ── RESPONSIVE ADJUSTMENTS ── */
  @media (max-width: 900px) {
    .examples-panel { display: none; }
    .panel-editor { width: 50%; }
  }
  @media (max-width: 600px) {
    .panel-editor { display: none; }
    .panel-preview { width: 100%; }
  }

  /* syntax highlight colors for textarea */
  .code-editor.html-mode { color: #e6edf3; }
  .code-editor.css-mode  { color: #e6edf3; }
  .code-editor.js-mode   { color: #e6edf3; }

  .auto-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }
</style>
</head>
<body>

<!-- 페이지 제목 -->
<div style="padding:28px 32px 20px;background:var(--bg);">
  <div style="display:inline-flex;align-items:center;gap:6px;background:#eff6ff;color:#1d4ed8;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;margin-bottom:12px;border:1px solid #bfdbfe;">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    프로그래밍 놀이터
  </div>
  <h1 style="font-family:'Pretendard',-apple-system,sans-serif;font-size:32px;font-weight:900;color:#0f172a;margin-bottom:8px;letter-spacing:-0.03em;">웹코딩 실습실 <span style="color:#3b82f6;">🌐</span></h1>
  <p style="font-family:'Pretendard',-apple-system,sans-serif;font-size:15px;color:#64748b;font-weight:500;">HTML, CSS, JavaScript로 나만의 웹 페이지를 만들어보세요.</p>
</div><!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-tabs">
    <button class="tab active-html" id="tab-html" onclick="switchTab('html')">
      <span class="tab-dot dot-html"></span> HTML
    </button>
    <button class="tab" id="tab-css" onclick="switchTab('css')">
      <span class="tab-dot dot-css"></span> CSS
    </button>
    <button class="tab" id="tab-js" onclick="switchTab('js')">
      <span class="tab-dot dot-js"></span> JavaScript
    </button>
  </div>
  <div class="toolbar-right">
     <button class="btn btn-ghost" onclick="clearAll()">
      <i data-lucide="trash-2"></i> 초기화
    </button>
    <button class="btn btn-run" onclick="runPreview()">
      <i data-lucide="play"></i> 실행
    </button>
    <button class="icon-btn" onclick="toggleFullPreview()" title="미리보기 전체화면">
      <i data-lucide="maximize-2"></i>
    </button>
    <button class="icon-btn" onclick="copyCode()" title="코드 복사">
      <i data-lucide="copy"></i>
    </button>
    <button class="icon-btn" onclick="downloadCode()" title="코드 저장">
      <i data-lucide="download"></i>
    </button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- EXAMPLES SIDEBAR -->
  <div class="examples-panel">
    <div class="examples-header">예제 템플릿</div>

    <button class="example-item" onclick="loadExample('hello')">
      <div class="example-icon" style="background:rgba(249,115,22,0.12);color:#f97316;">👋</div>
      <div class="example-info">
        <div class="example-name">Hello World</div>
        <div class="example-desc">기본 HTML 구조</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('card')">
      <div class="example-icon" style="background:rgba(59,130,246,0.12);color:#3b82f6;">🃏</div>
      <div class="example-info">
        <div class="example-name">프로필 카드</div>
        <div class="example-desc">CSS 카드 레이아웃</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('animation')">
      <div class="example-icon" style="background:rgba(139,92,246,0.12);color:#a78bfa;">✨</div>
      <div class="example-info">
        <div class="example-name">CSS 애니메이션</div>
        <div class="example-desc">keyframe 효과</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('counter')">
      <div class="example-icon" style="background:rgba(245,158,11,0.12);color:#f59e0b;">🔢</div>
      <div class="example-info">
        <div class="example-name">카운터 앱</div>
        <div class="example-desc">JS DOM 조작</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('flexbox')">
      <div class="example-icon" style="background:rgba(16,185,129,0.12);color:#34d399;">📦</div>
      <div class="example-info">
        <div class="example-name">Flexbox</div>
        <div class="example-desc">레이아웃 실습</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('todo')">
      <div class="example-icon" style="background:rgba(236,72,153,0.12);color:#f472b6;">📝</div>
      <div class="example-info">
        <div class="example-name">할 일 목록</div>
        <div class="example-desc">이벤트 핸들링</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('gradient')">
      <div class="example-icon" style="background:rgba(99,102,241,0.12);color:#818cf8;">🌈</div>
      <div class="example-info">
        <div class="example-name">그라디언트</div>
        <div class="example-desc">CSS gradient</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('grid')">
      <div class="example-icon" style="background:rgba(20,184,166,0.12);color:#2dd4bf;">🔲</div>
      <div class="example-info">
        <div class="example-name">CSS Grid</div>
        <div class="example-desc">그리드 레이아웃</div>
      </div>
    </button>
    <button class="example-item" onclick="loadExample('clock')">
      <div class="example-icon" style="background:rgba(251,113,133,0.12);color:#fb7185;">🕐</div>
      <div class="example-info">
        <div class="example-name">디지털 시계</div>
        <div class="example-desc">setInterval 활용</div>
      </div>
    </button>
  </div>

  <!-- EDITOR PANEL -->
  <div class="panel-editor" id="editor-panel">
    <div class="editor-area">
      <div class="line-numbers" id="line-numbers"></div>
      <textarea class="code-editor" id="code-editor" spellcheck="false"
        oninput="onEditorChange()" onscroll="syncScroll()" onkeydown="handleKeyDown(event)"
      ></textarea>
    </div>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot"></div>
        <span id="status-lang">HTML</span>
      </div>
      <div class="status-item">
        <i data-lucide="type"></i>
        <span id="status-lines">1줄</span>
      </div>
      <div class="status-item">
        <i data-lucide="mouse-pointer-2"></i>
        <span id="status-cursor">1:1</span>
      </div>
      <div style="flex:1"></div>
      <div class="status-item" style="color: var(--text3);">
        <span>UTF-8</span>
      </div>
    </div>
  </div>

  <!-- SPLITTER -->
  <div class="splitter" id="splitter"></div>

  <!-- PREVIEW PANEL -->
  <div class="panel-preview">
    <div class="preview-header">
      <div class="traffic-lights">
        <div class="light light-red"></div>
        <div class="light light-amber"></div>
        <div class="light light-green"></div>
      </div>
      <div class="url-bar">
        <i data-lucide="lock"></i>
        <span>preview — sungce.ai-on</span>
      </div>
      <button class="icon-btn" onclick="refreshPreview()" title="새로고침">
        <i data-lucide="refresh-cw"></i>
      </button>
      <button class="icon-btn" onclick="openNewTab()" title="새 탭에서 열기">
        <i data-lucide="external-link"></i>
      </button>
    </div>
    <iframe class="preview-frame" id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i data-lucide="check-circle"></i>
  <span id="toast-msg">완료!</span>
</div>

<script>

// ── STATE ──
let state = { html: '', css: '', js: '' };
let currentTab = 'html';
let autoRunTimer = null;
let isFullPreview = false;

// ── EXAMPLES ──
const examples = {
  hello: {
    html: `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
</head>
<body>
  <h1>안녕하세요, 세계! 🌍</h1>
  <p>첫 번째 웹 페이지입니다.</p>
  <button onclick="greet()">인사하기</button>
  <p id="msg"></p>
</body>
</html>`,
    css: `body {
  font-family: 'Pretendard', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

p {
  font-size: 1.1rem;
  opacity: 0.85;
}

button {
  margin-top: 1rem;
  padding: 12px 28px;
  background: white;
  color: #764ba2;
  border: none;
  border-radius: 25px;
  font-size: 1rem;

    js: `let count = 0;

function change(delta) {
  count += delta;
  update();
}

function reset() {
  count = 0;
  update();
}

function update() {
  const d = document.getElementById('display');
  d.textContent = count;
  d.className = 'display ' + (count > 0 ? 'positive' : count < 0 ? 'negative' : 'zero');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'ArrowRight') change(1);
  if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') change(-1);
  if (e.key === ' ') { e.preventDefault(); reset(); }
});

update();`

    js: `function addTodo() {
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim();
  if (!text) return;
  
  const li = document.createElement('li');
  li.innerHTML = \`
    <button class="check-btn" onclick="toggleDone(this)">✓</button>
    <span class="todo-text">\${text}</span>
    <button class="del-btn" onclick="this.closest('li').remove(); updateEmpty()">✕</button>
  \`;
  
  document.getElementById('todo-list').prepend(li);
  inp.value = '';
  updateEmpty();
}

function toggleDone(btn) {
  btn.closest('li').classList.toggle('done');
}

function updateEmpty() {
  const empty = document.getElementById('todo-list').children.length === 0;
  document.getElementById('empty-msg').style.display = empty ? 'block' : 'none';
}`

function getWeek(d) {
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
}

function tick() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  
  document.getElementById('time').textContent = \`\${h}:\${m}:\${s}\`;
  document.getElementById('date').textContent = 
    \`\${now.getFullYear()}년 \${now.getMonth()+1}월 \${now.getDate()}일\`;
  document.getElementById('day').textContent = days[now.getDay()];
  document.getElementById('week').textContent = getWeek(now) + '주';
  document.getElementById('ampm').textContent = now.getHours() < 12 ? 'AM' : 'PM';
  document.getElementById('sec-fill').style.width = (now.getSeconds() / 59 * 100) + '%';
}

tick();
setInterval(tick, 1000);`

// ── INIT ──
function init() {
  const defaultEx = examples.hello;
  state.html = defaultEx.html;
  state.css = defaultEx.css;
  state.js = defaultEx.js;
  setEditorContent('html');
  runPreview();
}

// ── TABS ──
function switchTab(tab) {
  // save current
  state[currentTab] = document.getElementById('code-editor').value;
  currentTab = tab;
  setEditorContent(tab);

  // update tab styles
  ['html','css','js'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    el.className = 'tab';
    if (t === tab) el.classList.add('active-' + t);
  });

  document.getElementById('status-lang').textContent = tab.toUpperCase();
}

function setEditorContent(tab) {
  const editor = document.getElementById('code-editor');
  editor.value = state[tab];
  updateLineNumbers();
  updateStatus();
}

// ── LINE NUMBERS ──
function updateLineNumbers() {
  const editor = document.getElementById('code-editor');
  const lines = editor.value.split('\n').length;
  const ln = document.getElementById('line-numbers');
  let html = '';
  for (let i = 1; i <= lines; i++) html += i + '\n';
  ln.textContent = html;
}

function syncScroll() {
  const editor = document.getElementById('code-editor');
  document.getElementById('line-numbers').scrollTop = editor.scrollTop;
}

// ── STATUS ──
function updateStatus() {
  const editor = document.getElementById('code-editor');
  const lines = editor.value.split('\n').length;
  document.getElementById('status-lines').textContent = lines + '줄';

  editor.addEventListener('keyup', updateCursor);
  editor.addEventListener('click', updateCursor);
}

function updateCursor() {
  const editor = document.getElementById('code-editor');
  const pos = editor.selectionStart;
  const lines = editor.value.substr(0, pos).split('\n');
  document.getElementById('status-cursor').textContent =
    lines.length + ':' + lines[lines.length-1].length;
}

// ── EDITOR EVENTS ──
function onEditorChange() {
  state[currentTab] = document.getElementById('code-editor').value;
  updateLineNumbers();
  updateCursor();

  clearTimeout(autoRunTimer);
  autoRunTimer = setTimeout(runPreview, 800);
}

function handleKeyDown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 2;
    state[currentTab] = ta.value;
    updateLineNumbers();
  }
}

// ── PREVIEW ──
function runPreview() {
  const frame = document.getElementById('preview-frame');

  // Build combined document
  let html = state.html;

  // If html doesn't have head/body structure, wrap it
  if (!html.includes('<html')) {
    html = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>${state.css}</style>
</head>
<body>
${state.html}
<script>${state.js}<\/script>
</body>
</html>`;
  } else {
    // Inject CSS & JS into existing structure
    html = html
      .replace('</head>', `<style>${state.css}</style>\n</head>`)
      .replace('</body>', `<script>${state.js}<\/script>\n</body>`);
    if (!html.includes('</body>')) {
      html += `<style>${state.css}</style><script>${state.js}<\/script>`;
    }
  }

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);

  // Clean up old URL
  if (frame._blobUrl) URL.revokeObjectURL(frame._blobUrl);
  frame._blobUrl = url;
  frame.src = url;
}

function refreshPreview() {
  runPreview();
  showToast('🔄 새로고침 완료');
}

function openNewTab() {
  const frame = document.getElementById('preview-frame');
  if (frame._blobUrl) window.open(frame._blobUrl, '_blank');
}

// ── EXAMPLES ──
function loadExample(key) {
  const ex = examples[key];
  state.html = ex.html;
  state.css = ex.css;
  state.js = ex.js;
  setEditorContent(currentTab);
  runPreview();
  showToast('📂 예제 로드 완료');
}

// ── ACTIONS ──
function clearAll() {
  if (!confirm('모든 코드를 초기화할까요?')) return;
  state = { html: '', css: '', js: '' };
  setEditorContent(currentTab);
  runPreview();
  showToast('🗑️ 초기화 완료');
}

function copyCode() {
  navigator.clipboard.writeText(state[currentTab])
    .then(() => showToast('📋 코드 복사 완료'));
}

function downloadCode() {
  const ext = { html: 'html', css: 'css', js: 'js' }[currentTab];
  const blob = new Blob([state[currentTab]], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'code.' + ext;
  a.click();
  showToast('💾 파일 저장 완료');
}

function formatCode() {
  // Simple basic formatting — add newline awareness
  showToast('✨ 정렬 기능은 준비 중이에요');
}

function toggleFullPreview() {
  const ep = document.getElementById('editor-panel');
  const sp = document.getElementById('splitter');
  isFullPreview = !isFullPreview;
  ep.style.display = isFullPreview ? 'none' : '';
  sp.style.display = isFullPreview ? 'none' : '';
  showToast(isFullPreview ? '🖥️ 미리보기 전체화면' : '✏️ 에디터 복원');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SPLITTER DRAG ──
let dragging = false;
let startX, startW;

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - startX;
  const ep = document.getElementById('editor-panel');
  const newW = Math.max(240, Math.min(window.innerWidth - 300, startW + dx));
  ep.style.width = newW + 'px';
});

window.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── START ──
window.addEventListener('load', function() {
  if (typeof lucide !== 'undefined') lucide.createIcons();

  const splitter = document.getElementById('splitter');
  splitter.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = document.getElementById('editor-panel').offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  init();
});
</script>
