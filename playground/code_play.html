for i in range(5):

def factorial(n):
    """팩토리얼: n!"""
    if n <= 1:
        return 1
    return n * factorial(n - 1)

def fibonacci(n):
    """피보나치 수열"""
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)

def power(base, exp):
    """거듭제곱 (재귀)"""
    if exp == 0:
        return 1
    return base * power(base, exp-1)

      bubblesort: `# 버블 정렬 (Bubble Sort)
def bubble_sort(arr):
    n = len(arr)
    steps = []
    a = arr[:]
    for i in range(n):
        for j in range(n - i - 1):
            if a[j] > a[j+1]:
                a[j], a[j+1] = a[j+1], a[j]
        steps.append(a[:])
    return a, steps

def binary_search(arr, target):
    left, right = 0, len(arr) - 1
    step = 0
    while left <= right:
        step += 1
        mid = (left + right) // 2
        print(f"  [{step}회] 범위={arr[left:right+1]} → 중앙값={arr[mid]}", end="")
        if arr[mid] == target:
            print(f" ✅ 발견!")
            return mid
        elif arr[mid] < target:
            print(f" → 오른쪽 탐색")
            left = mid + 1
        else:
            print(f" → 왼쪽 탐색")
            right = mid - 1
    return -1

      prime: `# 소수 판별 — 에라토스테네스의 체
def sieve(n):
    is_prime = [True] * (n + 1)
    is_prime[0] = is_prime[1] = False
    for i in range(2, int(n**0.5) + 1):
        if is_prime[i]:
            for j in range(i*i, n+1, i):
                is_prime[j] = False
    return [i for i in range(2, n+1) if is_prime[i]]

def is_prime_simple(n):
    if n < 2: return False
    for i in range(2, int(n**0.5)+1):
        if n % i == 0: return False
    return True

N = 50
primes = sieve(N)
print(f"=== {N} 이하의 소수 ({len(primes)}개) ===")
print(primes)

        }
      });
    }
