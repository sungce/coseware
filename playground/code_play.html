<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 놀이터 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f4f7f9; margin: 0; }
  .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
  /* 평가 기준 인라인 입력창 스타일 */
.crit-name input {
  width: 110px;
  border: 1px solid transparent;
  background: transparent;
  font-size: 11px;
  font-weight: 600;
  color: #374151;
  outline: none;
  border-radius: 4px;
  padding: 2px 4px;
  margin-left: -4px;
  transition: all 0.2s;
}
.crit-pts input {
  width: 32px;
  border: 1px solid transparent;
  background: transparent;
  font-size: 11px;
  color: #9aa3b2;
  text-align: right;
  outline: none;
  border-radius: 4px;
  padding: 2px;
  transition: all 0.2s;
  font-family: inherit;
}
.crit-name input:hover, .crit-pts input:hover { border-color: #e5e7eb; background: #fff; }
.crit-name input:focus, .crit-pts input:focus { border-color: #4f7ef7; background: #fff; color: #1a1d23; }
/* 숫자 입력창 우측 위아래 화살표 숨기기 */
.crit-pts input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- 네비게이션 바 -->

  <!-- 1. 네이티브 콘텐츠 영역 (코드 놀이터 원본 화면) -->
  <main id="native-content" class="max-w-[1400px] mx-auto px-6 pt-8 pb-16 w-full">
    <div class="crit">
  <div class="crit-hd">
    <div class="crit-name"><input type="text" value="🎯 과제 완성도" id="cName1"></div>
    <div class="crit-pts"><b id="p1">0</b> / <input type="number" value="40" id="m1">점</div>
  </div>
  <div class="crit-bar"><div class="crit-fill fill-b" id="b1" style="width:0%"></div></div>
  <div class="crit-note" id="n1">평가를 실행하면 결과가 표시됩니다</div>
</div>
<div class="crit">
  <div class="crit-hd">
    <div class="crit-name"><input type="text" value="🧠 코드 구조" id="cName2"></div>
    <div class="crit-pts"><b id="p2">0</b> / <input type="number" value="30" id="m2">점</div>
  </div>
  <div class="crit-bar"><div class="crit-fill fill-g" id="b2" style="width:0%"></div></div>
  <div class="crit-note" id="n2">평가를 실행하면 결과가 표시됩니다</div>
</div>
<div class="crit">
  <div class="crit-hd">
    <div class="crit-name"><input type="text" value="🎨 창의성" id="cName3"></div>
    <div class="crit-pts"><b id="p3">0</b> / <input type="number" value="20" id="m3">점</div>
  </div>
  <div class="crit-bar"><div class="crit-fill fill-a" id="b3" style="width:0%"></div></div>
  <div class="crit-note" id="n3">평가를 실행하면 결과가 표시됩니다</div>
</div>
<div class="crit">
  <div class="crit-hd">
    <div class="crit-name"><input type="text" value="📝 제출 준수" id="cName4"></div>
    <div class="crit-pts"><b id="p4">0</b> / <input type="number" value="10" id="m4">점</div>
  </div>
  <div class="crit-bar"><div class="crit-fill fill-b" id="b4" style="width:0%"></div></div>
  <div class="crit-note" id="n4">평가를 실행하면 결과가 표시됩니다</div>
</div>
    <div class="mb-10">
      <div class="inline-flex items-center space-x-2 bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold mb-4 border border-green-100">
        <i data-lucide="code-2" class="w-3.5 h-3.5"></i><span>인터렉티브 수업실</span>
      </div>
      <h1 class="text-4xl font-black text-slate-900 mb-3">코드 놀이터 <span class="text-green-500">🎮</span></h1>
      <p class="text-lg text-slate-500 font-medium">직접 코드를 작성하고 결과를 바로 확인해보세요.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <div class="card p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-black text-slate-800 flex items-center space-x-2">
            <i data-lucide="file-code" class="w-5 h-5 text-green-500"></i><span>Python 코드 작성</span>
          </h2>
          <button onclick="runCode()" class="bg-green-500 hover:bg-green-600 text-white text-sm font-bold px-4 py-2 rounded-xl transition-colors flex items-center space-x-1.5 outline-none focus:outline-none">
            <i data-lucide="play" class="w-4 h-4"></i><span>실행</span>
          </button>
        </div>
        <textarea id="code-input" rows="16"
          class="w-full bg-slate-900 text-green-400 font-mono text-sm p-4 rounded-xl resize-none outline-none focus:outline-none focus:ring-2 focus:ring-green-500 leading-relaxed"
          placeholder="# Python 코드를 입력하세요&#10;&#10;print('안녕하세요!')">print('안녕하세요, 코드 놀이터!')

for i in range(5):
    print(f'{i+1}번째: {"⭐" * (i+1)}')</textarea>
      </div>
      <div class="card p-6">
        <h2 class="text-base font-black text-slate-800 flex items-center space-x-2 mb-4">
          <i data-lucide="terminal" class="w-5 h-5 text-slate-600"></i><span>실행 결과</span>
        </h2>
        <div id="output" class="bg-slate-900 text-slate-300 font-mono text-sm p-4 rounded-xl h-[calc(100%-52px)] min-h-[280px] whitespace-pre-wrap overflow-y-auto leading-relaxed">
          <span class="text-slate-500">▶ 실행 버튼을 눌러 결과를 확인하세요</span>
        </div>
      </div>
    </div>

    <h2 class="text-lg font-black text-slate-800 mb-4">🧩 예제 코드 모음</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <button onclick="loadExample('hello')" class="card p-5 text-left hover:border-green-200 hover:bg-green-50/40 transition-all group outline-none focus:outline-none">
        <div class="w-10 h-10 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform"><i data-lucide="smile" class="w-5 h-5"></i></div>
        <p class="text-sm font-black text-slate-800">Hello, World!</p>
        <p class="text-xs text-slate-400 mt-1">기본 출력 예제</p>
      </button>
      <button onclick="loadExample('loop')" class="card p-5 text-left hover:border-blue-200 hover:bg-blue-50/40 transition-all group outline-none focus:outline-none">
        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform"><i data-lucide="repeat" class="w-5 h-5"></i></div>
        <p class="text-sm font-black text-slate-800">반복문 예제</p>
        <p class="text-xs text-slate-400 mt-1">for / while 반복</p>
      </button>
      <button onclick="loadExample('list')" class="card p-5 text-left hover:border-purple-200 hover:bg-purple-50/40 transition-all group outline-none focus:outline-none">
        <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform"><i data-lucide="list" class="w-5 h-5"></i></div>
        <p class="text-sm font-black text-slate-800">리스트 예제</p>
        <p class="text-xs text-slate-400 mt-1">리스트 생성과 활용</p>
      </button>
    </div>
  </main>

  <!-- 2. Iframe 콘텐츠 영역 -->
  <section id="iframe-section" class="hidden fixed left-0 right-0 bottom-0 overflow-hidden" style="top:56px;">
    <div class="max-w-[1400px] mx-auto w-full h-full bg-white shadow-sm border-x border-slate-200 overflow-hidden">
      <iframe id="content-frame" onload="hideIframeNav()" class="w-full h-full border-0 bg-transparent" src=""></iframe>
    </div>
  </section>

  <script>
    lucide.createIcons();

    function loadInIframe(event, url, element) {
      event.preventDefault();
      
      document.querySelectorAll('.nav-menu').forEach(el => {
        el.className = 'nav-menu outline-none focus:outline-none hover:text-blue-600 transition-colors';
      });
      element.className = 'nav-menu outline-none focus:outline-none text-blue-600 border-b-2 border-blue-600 pb-1';

      document.getElementById('native-content').classList.add('hidden');
      document.getElementById('iframe-section').classList.remove('hidden');
      document.getElementById('content-frame').src = url;
    }

    function showCodePlay(event, element) {
      event.preventDefault();
      
      document.querySelectorAll('.nav-menu').forEach(el => {
        el.className = 'nav-menu outline-none focus:outline-none hover:text-blue-600 transition-colors';
      });
      element.className = 'nav-menu outline-none focus:outline-none text-blue-600 border-b-2 border-blue-600 pb-1';

      document.getElementById('iframe-section').classList.add('hidden');
      document.getElementById('native-content').classList.remove('hidden');
      document.getElementById('content-frame').src = '';
    }

    function hideIframeNav() {
      try {
        const iframe = document.getElementById('content-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        
        // iframe 내부 <nav> 숨김
        const nav = iframeDoc.querySelector('nav');
        if (nav) { nav.style.display = 'none'; nav.style.height = '0'; nav.style.overflow = 'hidden'; }
        
        // iframe 내부 main 여백 조절
        const main = iframeDoc.querySelector('main');
        if (main) {
          main.style.paddingTop = '0';
          main.style.paddingBottom = '3rem';
        }
      } catch (error) {
        // 로컬 환경에서는 브라우저 보안 정책(CORS)으로 에러가 날 수 있으나 무시합니다.
      }
    }

    // ======== 코드 놀이터 스크립트 ========
    const examples = {
      hello: `# Hello, World! 예제\nprint("Hello, World!")\nprint("안녕하세요, Python!")\nname = "학생"\nprint(f"반갑습니다, {name}님!")`,
      loop: `# 반복문 예제\nprint("=== for 반복문 ===")\nfor i in range(1, 6):\n    print(f"  {i}번: {'★' * i}")\n\nprint("\\n=== while 반복문 ===")\nn = 1\nwhile n <= 5:\n    print(f"  {n} × {n} = {n*n}")\n    n += 1`,
      list: `# 리스트 예제\nfruits = ["사과", "바나나", "딸기", "포도"]\nprint("과일 목록:")\nfor i, fruit in enumerate(fruits, 1):\n    print(f"  {i}. {fruit}")\n\nprint(f"\\n총 {len(fruits)}개의 과일")\nfruits.append("망고")\nprint(f"망고 추가 후: {fruits}")`
    };

    function loadExample(key) {
      document.getElementById('code-input').value = examples[key];
    }

    function runCode() {
      const out  = document.getElementById('output');
      out.innerHTML = '<span class="text-yellow-400">⚡ Python 실행 환경은 서버 연동이 필요합니다.</span>\n\n<span class="text-slate-400">▶ 아래 온라인 환경을 활용해보세요:</span>\n\n<a href="https://colab.research.google.com" target="_blank" class="text-blue-400 underline outline-none focus:outline-none">Google Colab 열기 →</a>\n<a href="https://replit.com" target="_blank" class="text-green-400 underline outline-none focus:outline-none">Replit 열기 →</a>';
    }
    function runEval() {
  if (currentTask === -1) { showToast('⚠️ 먼저 과제를 선택해 주세요'); return; }
  showToast('🤖 AI 평가 분석 중...');

  // 1. 선생님이 화면에 입력한 배점을 가져옴
  let max1 = parseInt(document.getElementById('m1').value) || 0;
  let max2 = parseInt(document.getElementById('m2').value) || 0;
  let max3 = parseInt(document.getElementById('m3').value) || 0;
  let max4 = parseInt(document.getElementById('m4').value) || 0;
  let totalMax = max1 + max2 + max3 + max4;

  if (totalMax === 0) { showToast('⚠️ 총 배점이 0점입니다. 배점을 설정해주세요.'); return; }

  setTimeout(() => {
    // 2. 각 배점에 맞춰 임의의 획득 점수 생성 (AI 연동 시 이 부분 교체)
    const s = {
      c1: Math.floor(Math.random() * (max1 * 0.3)) + Math.floor(max1 * 0.7),
      c2: Math.floor(Math.random() * (max2 * 0.3)) + Math.floor(max2 * 0.7),
      c3: Math.floor(Math.random() * (max3 * 0.3)) + Math.floor(max3 * 0.7),
      c4: Math.floor(Math.random() * (max4 * 0.3)) + Math.floor(max4 * 0.7)
    };
    const total = s.c1 + s.c2 + s.c3 + s.c4;
    const percent = (total / totalMax) * 100; // 100점 만점이 아닐 수 있으므로 백분율 계산

    animRing(total, totalMax); 

    // 3. 점수 텍스트 및 게이지 바 업데이트
    [[1, s.c1, max1], [2, s.c2, max2], [3, s.c3, max3], [4, s.c4, max4]].forEach(([i, v, mx], idx) => {
      setTimeout(() => {
        document.getElementById('p'+i).textContent = v;
        document.getElementById('b'+i).style.width = mx > 0 ? (v / mx * 100) + '%' : '0%';
        document.getElementById('n'+i).textContent = (mx > 0 && (v / mx) >= 0.8) ? '✅ 우수한 수준입니다' : '⚠️ 개선이 필요합니다';
      }, idx * 150);
    });

    // 4. 총점 등급 산출
    const grades = [{t:90,g:'🏆 우수'},{t:75,g:'⭐ 양호'},{t:60,g:'👍 보통'},{t:0,g:'💪 노력 필요'}];
    const gr = grades.find(g => percent >= g.t);
    
    document.getElementById('scoreGrade').textContent = gr.g;
    document.getElementById('scoreSub').textContent = `총점 ${total}점 / 만점 ${totalMax}점`;
    
    // 피드백 텍스트
    const fbs = [
      '스프라이트 이동 블록을 잘 활용했습니다. 반복문을 추가하면 더 자연스러운 애니메이션을 만들 수 있어요!',
      '블록 구조가 잘 정돈되어 있습니다. 조건문을 활용하면 더 풍부한 인터랙션을 구현할 수 있을 거예요.',
      '창의적인 캐릭터 선택이 돋보입니다! 배경 전환 기능을 추가하면 완성도가 더 높아질 것 같아요.'
    ];
    document.getElementById('fbText').textContent = fbs[Math.floor(Math.random() * fbs.length)];
    
    evaluated = true;
    showToast('✓ AI 평가 완료! 총점 ' + total + '점');
  }, 1600);
}

// 링 애니메이션도 동적 만점에 맞춰 수정
function animRing(total, totalMax) {
  const ratio = totalMax > 0 ? (total / totalMax) : 0;
  document.getElementById('ringProg').style.strokeDashoffset = 251 - (ratio * 251);
  let cur = 0, step = total / 60;
  const sc = document.getElementById('ringScore');
  document.querySelector('.ring-lbl').textContent = `/ ${totalMax}점`; // 만점 표시 업데이트
  
  const t = setInterval(() => { 
    cur = Math.min(cur + step, total); 
    sc.textContent = Math.round(cur); 
    if(cur >= total) clearInterval(t); 
  }, 16);
}
  </script>
</body>
</html>
