<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[중학교 정보] 네이버 데이터랩 데이터 탐색 대시보드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Custom styles for checkboxes and transitions */
        .tab-btn.active {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-color: #3b82f6;
        }
        .tab-btn {
            transition: all 0.2s ease-in-out;
        }
        canvas {
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-center text-white">
            <h1 class="text-3xl font-bold mb-2">📊 네이버 데이터랩 데이터 탐색 대시보드</h1>
            <p class="text-blue-100 font-medium">현실 세계의 데이터를 통해 트렌드, 주기성, 상관관계를 발견해 봅시다.</p>
        </header>

        <div class="p-6 md:p-8">
            <!-- Tabs -->
            <div class="flex flex-wrap gap-3 mb-6" id="tabs-container">
                <button onclick="switchTab('snack')" class="tab-btn active px-5 py-2.5 rounded-full border-2 border-slate-200 font-bold text-slate-600 hover:border-blue-400">🍔 간식 트렌드 (유행)</button>
                <button onclick="switchTab('game')" class="tab-btn px-5 py-2.5 rounded-full border-2 border-slate-200 font-bold text-slate-600 hover:border-blue-400">🎮 게임 트렌드 (주기성)</button>
                <button onclick="switchTab('career')" class="tab-btn px-5 py-2.5 rounded-full border-2 border-slate-200 font-bold text-slate-600 hover:border-blue-400">🚀 미래 진로 (상대성)</button>
                <button onclick="switchTab('school')" class="tab-btn px-5 py-2.5 rounded-full border-2 border-slate-200 font-bold text-slate-600 hover:border-blue-400">🏫 학교 생활 (규칙성)</button>
            </div>

            <!-- Controls -->
            <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 mb-6 flex flex-col md:flex-row gap-6 justify-between items-center">
                
                <!-- Checkboxes (Dynamically generated) -->
                <div class="flex flex-wrap gap-4 items-center w-full md:w-auto" id="checkbox-container">
                    <!-- Checkboxes will be injected here -->
                </div>

                <!-- Time Slider -->
                <div class="flex items-center gap-3 w-full md:w-1/3">
                    <span class="font-bold text-sm whitespace-nowrap text-slate-600">데이터 기간 조절:</span>
                    <input type="range" id="timeSlider" min="1" max="12" value="12" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                    <span id="sliderValue" class="font-bold text-blue-600 min-w-[3rem] text-right">12개월</span>
                </div>
            </div>

            <!-- Chart Area -->
            <div class="relative h-[400px] w-full mb-8">
                <canvas id="mainChart"></canvas>
            </div>

            <!-- Analysis Insights -->
            <div class="bg-amber-50 border-l-4 border-amber-400 p-5 rounded-r-xl">
                <h3 class="text-amber-800 font-bold text-lg mb-2 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    선생님의 데이터 분석 가이드
                </h3>
                <div id="insightText" class="text-slate-700 leading-relaxed text-md">
                    <!-- Insight text will be injected here -->
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. Data Definitions ---
        const months = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
        
        // Generate daily data for games (30 days with weekend spikes on day 6, 7, 13, 14 etc.)
        const dailyLabels = Array.from({length: 30}, (_, i) => `${i+1}일`);
        const generateSpikeData = (base, spike) => dailyLabels.map((_, i) => {
            const isWeekend = (i % 7 === 5 || i % 7 === 6);
            const noise = Math.floor(Math.random() * 5) - 2;
            return base + (isWeekend ? spike : 0) + noise;
        });

        const allData = {
            snack: {
                labels: months,
                unit: '개월',
                datasets: [
                    { label: '마라탕', color: '#ef4444', data: [60, 62, 65, 60, 68, 70, 75, 72, 65, 68, 70, 75] },
                    { label: '탕후루', color: '#06b6d4', data: [10, 20, 40, 80, 100, 70, 40, 20, 15, 10, 8, 5] },
                    { label: '요아정', color: '#f59e0b', data: [2, 3, 5, 5, 8, 15, 25, 40, 60, 85, 95, 100] }
                ],
                insight: `<strong>유행의 형태를 관찰해 보세요!</strong><br>
                • <strong>탕후루(파란선):</strong> 특정 시기에 급격히 상승했다가 하락하는 '유행형' 곡선을 보입니다.<br>
                • <strong>마라탕(빨간선):</strong> 큰 굴곡 없이 꾸준히 높은 검색량을 유지하는 '스테디셀러'의 모습입니다.<br>
                • <strong>요아정(노란선):</strong> 처음에는 낮았지만 최근 들어 기하급수적으로 상승하는 '성장형' 그래프입니다. 슬라이더를 움직여 유행이 시작된 시점을 찾아보세요.`
            },
            game: {
                labels: dailyLabels,
                unit: '일',
                datasets: [
                    { label: '발로란트', color: '#ef4444', data: generateSpikeData(40, 50) },
                    { label: '로블록스', color: '#8b5cf6', data: generateSpikeData(30, 30) },
                    { label: '마인크래프트', color: '#10b981', data: generateSpikeData(20, 15) }
                ],
                insight: `<strong>데이터 속 숨겨진 규칙(주기성)을 찾아보세요!</strong><br>
                • 일정한 간격으로 그래프가 뾰족하게 솟아오르는 <strong>'톱니바퀴' 패턴</strong>이 보이나요? <br>
                • 바로 학생들이 학교에 가지 않는 <strong>'주말(토, 일)'</strong>입니다. 일상 생활의 패턴이 데이터에 그대로 찍혀 나온다는 사실이 놀랍지 않나요?<br>
                • (활동) 평일과 주말의 검색량 차이가 가장 심한 게임은 무엇인지 비교해 봅시다.`
            },
            career: {
                labels: months,
                unit: '개월',
                datasets: [
                    { label: '인공지능', color: '#3b82f6', data: [10, 12, 15, 25, 45, 70, 85, 95, 100, 98, 95, 96] },
                    { label: '개발자', color: '#22c55e', data: [50, 52, 55, 54, 56, 55, 58, 60, 59, 57, 55, 54] },
                    { label: '유튜버', color: '#ec4899', data: [80, 78, 75, 76, 72, 70, 68, 65, 66, 64, 62, 60] }
                ],
                insight: `<strong>사회의 변화가 데이터에 어떻게 반영될까요?</strong><br>
                • <strong>인공지능(파란선):</strong> 중반부(ChatGPT 등 AI 붐 시점)부터 데이터가 폭발적으로 증가했습니다.<br>
                • <strong>유튜버(분홍선) vs 개발자(초록선):</strong> 인공지능의 검색량이 너무 높아지면, 상대적으로 다른 직업군들의 변화폭이 작아 보이기도 합니다. 이를 <strong>'데이터의 상대성'</strong>이라고 합니다.<br>
                • 특정 키워드만 남기고 체크를 해제하여 세밀한 변화를 관찰해 보세요.`
            },
            school: {
                labels: months,
                unit: '개월',
                datasets: [
                    { label: '중간고사', color: '#ec4899', data: [5, 10, 30, 100, 20, 5, 5, 10, 30, 90, 20, 5] },
                    { label: '기말고사', color: '#3b82f6', data: [5, 5, 10, 20, 50, 100, 10, 5, 10, 20, 60, 100] },
                    { label: '방학', color: '#f59e0b', data: [100, 80, 20, 10, 10, 30, 100, 90, 20, 10, 10, 80] }
                ],
                insight: `<strong>여러분의 1년과 비교해 보세요! (시계열 데이터)</strong><br>
                • <strong>중간고사(4월, 10월)</strong>와 <strong>기말고사(6월, 12월)</strong>의 검색량이 치솟는 시점이 여러분의 시험 기간과 일치하나요?<br>
                • <strong>방학(1월, 8월)</strong> 그래프가 올라갈 때 시험 그래프는 바닥을 칩니다. 데이터 간의 상관관계를 명확히 볼 수 있습니다.`
            }
        };

        // --- 2. Application State ---
        let currentTheme = 'snack';
        let chartInstance = null;

        // --- 3. UI Update Logic ---
        function switchTab(theme) {
            currentTheme = theme;
            
            // Update Tab Styling
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const themeData = allData[theme];

            // Update Insight Text
            document.getElementById('insightText').innerHTML = themeData.insight;

            // Setup Checkboxes
            const cbContainer = document.getElementById('checkbox-container');
            cbContainer.innerHTML = ''; // Clear existing
            themeData.datasets.forEach((ds, index) => {
                const labelObj = document.createElement('label');
                labelObj.className = "flex items-center gap-2 cursor-pointer px-3 py-1.5 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition";
                labelObj.innerHTML = `
                    <input type="checkbox" checked class="w-4 h-4 rounded text-blue-600 focus:ring-blue-500" onchange="updateChartData()">
                    <div class="w-3 h-3 rounded-full" style="background-color: ${ds.color}"></div>
                    <span class="font-bold text-slate-700">${ds.label}</span>
                `;
                cbContainer.appendChild(labelObj);
            });

            // Setup Slider
            const maxVal = themeData.labels.length;
            const slider = document.getElementById('timeSlider');
            slider.max = maxVal;
            slider.value = maxVal;
            document.getElementById('sliderValue').innerText = `${maxVal}${themeData.unit}`;

            // Initialize/Update Chart
            buildChart();
        }

        // Handle Slider UI Update
        document.getElementById('timeSlider').addEventListener('input', function(e) {
            const unit = allData[currentTheme].unit;
            document.getElementById('sliderValue').innerText = `${e.target.value}${unit}`;
            updateChartData();
        });

        // --- 4. Chart Logic ---
        function buildChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const themeData = allData[currentTheme];

            // Destroy existing chart if it exists to prevent memory leaks and visual bugs
            if (chartInstance) {
                chartInstance.destroy();
            }

            // Prepare datasets for Chart.js
            const chartDatasets = themeData.datasets.map(ds => ({
                label: ds.label,
                data: ds.data,
                borderColor: ds.color,
                backgroundColor: ds.color + '20', // Add transparency for fill
                borderWidth: 3,
                pointBackgroundColor: '#fff',
                pointBorderColor: ds.color,
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,
                fill: false,
                tension: 0.3 // Smooth curves
            }));

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: themeData.labels,
                    datasets: chartDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { display: false }, // Handled by our custom checkboxes
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#1e293b',
                            bodyColor: '#334155',
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            usePointStyle: true,
                            titleFont: { size: 14, family: "'Pretendard', sans-serif" },
                            bodyFont: { size: 13, family: "'Pretendard', sans-serif", weight: 'bold' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { font: { family: "'Pretendard', sans-serif", size: 12 }, color: '#64748b' }
                        },
                        y: {
                            min: 0,
                            max: 105,
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: { 
                                font: { family: "'Pretendard', sans-serif", size: 12 }, 
                                color: '#94a3b8',
                                callback: function(value) { return value; }
                            },
                            title: {
                                display: true,
                                text: '상대적 검색량 (0~100)',
                                color: '#94a3b8',
                                font: { size: 12, family: "'Pretendard', sans-serif" }
                            }
                        }
                    }
                }
            });
        }

        // Apply filters (Checkboxes and Slider)
        function updateChartData() {
            if (!chartInstance) return;

            const themeData = allData[currentTheme];
            const checkboxes = document.querySelectorAll('#checkbox-container input[type="checkbox"]');
            const sliderValue = parseInt(document.getElementById('timeSlider').value);

            // Update Labels based on slider
            chartInstance.data.labels = themeData.labels.slice(0, sliderValue);

            // Update Data and Visibility
            themeData.datasets.forEach((ds, index) => {
                const isVisible = checkboxes[index].checked;
                // chartInstance.getDatasetMeta(index).hidden = !isVisible; // Alternative way
                
                // Update dataset array slice
                chartInstance.data.datasets[index].data = ds.data.slice(0, sliderValue);
                
                // Toggle visibility in chart.js
                if (isVisible) {
                    chartInstance.show(index);
                } else {
                    chartInstance.hide(index);
                }
            });

            chartInstance.update();
        }

        // Initialize on load
        window.onload = () => {
            // Trigger click on the first tab to initialize everything
            document.querySelector('.tab-btn').click();
        };

    </script>
</body>
</html>
