<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 실습실 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f4f7f9; margin: 0; }
  .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
</style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- 1. 네이티브 콘텐츠 영역 -->
  <main id="native-content" class="max-w-[1400px] mx-auto px-6 pt-8 pb-16 w-full">

    <!-- 헤더 -->
    <div class="mb-8">
      <div class="inline-flex items-center space-x-2 bg-orange-50 text-orange-700 px-3 py-1.5 rounded-full text-xs font-bold mb-4 border border-orange-100">
        <i data-lucide="bar-chart-2" class="w-3.5 h-3.5"></i><span>인터렉티브 수업실</span>
      </div>
      <h1 class="text-4xl font-black text-slate-900 mb-2">데이터 실습실 <span class="text-orange-500">📊</span></h1>
      <p class="text-lg text-slate-500 font-medium">데이터를 입력하고 다양한 차트로 시각화해보세요.</p>
    </div>

    <!-- 메인 그리드: 입력(4) + 시각화(8) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">

      <!-- ── 왼쪽: 데이터 입력 패널 ── -->
      <div class="lg:col-span-4 card p-6 flex flex-col gap-4">

        <h2 class="text-base font-black text-slate-800 flex items-center gap-2">
          <i data-lucide="table" class="w-5 h-5 text-orange-500"></i>데이터 입력
        </h2>

        <!-- 헤더 행 -->
        <div class="flex gap-2 px-1">
          <span class="w-1/2 text-xs font-bold text-slate-400 uppercase tracking-wider">항목명</span>
          <span class="w-1/2 text-xs font-bold text-slate-400 uppercase tracking-wider">값</span>
        </div>

        <!-- 데이터 행들 -->
        <div id="data-rows" class="flex flex-col gap-2">
          <div class="flex gap-2 items-center">
            <input type="text"   value="월요일" placeholder="항목명" class="data-label w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <input type="number" value="23"    placeholder="값"    class="data-value w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-400 transition-colors text-lg leading-none shrink-0">✕</button>
          </div>
          <div class="flex gap-2 items-center">
            <input type="text"   value="화요일" placeholder="항목명" class="data-label w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <input type="number" value="45"    placeholder="값"    class="data-value w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-400 transition-colors text-lg leading-none shrink-0">✕</button>
          </div>
          <div class="flex gap-2 items-center">
            <input type="text"   value="수요일" placeholder="항목명" class="data-label w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <input type="number" value="31"    placeholder="값"    class="data-value w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-400 transition-colors text-lg leading-none shrink-0">✕</button>
          </div>
          <div class="flex gap-2 items-center">
            <input type="text"   value="목요일" placeholder="항목명" class="data-label w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <input type="number" value="58"    placeholder="값"    class="data-value w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-400 transition-colors text-lg leading-none shrink-0">✕</button>
          </div>
          <div class="flex gap-2 items-center">
            <input type="text"   value="금요일" placeholder="항목명" class="data-label w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <input type="number" value="42"    placeholder="값"    class="data-value w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
            <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-400 transition-colors text-lg leading-none shrink-0">✕</button>
          </div>
        </div>

        <!-- 행 추가 버튼 -->
        <button onclick="addRow()"
          class="w-full border-2 border-dashed border-slate-200 text-slate-400 hover:border-orange-300 hover:text-orange-500 text-sm font-bold py-2.5 rounded-xl transition-colors outline-none">
          + 행 추가
        </button>

        <!-- 구분선 -->
        <div class="border-t border-slate-100 pt-4">
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">차트 종류 선택</p>
          <div class="grid grid-cols-3 gap-2" id="chart-types">
            <button onclick="setType('bar')"         id="btn-bar"    class="chart-type-btn text-xs font-bold py-2.5 rounded-xl border transition-all outline-none flex flex-col items-center gap-1">
              <span class="text-lg">📊</span><span>막대</span>
            </button>
            <button onclick="setType('line')"        id="btn-line"   class="chart-type-btn text-xs font-bold py-2.5 rounded-xl border transition-all outline-none flex flex-col items-center gap-1">
              <span class="text-lg">📈</span><span>꺾은선</span>
            </button>
            <button onclick="setType('pie')"         id="btn-pie"    class="chart-type-btn text-xs font-bold py-2.5 rounded-xl border transition-all outline-none flex flex-col items-center gap-1">
              <span class="text-lg">🥧</span><span>원형</span>
            </button>
            <button onclick="setType('doughnut')"    id="btn-doughnut" class="chart-type-btn text-xs font-bold py-2.5 rounded-xl border transition-all outline-none flex flex-col items-center gap-1">
              <span class="text-lg">🍩</span><span>도넛</span>
            </button>
            <button onclick="setType('radar')"       id="btn-radar"  class="chart-type-btn text-xs font-bold py-2.5 rounded-xl border transition-all outline-none flex flex-col items-center gap-1">
              <span class="text-lg">🕸️</span><span>레이더</span>
            </button>
            <button onclick="setType('polarArea')"   id="btn-polarArea" class="chart-type-btn text-xs font-bold py-2.5 rounded-xl border transition-all outline-none flex flex-col items-center gap-1">
              <span class="text-lg">🎯</span><span>폴라</span>
            </button>
          </div>
        </div>

        <!-- 차트 그리기 버튼 -->
        <button onclick="drawChart()"
          class="w-full bg-orange-500 hover:bg-orange-600 active:scale-95 text-white font-black py-3 rounded-xl transition-all shadow-md shadow-orange-200 outline-none flex items-center justify-center gap-2">
          <i data-lucide="bar-chart-2" class="w-4 h-4"></i> 차트 그리기
        </button>
      </div>

      <!-- ── 오른쪽: 시각화 결과 패널 ── -->
      <div class="lg:col-span-8 card p-6 flex flex-col gap-4">

        <div class="flex items-center justify-between">
          <h2 class="text-base font-black text-slate-800 flex items-center gap-2">
            <i data-lucide="trending-up" class="w-5 h-5 text-orange-500"></i>
            <span id="chart-title-label">시각화 결과</span>
          </h2>
          <span id="chart-type-badge" class="text-xs font-bold bg-orange-50 text-orange-500 border border-orange-100 px-2.5 py-1 rounded-full">막대 차트</span>
        </div>

        <!-- 차트 캔버스 -->
        <div class="relative flex-1 min-h-[300px]">
          <canvas id="myChart"></canvas>
          <!-- 초기 안내 오버레이 -->
          <div id="chart-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
            <i data-lucide="bar-chart-2" class="w-16 h-16 mb-3 opacity-40"></i>
            <p class="text-sm font-bold">왼쪽에서 데이터를 입력하고<br>차트 그리기를 클릭하세요</p>
          </div>
        </div>

        <!-- 통계 요약 -->
        <div id="stats" class="grid grid-cols-4 gap-3"></div>

        <!-- 데이터 테이블 -->
        <div id="data-table-wrap" class="hidden">
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">데이터 표</p>
          <div class="overflow-x-auto rounded-xl border border-slate-100">
            <table class="w-full text-sm text-left">
              <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                  <th class="px-4 py-2.5 font-bold text-slate-500 text-xs">항목</th>
                  <th class="px-4 py-2.5 font-bold text-slate-500 text-xs text-right">값</th>
                  <th class="px-4 py-2.5 font-bold text-slate-500 text-xs text-right">비율</th>
                  <th class="px-4 py-2.5 font-bold text-slate-500 text-xs">시각적 비교</th>
                </tr>
              </thead>
              <tbody id="data-table-body" class="divide-y divide-slate-50"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- 2. Iframe 콘텐츠 영역 -->
  <section id="iframe-section" class="hidden fixed left-0 right-0 bottom-0 overflow-hidden" style="top:56px;">
    <iframe id="content-frame" onload="hideIframeNav()" class="w-full h-full border-0 bg-white" src=""></iframe>
  </section>

  <style>
    .chart-type-btn { background: white; color: #94a3b8; border-color: #e2e8f0; }
    .chart-type-btn:hover { border-color: #fdba74; color: #f97316; background: #fff7ed; }
    .chart-type-btn.active { background: #fff7ed; border-color: #fb923c; color: #ea580c; box-shadow: 0 0 0 3px rgba(251,146,60,0.15); }
  </style>

  <script>
    lucide.createIcons();

    if (window.self !== window.top) {
      const nav = document.querySelector('nav');
      if (nav) { nav.style.display = 'none'; }
      const main = document.getElementById('native-content');
      if (main) { main.style.paddingTop = '2rem'; }
    }

    function loadInIframe(event, url, element) {
      event.preventDefault();
      document.querySelectorAll('.nav-menu').forEach(el => {
        el.className = 'nav-menu outline-none focus:outline-none hover:text-blue-600 transition-colors';
      });
      element.className = 'nav-menu outline-none focus:outline-none text-blue-600 border-b-2 border-blue-600 pb-1';
      document.getElementById('native-content').classList.add('hidden');
      document.getElementById('iframe-section').classList.remove('hidden');
      document.getElementById('content-frame').src = url;
    }

    function showDataLab(event, element) {
      event.preventDefault();
      document.querySelectorAll('.nav-menu').forEach(el => {
        el.className = 'nav-menu outline-none focus:outline-none hover:text-blue-600 transition-colors';
      });
      element.className = 'nav-menu outline-none focus:outline-none text-blue-600 border-b-2 border-blue-600 pb-1';
      document.getElementById('iframe-section').classList.add('hidden');
      document.getElementById('native-content').classList.remove('hidden');
      document.getElementById('content-frame').src = '';
    }

    function hideIframeNav() {
      try {
        const iframe = document.getElementById('content-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const nav = iframeDoc.querySelector('nav');
        if (nav) { nav.style.display = 'none'; nav.style.height = '0'; }
        const main = iframeDoc.querySelector('main');
        if (main) main.style.paddingTop = '0';
      } catch(e) {}
    }

    // ── 차트 로직 ──────────────────────────────────────────
    let currentType = 'bar';
    let myChart = null;

    const COLORS = [
      '#3b82f6','#f97316','#10b981','#8b5cf6',
      '#ec4899','#14b8a6','#f59e0b','#ef4444','#06b6d4','#84cc16'
    ];

    const TYPE_LABELS = {
      bar: '막대 차트', line: '꺾은선 차트', pie: '원형 차트',
      doughnut: '도넛 차트', radar: '레이더 차트', polarArea: '폴라 차트'
    };

    function setType(t) {
      currentType = t;
      document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('btn-' + t);
      if (btn) btn.classList.add('active');
    }

    function addRow() {
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center';
      div.innerHTML = `
        <input type="text"   placeholder="항목명" class="data-label w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
        <input type="number" placeholder="값"    class="data-value w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">
        <button onclick="removeRow(this)" class="text-slate-300 hover:text-rose-400 transition-colors text-lg leading-none shrink-0">✕</button>
      `;
      document.getElementById('data-rows').appendChild(div);
    }

    function removeRow(btn) {
      const rows = document.querySelectorAll('#data-rows > div');
      if (rows.length <= 1) return;
      btn.closest('div').remove();
    }

    function getData() {
      const labels = [], values = [];
      document.querySelectorAll('#data-rows > div').forEach(r => {
        const lbl = r.querySelector('.data-label');
        const val = r.querySelector('.data-value');
        if (lbl && val && lbl.value.trim() && val.value !== '') {
          labels.push(lbl.value.trim());
          values.push(parseFloat(val.value));
        }
      });
      return { labels, values };
    }

    function drawChart() {
      const { labels, values } = getData();
      if (!labels.length) { alert('데이터를 입력해주세요.'); return; }

      // 차트 타입 배지 업데이트
      document.getElementById('chart-type-badge').textContent = TYPE_LABELS[currentType] || currentType;
      document.getElementById('chart-title-label').textContent = '시각화 결과';

      // 초기 안내 숨기기
      document.getElementById('chart-placeholder').style.display = 'none';

      // 기존 차트 제거
      if (myChart) { myChart.destroy(); myChart = null; }

      const bgColors  = values.map((_, i) => COLORS[i % COLORS.length] + 'cc');
      const brdColors = values.map((_, i) => COLORS[i % COLORS.length]);

      const isRadial  = ['pie','doughnut','polarArea'].includes(currentType);
      const isRadar   = currentType === 'radar';

      const dataset = {
        label: '데이터',
        data: values,
        backgroundColor: bgColors,
        borderColor: isRadial ? '#fff' : brdColors,
        borderWidth: isRadial ? 2 : 2,
        borderRadius: currentType === 'bar' ? 8 : 0,
        fill: currentType === 'line' ? 'origin' : undefined,
        tension: currentType === 'line' ? 0.4 : undefined,
        pointBackgroundColor: currentType === 'line' ? brdColors : undefined,
        pointRadius: currentType === 'line' ? 5 : undefined,
      };

      const ctx = document.getElementById('myChart').getContext('2d');
      myChart = new Chart(ctx, {
        type: currentType,
        data: { labels, datasets: [dataset] },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: { duration: 600, easing: 'easeOutQuart' },
          plugins: {
            legend: {
              display: isRadial || isRadar,
              position: 'bottom',
              labels: { font: { size: 12, weight: 'bold' }, padding: 16, usePointStyle: true }
            },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.parsed.y ?? ctx.parsed ?? ctx.raw}  (${((ctx.parsed.y ?? ctx.raw) / values.reduce((a,b)=>a+b,0) * 100).toFixed(1)}%)`
              }
            }
          },
          scales: isRadial ? {} : isRadar ? {
            r: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } }
          } : {
            y: { beginAtZero: true, grid: { color: '#f8fafc', lineWidth: 1.5 }, ticks: { font: { size: 12, weight: '600' } } },
            x: { grid: { display: false }, ticks: { font: { size: 12, weight: '600' } } }
          }
        }
      });

      // ── 통계 카드 ──
      const total = values.reduce((a,b) => a+b, 0);
      const avg   = (total / values.length).toFixed(1);
      const max   = Math.max(...values);
      const min   = Math.min(...values);
      const maxLbl = labels[values.indexOf(max)];
      const minLbl = labels[values.indexOf(min)];

      document.getElementById('stats').innerHTML = `
        <div class="bg-blue-50 border border-blue-100 rounded-2xl p-3 text-center">
          <p class="text-[10px] font-bold text-blue-400 mb-1 uppercase">총합</p>
          <p class="text-xl font-black text-blue-700">${total}</p>
        </div>
        <div class="bg-orange-50 border border-orange-100 rounded-2xl p-3 text-center">
          <p class="text-[10px] font-bold text-orange-400 mb-1 uppercase">평균</p>
          <p class="text-xl font-black text-orange-700">${avg}</p>
        </div>
        <div class="bg-green-50 border border-green-100 rounded-2xl p-3 text-center">
          <p class="text-[10px] font-bold text-green-400 mb-1 uppercase">최대</p>
          <p class="text-xl font-black text-green-700">${max}</p>
          <p class="text-[10px] text-green-400 font-medium mt-0.5">${maxLbl}</p>
        </div>
        <div class="bg-rose-50 border border-rose-100 rounded-2xl p-3 text-center">
          <p class="text-[10px] font-bold text-rose-400 mb-1 uppercase">최소</p>
          <p class="text-xl font-black text-rose-700">${min}</p>
          <p class="text-[10px] text-rose-400 font-medium mt-0.5">${minLbl}</p>
        </div>
      `;

      // ── 데이터 테이블 ──
      document.getElementById('data-table-wrap').classList.remove('hidden');
      const tbody = document.getElementById('data-table-body');
      tbody.innerHTML = labels.map((lbl, i) => {
        const pct  = (values[i] / total * 100).toFixed(1);
        const barW = Math.round(values[i] / max * 100);
        const col  = COLORS[i % COLORS.length];
        return `
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-4 py-2.5 font-bold text-slate-700 flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${col}"></span>${lbl}
            </td>
            <td class="px-4 py-2.5 font-black text-slate-800 text-right">${values[i]}</td>
            <td class="px-4 py-2.5 font-medium text-slate-400 text-right">${pct}%</td>
            <td class="px-4 py-2.5 w-40">
              <div class="h-2 rounded-full bg-slate-100 overflow-hidden">
                <div class="h-full rounded-full transition-all" style="width:${barW}%;background:${col}"></div>
              </div>
            </td>
          </tr>`;
      }).join('');
      lucide.createIcons();
    }

    window.onload = () => {
      setType('bar');
      drawChart();
    };
  </script>
</body>
</html>
