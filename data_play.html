<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 실습실 | Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans">

  <!-- 헤더 -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center space-x-2">
        <div class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold">AI</div>
        <div>
          <div class="text-[14px] font-bold text-slate-900 leading-tight">Sungce <span style="color:#059669">AI-ON</span></div>
          <div class="text-[11px] font-medium text-slate-400 leading-tight">정보 교과 클래스룸</div>
        </div>
      </a>
      <a href="index.html" class="flex items-center space-x-1.5 text-slate-500 hover:text-blue-600 text-sm font-bold transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span>메인으로</span>
      </a>
    </div>
  </header>

  <!-- 히어로 -->
  <section class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white py-16 px-6">
    <div class="max-w-6xl mx-auto">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mb-5">
        <i data-lucide="bar-chart-2" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="text-4xl font-black mb-3">데이터 실습실</h1>
      <p class="text-white/80 text-lg font-medium">데이터를 수집·분석·시각화하는 실습 공간입니다.</p>
    </div>
  </section>

  <!-- 준비 중 안내 -->
  <main class="max-w-6xl mx-auto px-6 py-20 text-center">
    <div class="bg-white rounded-3xl border border-slate-100 p-16 shadow-sm">
      <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
        <i data-lucide="construction" class="w-8 h-8 text-slate-400"></i>
      </div>
      <h2 class="text-2xl font-black text-slate-800 mb-3">준비 중입니다</h2>
      <p class="text-slate-500 font-medium mb-8">곧 멋진 콘텐츠로 찾아뵙겠습니다.</p>
      <a href="index.html" class="inline-flex items-center space-x-2 bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors">
        <i data-lucide="home" class="w-4 h-4"></i>
        <span>홈으로 돌아가기</span>
      </a>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
