<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 실습실 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f8fafc; margin: 0; }
  .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
</style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- 네비게이션 바 -->
  <nav class="shrink-0 w-full z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
    <div class="max-w-7xl mx-auto px-4 md:px-6">
      <div class="flex justify-between items-center h-14">
        <!-- 로고 -->
        <a href="index.html" class="flex items-center space-x-2 shrink-0 outline-none focus:outline-none">
          <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white w-9 h-9 rounded-xl flex items-center justify-center text-xs font-bold">AI</div>
          <div>
            <div class="text-[15px] font-bold text-slate-900 leading-tight">Sungce <span class="text-blue-600">AI-ON</span></div>
            <div class="text-[12px] font-medium text-slate-500 leading-tight">정보 교과 클래스룸</div>
          </div>
        </a>

       </div>
    </div>
  </nav>

  <!-- 1. 네이티브 콘텐츠 영역 -->
  <main id="native-content" class="max-w-7xl mx-auto px-6 pt-8 pb-16 w-full">
    <div class="mb-8">
      <div class="inline-flex items-center space-x-2 bg-orange-50 text-orange-700 px-3 py-1.5 rounded-full text-xs font-bold mb-4 border border-orange-100">
        <i data-lucide="bar-chart-2" class="w-3.5 h-3.5"></i><span>인터렉티브 수업실</span>
      </div>
      <h1 class="text-4xl font-black text-slate-900 mb-2">데이터 실습실 <span class="text-orange-500">📊</span></h1>
      <p class="text-lg text-slate-500 font-medium">데이터를 입력하고 다양한 차트로 시각화해보세요.</p>
    </div>

    <!-- 데이터 입력 및 차트 UI -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
      <div class="lg:col-span-4 card p-6">
        <h2 class="text-base font-black text-slate-800 mb-4 flex items-center space-x-2">
          <i data-lucide="table" class="w-5 h-5 text-orange-500"></i><span>데이터 입력</span>
        </h2>
        <div id="data-rows" class="space-y-2 mb-4">
          <div class="flex space-x-2"><input type="text" placeholder="항목명" value="월요일" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"><input type="number" placeholder="값" value="23" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"></div>
          <div class="flex space-x-2"><input type="text" placeholder="항목명" value="화요일" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"><input type="number" placeholder="값" value="45" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"></div>
          <div class="flex space-x-2"><input type="text" placeholder="항목명" value="수요일" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"><input type="number" placeholder="값" value="31" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"></div>
          <div class="flex space-x-2"><input type="text" placeholder="항목명" value="목요일" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"><input type="number" placeholder="값" value="58" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"></div>
          <div class="flex space-x-2"><input type="text" placeholder="항목명" value="금요일" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"><input type="number" placeholder="값" value="42" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"></div>
        </div>
        <div class="flex space-x-2 mb-4">
          <button onclick="addRow()" class="flex-1 border border-slate-200 text-slate-600 text-sm font-bold py-2 rounded-xl hover:bg-slate-50 transition-colors outline-none focus:outline-none">+ 행 추가</button>
          <button onclick="drawChart()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white text-sm font-bold py-2 rounded-xl transition-colors outline-none focus:outline-none">차트 그리기</button>
        </div>
        <div class="space-y-2">
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">차트 종류</p>
          <div class="grid grid-cols-3 gap-2" id="chart-types">
            <button onclick="setType('bar')" class="chart-type-btn active text-xs font-bold py-2 rounded-xl border transition-colors outline-none focus:outline-none">막대</button>
            <button onclick="setType('line')" class="chart-type-btn text-xs font-bold py-2 rounded-xl border transition-colors outline-none focus:outline-none">꺾은선</button>
            <button onclick="setType('pie')" class="chart-type-btn text-xs font-bold py-2 rounded-xl border transition-colors outline-none focus:outline-none">원형</button>
          </div>
        </div>
      </div>
      <div class="lg:col-span-8 card p-6">
        <h2 class="text-base font-black text-slate-800 mb-4 flex items-center space-x-2">
          <i data-lucide="trending-up" class="w-5 h-5 text-orange-500"></i><span>시각화 결과</span>
        </h2>
        <canvas id="myChart" height="220"></canvas>
        <div id="stats" class="mt-4 grid grid-cols-3 gap-3"></div>
      </div>
    </div>
  </main>

  <!-- 2. Iframe 콘텐츠 영역 -->
  <section id="iframe-section" class="hidden fixed left-0 right-0 bottom-0 overflow-hidden" style="top:56px;">
    <iframe id="content-frame" onload="hideIframeNav()" class="w-full h-full border-0 bg-white" src=""></iframe>
  </section>

  <script>
    lucide.createIcons();

  // index.html iframe 안에서 열렸을 때 nav 숨김 + 콘텐츠 상단 여백 유지
  if (window.self !== window.top) {
    const nav = document.querySelector('nav');
    if (nav) { nav.style.display = 'none'; }
    const main = document.getElementById('native-content');
    if (main) { main.style.paddingTop = '2rem'; }
  }
    
    // ======== Iframe 메뉴 전환 스크립트 ========
    function loadInIframe(event, url, element) {
      event.preventDefault();
      
      // 메뉴 스타일 초기화 및 선택된 메뉴 강조 (검은색 박스 방지를 위해 outline-none 포함)
      document.querySelectorAll('.nav-menu').forEach(el => {
        el.className = 'nav-menu outline-none focus:outline-none hover:text-blue-600 transition-colors';
      });
      element.className = 'nav-menu outline-none focus:outline-none text-blue-600 border-b-2 border-blue-600 pb-1';

      // 네이티브 데이터 실습실 숨기고 iframe 보이기
      document.getElementById('native-content').classList.add('hidden');
      document.getElementById('iframe-section').classList.remove('hidden');
      
      // iframe 주소 변경
      document.getElementById('content-frame').src = url;
    }

    function showDataLab(event, element) {
      event.preventDefault();
      
      // 메뉴 스타일 초기화 및 선택된 메뉴 강조
      document.querySelectorAll('.nav-menu').forEach(el => {
        el.className = 'nav-menu outline-none focus:outline-none hover:text-blue-600 transition-colors';
      });
      element.className = 'nav-menu outline-none focus:outline-none text-blue-600 border-b-2 border-blue-600 pb-1';

      // iframe 숨기고 네이티브 데이터 실습실 보이기
      document.getElementById('iframe-section').classList.add('hidden');
      document.getElementById('native-content').classList.remove('hidden');
      
      // 불필요한 iframe 메모리 비우기
      document.getElementById('content-frame').src = '';
    }

    // iframe 안에서 로드된 페이지의 네비게이션 숨기기 (메뉴 2중 중복 방지)
    function hideIframeNav() {
      try {
        const iframe = document.getElementById('content-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        
        // iframe 내부의 <nav> 요소 찾아서 숨김 처리
        const nav = iframeDoc.querySelector('nav');
        if (nav) { nav.style.display = 'none'; nav.style.height = '0'; nav.style.overflow = 'hidden'; }
        
        // 상단 네비게이션이 사라졌으므로 main 영역의 padding-top 조정
        const main = iframeDoc.querySelector('main');
        if (main) main.style.paddingTop = '0';
      } catch (error) {
        // 보안(CORS) 이유로 로컬 파일 환경 등에서는 접근이 거부될 수 있습니다. (서버 환경에선 정상 작동)
      }
    }
    // ============================================

    // ======== 기존 데이터 실습실 차트 스크립트 ========
    let currentType = 'bar';
    let myChart = null;
    const COLORS = ['#3b82f6','#f97316','#10b981','#8b5cf6','#ec4899','#14b8a6','#f59e0b'];

    function setType(t) {
      currentType = t;
      document.querySelectorAll('.chart-type-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.trim() === {bar:'막대',line:'꺾은선',pie:'원형'}[t]);
        b.className = b.classList.contains('active')
          ? 'chart-type-btn active outline-none focus:outline-none text-xs font-bold py-2 rounded-xl border border-orange-400 bg-orange-50 text-orange-600 transition-colors'
          : 'chart-type-btn outline-none focus:outline-none text-xs font-bold py-2 rounded-xl border border-slate-200 text-slate-500 hover:border-orange-300 transition-colors';
      });
      drawChart();
    }

    function addRow() {
      const div = document.createElement('div');
      div.className = 'flex space-x-2';
      div.innerHTML = `<input type="text" placeholder="항목명" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400"><input type="number" placeholder="값" class="w-1/2 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-orange-400">`;
      document.getElementById('data-rows').appendChild(div);
    }

    function getData() {
      const rows = document.querySelectorAll('#data-rows > div');
      const labels = [], values = [];
      rows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value && ins[1].value) { labels.push(ins[0].value); values.push(parseFloat(ins[1].value)); }
      });
      return { labels, values };
    }

    function drawChart() {
      const { labels, values } = getData();
      if (!labels.length) return;
      if (myChart) myChart.destroy();
      const ctx = document.getElementById('myChart').getContext('2d');
      myChart = new Chart(ctx, {
        type: currentType,
        data: { labels, datasets: [{ label: '데이터', data: values, backgroundColor: COLORS.map(c => c + 'cc'), borderColor: COLORS, borderWidth: 2, borderRadius: currentType === 'bar' ? 8 : 0 }] },
        options: { responsive: true, plugins: { legend: { display: currentType === 'pie' } }, scales: currentType === 'pie' ? {} : { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } }
      });
      const avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);
      const max = Math.max(...values);
      const min = Math.min(...values);
      document.getElementById('stats').innerHTML = [
        ['평균값', avg, 'blue'], ['최댓값', max, 'green'], ['최솟값', min, 'orange']
      ].map(([l,v,c]) => `<div class="bg-${c}-50 border border-${c}-100 rounded-2xl p-3 text-center"><p class="text-xs font-bold text-${c}-400 mb-1">${l}</p><p class="text-xl font-black text-${c}-700">${v}</p></div>`).join('');
    }

    window.onload = () => { setType('bar'); drawChart(); };
  </script>
</body>
</html>
