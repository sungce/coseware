    <script>
        // ==========================================
        // Firebase 초기화 & 관리자 인증
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM",
            authDomain: "book-c2d05.firebaseapp.com",
            databaseURL: "https://book-c2d05-default-rtdb.firebaseio.com",
            projectId: "book-c2d05",
            storageBucket: "book-c2d05.firebasestorage.app",
            messagingSenderId: "566939045493",
            appId: "1:566939045493:web:da65c6ad61f528d446f23c"
        };

        const ADMIN_EMAILS    = ['sungce27@gmail.com'];
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwImkAPT_r8YOLT34BZwqO2AeXPCf6nc60Y07QrOHLO9_5WVLP7Z1ln7koy-V-fvFUs/exec';

        const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);

        auth.onAuthStateChanged((user) => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                // 비관리자 접근 차단
                document.getElementById('access-denied').classList.remove('hidden');
                lucide.createIcons();
                return;
            }
            // 관리자 이름 표시
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('admin-name').textContent = name;
            lucide.createIcons();
            loadMembers();
        });

        async function handleSignOut() {
            await auth.signOut();
            window.location.href = 'index.html';
        }

        // ==========================================
        // 회원 목록 로드 (JSONP 방식 - CORS 우회)
        // ==========================================
        let allMembers = [];

        function loadMembers() {
            const tbody = document.getElementById('member-table-body');
            tbody.innerHTML = `
                <tr><td colspan="4" class="text-center py-12 text-slate-400 font-medium">
                    <div class="flex flex-col items-center space-y-2">
                        <i data-lucide="loader" class="w-6 h-6 animate-spin text-blue-400"></i>
                        <span>불러오는 중...</span>
                    </div>
                </td></tr>`;
            lucide.createIcons();

            // 기존 JSONP 스크립트 제거
            const old = document.getElementById('jsonp-script');
            if (old) old.remove();

            // JSONP 콜백 함수 등록
            window.__membersCallback = function(data) {
                allMembers = data.members || [];
                document.getElementById('stat-members').textContent = allMembers.length;
                renderMembers(allMembers);
                document.getElementById('jsonp-script').remove();
            };

            // 타임아웃 처리
            const timer = setTimeout(() => {
                tbody.innerHTML = `
                    <tr><td colspan="4" class="text-center py-12">
                        <div class="flex flex-col items-center space-y-3">
                            <i data-lucide="wifi-off" class="w-6 h-6 text-rose-400"></i>
                            <span class="text-slate-500 font-medium">데이터를 불러오지 못했습니다.</span>
                            <span class="text-xs text-slate-400 bg-slate-100 px-3 py-1.5 rounded-lg">
                                Apps Script를 <b>새 배포</b>로 다시 배포해주세요.
                            </span>
                        </div>
                    </td></tr>`;
                lucide.createIcons();
            }, 8000);

            window.__membersCallback = function(data) {
                clearTimeout(timer);
                allMembers = data.members || [];
                document.getElementById('stat-members').textContent = allMembers.length;
                renderMembers(allMembers);
                const s = document.getElementById('jsonp-script');
                if (s) s.remove();
            };

            // JSONP 스크립트 태그 삽입
            const script = document.createElement('script');
            script.id  = 'jsonp-script';
            script.src = `${APPS_SCRIPT_URL}?action=getMembers&callback=__membersCallback`;
            document.body.appendChild(script);
        }

        function renderMembers(list) {
            const tbody = document.getElementById('member-table-body');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-400 font-medium">가입한 학생이 없습니다.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map((m, i) => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="px-5 py-4 text-xs font-bold text-slate-400">${i + 1}</td>
                    <td class="px-5 py-4 font-bold text-slate-800">${m.name || '-'}</td>
                    <td class="px-5 py-4 text-slate-500 font-medium text-sm">${m.studentId || '-'}</td>
                    <td class="px-5 py-4 text-slate-500 font-medium text-sm">${m.email || '-'}</td>
                    <td class="px-5 py-4 text-slate-400 font-medium text-xs">${m.date || '-'}</td>
                </tr>
            `).join('');
        }

        function filterMembers() {
            const q = document.getElementById('member-search').value.toLowerCase();
            const filtered = allMembers.filter(m =>
                (m.name      || '').toLowerCase().includes(q) ||
                (m.studentId || '').toLowerCase().includes(q) ||
                (m.email     || '').toLowerCase().includes(q)
            );
            renderMembers(filtered);
        }

        // ==========================================
        // 사이트 설정 저장 (localStorage)
        // ==========================================
        function saveSettings() {
            const settings = {
                siteTitle : document.getElementById('site-title').value,
                schoolYear: document.getElementById('school-year').value,
                classLink : document.getElementById('class-link').value,
            };
            localStorage.setItem('siteSettings', JSON.stringify(settings));
            showToast('설정이 저장되었습니다! ✅');
        }

        function loadSettings() {
            const saved = JSON.parse(localStorage.getItem('siteSettings') || '{}');
            if (saved.siteTitle)  document.getElementById('site-title').value  = saved.siteTitle;
            if (saved.schoolYear) document.getElementById('school-year').value = saved.schoolYear;
            if (saved.classLink)  document.getElementById('class-link').value  = saved.classLink;
        }
        loadSettings();

        // ==========================================
        // 학습자료 추가 (Google Sheets 저장)
        // ==========================================
        async function addMaterial() {
            const unit    = document.getElementById('mat-unit').value;
            const title   = document.getElementById('mat-title').value.trim();
            const content = document.getElementById('mat-content').value.trim();
            if (!title || !content) { showToast('제목과 내용을 입력해주세요.', 'error'); return; }

            const btn = document.querySelector('button[onclick="addMaterial()"]');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>등록 중...</span>';
            lucide.createIcons();

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ type: 'material', unit, title, content })
                });
                document.getElementById('mat-title').value   = '';
                document.getElementById('mat-content').value = '';
                showToast(`[단원 ${unit}] ${title} 자료가 등록되었습니다! 📚`);
            } catch(e) {
                showToast('등록 중 오류가 발생했습니다.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="upload" class="w-4 h-4"></i><span>자료 등록</span>';
                lucide.createIcons();
            }
        }

        // ==========================================
        // 공지사항 추가 (Google Sheets 저장)
        // ==========================================
        async function addNotice() {
            const title      = document.getElementById('notice-title').value.trim();
            const noticeType = document.getElementById('notice-type').value;
            if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }

            const btn = document.querySelector('button[onclick="addNotice()"]');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>등록 중...</span>';
            lucide.createIcons();

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        type      : 'notice',
                        noticeType,
                        title,
                        author    : '정보선생님'
                    })
                });

                document.getElementById('notice-title').value = '';
                const cur = parseInt(document.getElementById('stat-notices').textContent) || 0;
                document.getElementById('stat-notices').textContent = cur + 1;
                showToast('공지사항이 등록되었습니다! 📢');
            } catch(e) {
                showToast('등록 중 오류가 발생했습니다.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="plus" class="w-4 h-4"></i><span>공지 등록</span>';
                lucide.createIcons();
            }
        }

        // ==========================================
        // 토스트
        // ==========================================
        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast   = document.getElementById('toast');
            const wrapper = document.getElementById('toast-icon-wrapper');
            const icon    = document.getElementById('toast-icon');
            const msg     = document.getElementById('toast-msg');
            msg.textContent = message;
            if (type === 'error') {
                wrapper.className = 'p-1.5 rounded-full bg-rose-500/20';
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.className = 'w-4 h-4 text-rose-400';
            } else {
                wrapper.className = 'p-1.5 rounded-full bg-emerald-500/20';
                icon.setAttribute('data-lucide', 'check');
                icon.className = 'w-4 h-4 text-emerald-400';
            }
            lucide.createIcons();
            clearTimeout(toastTimeout);
            toast.classList.remove('translate-y-32', 'opacity-0');
            toastTimeout = setTimeout(() => toast.classList.add('translate-y-32', 'opacity-0'), 4000);
        }

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
