    <script>
        // ==========================================
        // Firebase 초기화 & 관리자 인증
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM",
            authDomain: "book-c2d05.firebaseapp.com",
            databaseURL: "https://book-c2d05-default-rtdb.firebaseio.com",
            projectId: "book-c2d05",
            storageBucket: "book-c2d05.firebasestorage.app",
            messagingSenderId: "566939045493",
            appId: "1:566939045493:web:da65c6ad61f528d446f23c"
        };

        const ADMIN_EMAILS    = ['sungce27@gmail.com'];
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywcUQg705jicQUv-i7RiqAm5-FoogN3d2efXLrg9xGAkfP_OQw6jW3XnrGlsBSa-LN/exec';

        // ☁️ Cloudinary 설정
        const CLOUDINARY_CLOUD_NAME    = 'dudh0etdr';
        const CLOUDINARY_UPLOAD_PRESET = 'school_materials';

        const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);
        const db   = firebase.firestore(app);

        auth.onAuthStateChanged((user) => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                // 비관리자 접근 차단
                document.getElementById('access-denied').classList.remove('hidden');
                lucide.createIcons();
                return;
            }
            // 관리자 이름 표시
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('admin-name').textContent = name;
            lucide.createIcons();
            loadMembers();
            loadMaterialsList();
            loadNoticesList();
            loadAssignmentsList();
        });

        async function handleSignOut() {
            await auth.signOut();
            window.location.href = 'index.html';
        }

        // ── 회원 수 로드 ─────────────
        function loadMembers() {
            const old = document.getElementById('jsonp-members-admin');
            if (old) old.remove();
            window.__membersAdminCb = function(data) {
                const s = document.getElementById('jsonp-members-admin');
                if (s) s.remove();
                const count = (data.members || []).length;
                const el = document.getElementById('stat-members');
                if (el) el.textContent = count;
            };
            const script = document.createElement('script');
            script.id  = 'jsonp-members-admin';
            script.src = `${APPS_SCRIPT_URL}?action=getMembers&callback=__membersAdminCb`;
            document.body.appendChild(script);
        }

        // ==========================================
        // 학습자료 목록 로드 + 수정/삭제 (Firestore)
        // ==========================================
        let allMaterialsDocs = [];
        let currentUnitFilter = 'all';

        async function loadMaterialsList() {
            const container = document.getElementById('materials-list-admin');
            container.innerHTML = `<div class="py-10 flex flex-col items-center space-y-2 text-slate-400">
                <i data-lucide="loader" class="w-6 h-6 animate-spin text-emerald-400"></i>
                <span class="font-medium text-sm">불러오는 중...</span></div>`;
            lucide.createIcons();

            try {
                const snapshot = await db.collection('materials')
                    .orderBy('createdAt', 'desc').get();

                allMaterialsDocs = snapshot.docs.map(doc => {
                    const d  = doc.data();
                    const ts = d.createdAt;
                    const date = ts ? ts.toDate().toLocaleDateString('ko-KR', {
                        year:'numeric', month:'2-digit', day:'2-digit'
                    }).replace(/\. /g,'.').replace(/\.$/,'') : '';
                    return { id: doc.id, unit: d.unit, title: d.title,
                             content: d.content || '', fileName: d.fileName || '',
                             fileUrl: d.fileUrl || '', date };
                });
                renderMaterialsList();
            } catch(e) {
                container.innerHTML = `<div class="py-10 text-center text-slate-400 font-medium text-sm">불러오기 실패: ${e.message}</div>`;
            }
        }

        const UNIT_LABEL = { 'I':'I','II':'II','III':'III','IV':'IV','V':'V' };
        const UNIT_COLOR = {
            'I':'bg-indigo-50 text-indigo-600','II':'bg-emerald-50 text-emerald-600',
            'III':'bg-rose-50 text-rose-600','IV':'bg-blue-50 text-blue-600','V':'bg-amber-50 text-amber-600'
        };

        function renderMaterialsList() {
            const container = document.getElementById('materials-list-admin');
            const filtered  = currentUnitFilter === 'all'
                ? allMaterialsDocs
                : allMaterialsDocs.filter(m => m.unit === currentUnitFilter);

            if (!filtered.length) {
                container.innerHTML = `<div class="py-10 flex flex-col items-center space-y-2 text-slate-400">
                    <i data-lucide="inbox" class="w-8 h-8 text-slate-300"></i>
                    <p class="font-medium text-sm">등록된 자료가 없습니다.</p></div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = `<div class="space-y-2">
                ${filtered.map(m => `
                <div class="flex items-center justify-between p-4 bg-slate-50 hover:bg-white border border-slate-100 hover:border-slate-200 rounded-2xl transition-all group">
                    <div class="flex items-center space-x-3 min-w-0">
                        <span class="text-xs font-black px-2 py-1 rounded-lg shrink-0 ${UNIT_COLOR[m.unit] || 'bg-slate-100 text-slate-500'}">단원 ${m.unit}</span>
                        <div class="min-w-0">
                            <p class="text-sm font-bold text-slate-800 truncate">${m.title}</p>
                            <p class="text-xs text-slate-400 font-medium">${m.date}${m.fileName ? ' · 📎 '+m.fileName : ''}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 ml-3 shrink-0">
                        <button onclick="openEditModal('${m.id}')"
                            class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors" title="수정">
                            <i data-lucide="pencil" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteMaterial('${m.id}', '${m.title.replace(/'/g,"\\'")}')"
                            class="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-colors" title="삭제">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>`).join('')}
            </div>`;
            lucide.createIcons();
        }

        function filterByUnit(unit) {
            currentUnitFilter = unit;
            // 버튼 스타일 업데이트
            ['all','I','II','III','IV','V'].forEach(u => {
                const btn = document.getElementById('filter-' + u);
                if (!btn) return;
                if (u === unit) {
                    btn.className = 'text-xs font-bold px-3 py-1.5 rounded-full bg-emerald-500 text-white transition-all';
                } else {
                    btn.className = 'text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 transition-all';
                }
            });
            renderMaterialsList();
        }

        // ── 수정 모달 ─────────────────────────────────────────
        function openEditModal(docId) {
            const m = allMaterialsDocs.find(d => d.id === docId);
            if (!m) return;
            document.getElementById('edit-doc-id').value    = m.id;
            document.getElementById('edit-unit').value      = m.unit;
            document.getElementById('edit-title').value     = m.title;
            document.getElementById('edit-content').value   = m.content;
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function saveMaterialEdit() {
            const docId   = document.getElementById('edit-doc-id').value;
            const unit    = document.getElementById('edit-unit').value;
            const title   = document.getElementById('edit-title').value.trim();
            const content = document.getElementById('edit-content').value.trim();
            if (!title || !content) { showToast('제목과 내용을 입력해주세요.', 'error'); return; }

            const btn = document.querySelector('button[onclick="saveMaterialEdit()"]');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>저장 중...</span>';
            lucide.createIcons();

            try {
                await db.collection('materials').doc(docId).update({ unit, title, content });
                // 로컬 목록도 업데이트
                const idx = allMaterialsDocs.findIndex(d => d.id === docId);
                if (idx !== -1) Object.assign(allMaterialsDocs[idx], { unit, title, content });
                renderMaterialsList();
                closeEditModal();
                showToast('자료가 수정되었습니다! ✅');
            } catch(e) {
                showToast('수정 오류: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i><span>저장</span>';
                lucide.createIcons();
            }
        }

        // ── 삭제 ─────────────────────────────────────────────
        async function deleteMaterial(docId, title) {
            if (!confirm(`"${title}" 자료를 삭제할까요?\n(첨부파일은 별도로 유지됩니다)`)) return;
            try {
                await db.collection('materials').doc(docId).delete();
                allMaterialsDocs = allMaterialsDocs.filter(d => d.id !== docId);
                renderMaterialsList();
                showToast('자료가 삭제되었습니다.', 'success');
            } catch(e) {
                showToast('삭제 오류: ' + e.message, 'error');
            }
        }

        // ==========================================
        // 수행평가 과제 관리 (Firestore)
        // ==========================================
        let allAssignments = [];

        async function loadAssignmentsList() {
            try {
                const snap = await db.collection('assignments').orderBy('createdAt','asc').get();
                allAssignments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch(e) {
                console.error('불러오기 실패: ', e.message);
            }
        }

        // ==========================================
        // 공지사항 목록 로드 (JSONP)
        // ==========================================
        let allNotices = [];

        function loadNoticesList() {
            const old = document.getElementById('jsonp-notices-admin');
            if (old) old.remove();

            window.__noticesAdminCb = function(data) {
                const s = document.getElementById('jsonp-notices-admin');
                if (s) s.remove();
                allNotices = data.notices || [];
            };

            const script = document.createElement('script');
            script.id  = 'jsonp-notices-admin';
            script.src = `${APPS_SCRIPT_URL}?action=getNotices&callback=__noticesAdminCb`;
            document.body.appendChild(script);
        }

        // ── 공지사항 수정 모달 ─────────────────────────────────
        function openNoticeEditModal(id, title, type) {
            document.getElementById('notice-edit-id').value    = id;
            document.getElementById('notice-edit-title').value = title;
            document.getElementById('notice-edit-type').value  = type;
            const modal = document.getElementById('notice-edit-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeNoticeEditModal() {
            document.getElementById('notice-edit-modal').classList.add('hidden');
            document.getElementById('notice-edit-modal').classList.remove('flex');
        }

        async function saveNoticeEdit() {
            const id    = document.getElementById('notice-edit-id').value;
            const title = document.getElementById('notice-edit-title').value.trim();
            const type  = document.getElementById('notice-edit-type').value;
            if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('notice-save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i><span>저장 중...</span>';
            lucide.createIcons();

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ type: 'updateNotice', id, title, noticeType: type })
                });
                const idx = allNotices.findIndex(n => n.id === id);
                if (idx !== -1) { allNotices[idx].title = title; allNotices[idx].type = type; }
                closeNoticeEditModal();
                showToast('공지사항이 수정되었습니다! ✅');
            } catch(e) {
                showToast('수정 오류: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i><span>저장</span>';
                lucide.createIcons();
            }
        }

        // ── 공지사항 삭제 ──────────────────────────────────────
        async function deleteNotice(id, title) {
            if (!confirm(`"${title}" 공지사항을 삭제할까요?`)) return;
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ type: 'deleteNotice', id })
                });
                allNotices = allNotices.filter(n => n.id !== id);
                const cur = parseInt(document.getElementById('stat-notices').textContent) || 1;
                document.getElementById('stat-notices').textContent = Math.max(0, cur - 1);
                showToast('공지사항이 삭제되었습니다.');
            } catch(e) {
                showToast('삭제 오류: ' + e.message, 'error');
            }
        }

        // ==========================================
        // 토스트
        // ==========================================
        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast   = document.getElementById('toast');
            const wrapper = document.getElementById('toast-icon-wrapper');
            const icon    = document.getElementById('toast-icon');
            const msg     = document.getElementById('toast-msg');
            msg.textContent = message;
            if (type === 'error') {
                wrapper.className = 'p-1.5 rounded-full bg-rose-500/20';
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.className = 'w-4 h-4 text-rose-400';
            } else {
                wrapper.className = 'p-1.5 rounded-full bg-emerald-500/20';
                icon.setAttribute('data-lucide', 'check');
                icon.className = 'w-4 h-4 text-emerald-400';
            }
            lucide.createIcons();
            clearTimeout(toastTimeout);
            toast.classList.remove('translate-y-32', 'opacity-0');
            toastTimeout = setTimeout(() => toast.classList.add('translate-y-32', 'opacity-0'), 4000);
        }

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
