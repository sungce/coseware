<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 분석 대시보드 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  body { font-family: 'Pretendard', 'Outfit', -apple-system, sans-serif; background: #f4f7f9; margin: 0; overflow: visible; }
  .card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .stat-card { transition: transform .15s, box-shadow .15s; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.08); }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .06em; padding: 12px 16px; border-bottom: 2px solid #e2e8f0; text-align: left; }
  td { padding: 13px 16px; font-size: 14px; font-weight: 500; border-bottom: 1px solid #f1f5f9; color: #1e293b; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .bar-bg { width: 100%; height: 7px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .badge { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  input[type="text"], input[type="number"], select, textarea {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    color: #1e293b; font-family: inherit; outline: none; font-size: 13px;
  }
  input:focus, select:focus, textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
  .tab-btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: all .12s; }
  .tab-btn.on { background: #eef2ff; border-color: #c7d2fe; color: #4338ca; }
  .action-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #374151; transition: all .12s; white-space: nowrap; }
  .action-btn:hover { background: #f8fafc; }
  .action-btn.primary { background: #4f46e5; border-color: #4f46e5; color: white; }
  .action-btn.primary:hover { background: #4338ca; }
  .action-btn.success { background: #16a34a; border-color: #16a34a; color: white; }
  .action-btn.success:hover { background: #15803d; }
  .action-btn.danger { background: #fff1f2; border-color: #fca5a5; color: #b91c1c; }
</style>
</head>
<body>
<main class="max-w-[1400px] mx-auto px-4 md:px-6 pt-8 pb-16">

  <!-- 헤더 -->
  <div class="mb-8">
    <div class="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full text-xs font-black mb-4 border border-indigo-100">
      <i data-lucide="bar-chart-2" class="w-3.5 h-3.5"></i>데이터 실습실
    </div>
    <h1 class="text-4xl font-black text-slate-900 mb-3">데이터 분석 대시보드 <span class="text-indigo-500">📊</span></h1>
    <p class="text-lg text-slate-500 font-medium">학생 데이터를 불러오고 분석하며 시각화해보세요.</p>
  </div>

  <!-- 탭 + 액션 버튼 -->
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div class="flex gap-2" id="tabs">
      <button class="tab-btn on" onclick="switchTab('table',this)">📋 표 보기</button>
      <button class="tab-btn" onclick="switchTab('chart',this)">📈 차트 보기</button>
      <button class="tab-btn" onclick="switchTab('add',this)">➕ 데이터 추가</button>
    </div>
    <div class="flex gap-2 flex-wrap">
      <button class="action-btn" onclick="loadSampleData()">
        <i data-lucide="database" class="w-3.5 h-3.5"></i>예시 데이터 불러오기
      </button>
      <button class="action-btn" onclick="document.getElementById('csv-file-btn').click()">
        <i data-lucide="upload" class="w-3.5 h-3.5"></i>CSV 불러오기
      </button>
      <input type="file" id="csv-file-btn" accept=".csv" class="hidden" onchange="loadCSV(this)">
      <button class="action-btn success" onclick="saveToCSV()">
        <i data-lucide="download" class="w-3.5 h-3.5"></i>CSV 저장
      </button>
      <button class="action-btn" onclick="saveToLocalStorage()">
        <i data-lucide="save" class="w-3.5 h-3.5"></i>로컬 저장
      </button>
    </div>
  </div>

  <!-- 요약 카드 -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6" id="summary-cards">
    <div class="card stat-card p-5">
      <p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">총 학생 수</p>
      <p class="text-3xl font-black text-slate-900 tabular-nums" id="stat-total">0</p>
      <p class="text-xs text-slate-400 font-medium mt-1">명</p>
    </div>
    <div class="card stat-card p-5">
      <p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">평균 점수</p>
      <p class="text-3xl font-black text-indigo-600 tabular-nums" id="stat-avg">0</p>
      <p class="text-xs text-slate-400 font-medium mt-1">점</p>
    </div>
    <div class="card stat-card p-5">
      <p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">과제 완료율</p>
      <p class="text-3xl font-black text-emerald-600 tabular-nums" id="stat-comp">0</p>
      <p class="text-xs text-slate-400 font-medium mt-1">%</p>
    </div>
    <div class="card stat-card p-5">
      <p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">최고 점수</p>
      <p class="text-3xl font-black text-amber-500 tabular-nums" id="stat-max">0</p>
      <p class="text-xs text-slate-400 font-medium mt-1">점</p>
    </div>
  </div>

  <!-- 표 보기 -->
  <div id="panel-table">
    <div class="card overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50/50">
        <h2 class="text-sm font-black text-slate-800 flex items-center gap-2">
          <i data-lucide="table" class="w-4 h-4 text-indigo-500"></i>학생 상세 데이터
          <span id="row-count" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-black">0행</span>
        </h2>
        <div class="flex gap-2">
          <input type="text" id="search-input" placeholder="이름 또는 과목 검색..." class="px-3 py-2 text-xs w-44"
            oninput="filterTable(this.value)">
        </div>
      </div>
      <div class="overflow-x-auto">
        <!-- 기존 <div id="panel-table"> 안의 table 부분을 아래와 같이 수정합니다 -->
<table>
  <thead>
    <tr id="table-head-row">
      <!-- 헤더가 자바스크립트로 동적 생성됩니다 -->
    </tr>
  </thead>
  <tbody id="table-body">
    <tr><td colspan="10" class="text-center py-12 text-slate-400 font-medium">데이터를 불러오거나 추가해주세요.</td></tr>
  </tbody>
</table>
      </div>
    </div>
  </div>

  <!-- 차트 보기 -->
  <div id="panel-chart" class="hidden">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="card p-6">
        <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2">
          <i data-lucide="bar-chart" class="w-4 h-4 text-indigo-500"></i>학생별 점수
        </h3>
        <canvas id="chart-scores" height="240"></canvas>
      </div>
      <div class="card p-6">
        <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2">
          <i data-lucide="pie-chart" class="w-4 h-4 text-emerald-500"></i>완료 현황
        </h3>
        <canvas id="chart-status" height="240"></canvas>
      </div>
      <div class="card p-6 lg:col-span-2">
        <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2">
          <i data-lucide="trending-up" class="w-4 h-4 text-amber-500"></i>진도율 분포
        </h3>
        <canvas id="chart-progress" height="120"></canvas>
      </div>
    </div>
  </div>

  <!-- 데이터 추가 -->
  <div id="panel-add" class="hidden">
    <div class="card p-6">
      <h2 class="text-sm font-black text-slate-800 mb-5 flex items-center gap-2">
        <i data-lucide="plus-circle" class="w-4 h-4 text-indigo-500"></i>새 데이터 입력
      </h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 mb-4">
        <div>
          <label class="text-xs font-black text-slate-400 uppercase tracking-wider block mb-1.5">이름 *</label>
          <input type="text" id="inp-name" placeholder="예) 홍길동" class="w-full px-3 py-2.5">
        </div>
        <div>
          <label class="text-xs font-black text-slate-400 uppercase tracking-wider block mb-1.5">학번</label>
          <input type="text" id="inp-sid" placeholder="예) 30101" class="w-full px-3 py-2.5">
        </div>
        <div>
          <label class="text-xs font-black text-slate-400 uppercase tracking-wider block mb-1.5">과제명 *</label>
          <input type="text" id="inp-task" placeholder="예) 알고리즘 퀴즈" class="w-full px-3 py-2.5">
        </div>
        <div>
          <label class="text-xs font-black text-slate-400 uppercase tracking-wider block mb-1.5">점수 (0–100)</label>
          <input type="number" id="inp-score" placeholder="0" min="0" max="100" class="w-full px-3 py-2.5">
        </div>
        <div>
          <label class="text-xs font-black text-slate-400 uppercase tracking-wider block mb-1.5">진도율 (0–100%)</label>
          <input type="number" id="inp-prog" placeholder="0" min="0" max="100" class="w-full px-3 py-2.5">
        </div>
        <div>
          <label class="text-xs font-black text-slate-400 uppercase tracking-wider block mb-1.5">상태</label>
          <select id="inp-status" class="w-full px-3 py-2.5">
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
            <option value="미제출">미제출</option>
          </select>
        </div>
      </div>
      <p id="add-err" class="text-xs text-rose-500 font-bold mb-3 hidden">이름과 과제명은 필수입니다.</p>
      <div class="flex gap-3">
        <button class="action-btn primary" onclick="addRow()">
          <i data-lucide="plus" class="w-4 h-4"></i>추가하기
        </button>
        <button class="action-btn" onclick="clearForm()">초기화</button>
      </div>
    </div>
  </div>      <p id="url-err" class="text-xs text-rose-500 font-bold mt-2 hidden"></p>
    </div>
  </div>

</main>

<script>
 lucide.createIcons();

  let allData = [];
  let filteredData = [];
  let currentHeaders = ['이름', '학번', '과제명', '점수', '진도율', '상태']; // 기본 헤더값 설정
  let chartScores = null, chartStatus = null, chartProgress = null;

  // ── 예시 데이터 ──────────────────────────────────────
  const SAMPLE_DATA = [
    { name:'김민준', sid:'30101', task:'알고리즘 퀴즈', score:92, progress:100, status:'완료' },
    { name:'이서연', sid:'30102', task:'데이터 라벨링', score:85, progress:100, status:'완료' },
    { name:'박지훈', sid:'30103', task:'순서도 그리기', score:70, progress:75,  status:'진행중' },
    { name:'최수아', sid:'30104', task:'웹 코딩 실습', score:95, progress:100, status:'완료' },
    { name:'정도윤', sid:'30105', task:'블록코딩 과제', score:55, progress:40,  status:'진행중' }
  ];

  function switchTab(name, btn) {
    ['table','chart','add'].forEach(id => {
      document.getElementById('panel-'+id).classList.toggle('hidden', id !== name);
    });
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    if (name === 'chart') renderCharts();
    lucide.createIcons();
  }

  function loadSampleData() {
    currentHeaders = ['이름', '학번', '과제명', '점수', '진도율', '상태'];
    allData = SAMPLE_DATA.map(d => ({
      '이름': d.name, '학번': d.sid, '과제명': d.task, 
      '점수': d.score, '진도율': d.progress, '상태': d.status
    }));
    filteredData = [...allData];
    renderTable(filteredData); updateSummary();
    showToast('✅ 예시 데이터가 불러와졌습니다!');
  }

  // ── 💡 CSV 동적 불러오기 로직 ────────────────────────
  function loadCSV(input) {
    const file = input.files[0]; if (!file) return;

    function parseCSVText(text) {
      // BOM 제거 (UTF-8 BOM: \uFEFF, EUC-KR BOM도 처리)
      const cleaned = text.replace(/^\uFEFF/, '');
      const lines = cleaned.split(/\r\n|\r|\n/).filter(l => l.trim());
      if (lines.length === 0) return;

      currentHeaders = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));

      allData = lines.slice(1).map(line => {
        const vals = line.split(',');
        const row = {};
        currentHeaders.forEach((h, i) => {
          let val = vals[i]?.trim() || '';
          if (val !== '' && !isNaN(val)) val = Number(val);
          row[h] = val;
        });
        return row;
      }).filter(r => Object.values(r).some(v => v !== '' && v !== 0));

      filteredData = [...allData];
      renderTable(filteredData); updateSummary();
      showToast(`✅ CSV ${allData.length}개 데이터를 불러왔습니다!`);
      input.value = '';
    }

    // 1차: UTF-8로 시도
    const r1 = new FileReader();
    r1.onload = e => {
      const text = e.target.result;
      // 한글 깨짐 감지 (UTF-8 실패 시 EUC-KR로 재시도)
      const hasGarbled = /[\ufffd]/.test(text) || /[\x80-\x9f]/.test(text);
      if (hasGarbled) {
        const r2 = new FileReader();
        r2.onload = e2 => parseCSVText(e2.target.result);
        r2.readAsText(file, 'EUC-KR');
      } else {
        parseCSVText(text);
      }
    };
    r1.readAsText(file, 'UTF-8');
  }

  function addRow() {
    const newRow = {};
    currentHeaders.forEach(h => newRow[h] = '-'); // 기본값 초기화
    
    // 입력폼에 있는 데이터가 현재 헤더에 존재할 경우 매핑
    if(currentHeaders.includes('이름')) newRow['이름'] = document.getElementById('inp-name').value.trim() || '이름없음';
    if(currentHeaders.includes('과제명')) newRow['과제명'] = document.getElementById('inp-task').value.trim() || '-';
    if(currentHeaders.includes('학번')) newRow['학번'] = document.getElementById('inp-sid').value.trim();
    if(currentHeaders.includes('점수')) newRow['점수'] = Number(document.getElementById('inp-score').value) || 0;
    if(currentHeaders.includes('진도율')) newRow['진도율'] = Number(document.getElementById('inp-prog').value) || 0;
    if(currentHeaders.includes('상태')) newRow['상태'] = document.getElementById('inp-status').value;

    allData.push(newRow);
    filteredData = [...allData];
    renderTable(filteredData); updateSummary(); clearForm();
    showToast('✅ 데이터가 추가됐습니다!');
  }

  function clearForm() {
    ['inp-name','inp-sid','inp-task','inp-score','inp-prog'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('inp-status').value = '진행중';
  }

  function deleteRow(idx) {
    if (!confirm('해당 데이터를 삭제할까요?')) return;
    allData.splice(idx, 1);
    filteredData = [...allData];
    renderTable(filteredData); updateSummary();
  }

  // ── 💡 동적 테이블 렌더링 ────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('table-body');
    const theadRow = document.getElementById('table-head-row');
    document.getElementById('row-count').textContent = data.length + '행';

    // 헤더 동적 렌더링
    if(theadRow) {
      theadRow.innerHTML = currentHeaders.map(h => `<th>${h}</th>`).join('') + '<th>액션</th>';
    }

    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="${currentHeaders.length + 1}" class="text-center py-12 text-slate-400 font-medium">데이터가 없습니다.</td></tr>`;
      return;
    }

    const BAR_COLORS = { '완료':'#22c55e', '진행중':'#f59e0b', '미제출':'#ef4444' };

    tbody.innerHTML = data.map((row, i) => {
      const realIdx = allData.indexOf(row);
      
      // 현재 헤더 배열(currentHeaders)을 순회하며 td를 생성합니다.
      const tds = currentHeaders.map(h => {
        let val = row[h] !== undefined ? row[h] : '-';

        // 기존 UI(진도율 바, 상태 뱃지) 디자인 유지 조건문
        if (h === '상태' && ['완료', '진행중', '미제출'].includes(String(val))) {
          const badge = val === '완료' ? '<span class="badge" style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0">완료</span>'
            : val === '미제출' ? '<span class="badge" style="background:#fff1f2;color:#b91c1c;border:1px solid #fecdd3">미제출</span>'
            : '<span class="badge" style="background:#fffbeb;color:#b45309;border:1px solid #fde68a">진행중</span>';
          return `<td>${badge}</td>`;
        } else if (h === '진도율' && !isNaN(val)) {
          const prog = Math.min(Number(val), 100);
          const barColor = BAR_COLORS[row['상태']] || '#6366f1';
          return `<td>
            <div style="display:flex;align-items:center;gap:8px;min-width:120px">
              <div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:${prog}%;background:${barColor}"></div></div>
              <span class="text-xs font-black text-slate-500">${prog}%</span>
            </div>
          </td>`;
        } else if (h === '이름') {
          return `<td><strong>${val}</strong></td>`;
        } else if (h === '점수') {
          return `<td class="font-black text-slate-900 tabular-nums">${val}</td>`;
        } else {
          return `<td>${val}</td>`;
        }
      }).join('');

      return `<tr>
        ${tds}
        <td>
          <button onclick="deleteRow(${realIdx})" class="action-btn danger" style="padding:4px 10px;font-size:11px;">
            <i data-lucide="trash-2" style="width:12px;height:12px"></i>삭제
          </button>
        </td>
      </tr>`;
    }).join('');
    lucide.createIcons();
  }

  function filterTable(q) {
    const kw = q.toLowerCase();
    filteredData = allData.filter(r => {
      // 모든 열의 데이터를 검색 대상으로 변경
      return currentHeaders.some(h => String(r[h]).toLowerCase().includes(kw));
    });
    renderTable(filteredData);
  }

  function updateSummary() {
    const n = allData.length;
    const scores = allData.map(r => Number(r['점수']) || 0); // '점수' 컬럼이 없으면 0으로 처리
    const avg = n ? Math.round(scores.reduce((a,b)=>a+b,0)/n) : 0;
    const done = allData.filter(r => r['상태'] === '완료').length;
    const max = n ? Math.max(...scores) : 0;
    
    document.getElementById('stat-total').textContent = n;
    document.getElementById('stat-avg').textContent = avg;
    document.getElementById('stat-comp').textContent = n ? Math.round(done/n*100) : 0;
    document.getElementById('stat-max').textContent = max;
  }

  function renderCharts() {
    if (!allData.length) return;
    const PALETTE = ['#6366f1','#22c55e','#f59e0b','#ef4444','#3b82f6','#8b5cf6','#14b8a6','#f97316','#ec4899','#64748b'];

    const getLabels = () => {
       // '이름' 컬럼이 없으면 첫번째 컬럼을 라벨로 사용
       const key = currentHeaders.includes('이름') ? '이름' : currentHeaders[0];
       return allData.map(r => r[key]);
    };

    if (chartScores) chartScores.destroy();
    chartScores = new Chart(document.getElementById('chart-scores'), {
      type: 'bar',
      data: {
        labels: getLabels(),
        datasets: [{ label: '점수', data: allData.map(r => r['점수'] || 0),
          backgroundColor: allData.map((_,i)=>PALETTE[i%PALETTE.length]+'cc'),
          borderColor: allData.map((_,i)=>PALETTE[i%PALETTE.length]),
          borderWidth: 1.5, borderRadius: 5 }]
      },
      options: { responsive:true, plugins:{legend:{display:false}}, scales:{ y:{min:0,max:100,ticks:{font:{size:11}}} } }
    });

    if (chartStatus) chartStatus.destroy();
    const done = allData.filter(r=>r['상태']==='완료').length;
    const ing  = allData.filter(r=>r['상태']==='진행중').length;
    const none = allData.filter(r=>r['상태']==='미제출').length;
    chartStatus = new Chart(document.getElementById('chart-status'), {
      type: 'doughnut',
      data: {
        labels: ['완료','진행중','미제출'],
        datasets: [{ data:[done,ing,none], backgroundColor:['#22c55e','#f59e0b','#ef4444'], borderWidth:0 }]
      },
      options: { responsive:true, cutout:'65%', plugins:{ legend:{ position:'bottom', labels:{font:{size:12},padding:16} } } }
    });

    if (chartProgress) chartProgress.destroy();
    const sorted = [...allData].sort((a,b)=>(b['진도율']||0)-(a['진도율']||0));
    chartProgress = new Chart(document.getElementById('chart-progress'), {
      type: 'line',
      data: {
        labels: sorted.map(r => r['이름'] || r[currentHeaders[0]]),
        datasets: [{ label:'진도율(%)', data: sorted.map(r=>r['진도율']||0),
          borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,.1)',
          fill:true, tension:.35, pointRadius:4, pointBackgroundColor:'#6366f1' }]
      },
      options: { responsive:true, scales:{ y:{min:0,max:100,ticks:{font:{size:11}}} }, plugins:{ legend:{display:false} } }
    });
  }

  function saveToCSV() {
    if (!allData.length) { showToast('⚠️ 저장할 데이터가 없습니다.'); return; }
    // 동적 헤더를 그대로 저장
    const rows = [currentHeaders, ...allData.map(r => currentHeaders.map(h => r[h]))];
    const csv = rows.map(r=>r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '학습데이터_' + new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','') + '.csv';
    a.click();
    showToast('✅ CSV 파일이 저장됐습니다!');
  }

  function saveToLocalStorage() {
    if (!allData.length) { showToast('⚠️ 저장할 데이터가 없습니다.'); return; }
    localStorage.setItem('data_dash_data', JSON.stringify({ headers: currentHeaders, data: allData }));
    showToast('✅ 브라우저에 저장됐습니다!');
  }

  let toastTimer;
  function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:13px;font-weight:700;padding:10px 22px;border-radius:999px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s;white-space:nowrap';
      document.body.appendChild(t);
    }
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.opacity = '0', 2500);
  }

  const saved = localStorage.getItem('data_dash_data');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if(parsed.headers && parsed.data) {
        currentHeaders = parsed.headers;
        allData = parsed.data;
      } else {
        // 하위 호환성 (구버전 로컬스토리지 구조 대응)
        allData = parsed;
      }
      filteredData = [...allData];
      renderTable(filteredData); updateSummary();
      showToast('💾 저장된 데이터를 복원했습니다.');
    } catch(e) {}
  }
</script>
</body>
</html>
