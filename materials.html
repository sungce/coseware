    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        .accordion-body { max-height:0; overflow:hidden; transition:max-height 0.45s cubic-bezier(0.16,1,0.3,1); }
        .accordion-body.open { max-height:3000px; }
        .chevron { transition:transform 0.35s ease; }
        .chevron.open { transform:rotate(180deg); }
        .unit-I   { border-left:4px solid #6366f1; }
        .unit-II  { border-left:4px solid #22c55e; }
        .unit-III { border-left:4px solid #ef4444; }
        .unit-IV  { border-left:4px solid #3b82f6; }
        .unit-V   { border-left:4px solid #f59e0b; }
        .badge-I  { background:#eef2ff; color:#4f46e5; }
        .badge-II { background:#f0fdf4; color:#16a34a; }
        .badge-III{ background:#fff1f2; color:#dc2626; }
        .badge-IV { background:#eff6ff; color:#2563eb; }
        .badge-V  { background:#fffbeb; color:#d97706; }
        .num-I  { color:#6366f1; }
        .num-II { color:#22c55e; }
        .num-III{ color:#ef4444; }
        .num-IV { color:#3b82f6; }

<body class="bg-slate-50 min-h-screen" style="background-image:radial-gradient(#e2e8f0 1px,transparent 1px);background-size:32px 32px;">

    <main class="max-w-5xl mx-auto px-6 pt-28 pb-24 fade-in">

                        <h2 class="text-lg font-black text-slate-900">데이터</h2>
                    </div>
                    <div class="flex items-center space-x-3 ml-4 shrink-0">
                        <span id="count-unit2" class="text-xs font-bold text-slate-400 bg-slate-100 px-2.5 py-1 rounded-full hidden">0개</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-400 chevron" id="chevron-unit2"></i>

                </button>
                <div class="accordion-body" id="unit2">
                    <div class="px-8 pb-7 border-t border-slate-100">
                        <div class="pt-5" id="mat-unit2"><div class="py-8 text-center text-slate-400 font-medium flex flex-col items-center space-y-2"><i data-lucide="loader" class="w-5 h-5 animate-spin text-emerald-400"></i><span>불러오는 중...</span></div></div>
                    </div>
                </div>

            <!-- 단원 III -->
            <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden unit-III ring-2 ring-red-200">
                <button onclick="toggleUnit('unit3')" class="w-full px-8 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors text-left">
                    <div class="flex items-center space-x-5">

                    </div>

                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-400 chevron" id="chevron-unit3"></i>
                    </div>
                </button>
                <div class="accordion-body" id="unit3">
                    <div class="px-8 pb-7 border-t border-slate-100">
                        <div class="pt-5" id="mat-unit3"><div class="py-8 text-center text-slate-400 font-medium flex flex-col items-center space-y-2"><i data-lucide="loader" class="w-5 h-5 animate-spin text-emerald-400"></i><span>불러오는 중...</span></div></div>
                    </div>
                </div>

            <!-- 단원 IV -->
            <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden unit-IV">
                <button onclick="toggleUnit('unit4')" class="w-full px-8 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors text-left">
                    <div class="flex items-center space-x-5">
                        <span class="text-2xl font-black num-IV font-serif w-10 shrink-0">IV</span>
                        <h2 class="text-lg font-black text-slate-900">인공지능</h2>
                    </div>
                    <div class="flex items-center space-x-3 ml-4 shrink-0">
                        <span id="count-unit4" class="text-xs font-bold text-slate-400 bg-slate-100 px-2.5 py-1 rounded-full hidden">0개</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-400 chevron" id="chevron-unit4"></i>
                    </div>
                </button>
                <div class="accordion-body" id="unit4">
                    <div class="px-8 pb-7 border-t border-slate-100">
                        <div class="pt-5" id="mat-unit4"><div class="py-8 text-center text-slate-400 font-medium flex flex-col items-center space-y-2"><i data-lucide="loader" class="w-5 h-5 animate-spin text-emerald-400"></i><span>불러오는 중...</span></div></div>
                    </div>
                </div>
            </div>

            <!-- 단원 V -->
            <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden unit-V">
                <button onclick="toggleUnit('unit5')" class="w-full px-8 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors text-left">
                    <div class="flex items-center space-x-5">
                        <span class="text-2xl font-black num-V font-serif w-10 shrink-0">V</span>
                        <h2 class="text-lg font-black text-slate-900">디지털 문화</h2>
                    </div>
                    <div class="flex items-center space-x-3 ml-4 shrink-0">
                        <span id="count-unit5" class="text-xs font-bold text-slate-400 bg-slate-100 px-2.5 py-1 rounded-full hidden">0개</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-400 chevron" id="chevron-unit5"></i>

                </button>
                <div class="accordion-body" id="unit5">
                    <div class="px-8 pb-7 border-t border-slate-100">
                        <div class="pt-5" id="mat-unit5"><div class="py-8 text-center text-slate-400 font-medium flex flex-col items-center space-y-2"><i data-lucide="loader" class="w-5 h-5 animate-spin text-emerald-400"></i><span>불러오는 중...</span></div></div>

        <div class="mt-10 bg-blue-50 border border-blue-100 rounded-2xl px-6 py-5 flex items-start space-x-4">

            <p class="text-sm text-blue-700 font-medium">새로운 학습자료는 선생님이 순차적으로 업로드할 예정입니다. 공지사항을 확인해 주세요.</p>

    <footer class="border-t border-slate-200/60 bg-white/60 backdrop-blur-sm">
        <div class="max-w-5xl mx-auto px-6 py-6 text-center text-sm text-slate-400 font-medium">
            © 2026 수완하나중학교 정보 교과. All rights reserved.
        </div>

    <!-- 자료 내용 모달 -->
    <div id="mat-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4"
        onclick="if(event.target===this) closeModal()">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col">
            <div class="flex items-center justify-between px-8 py-6 border-b border-slate-100">
                <div>
                    <p class="text-xs font-bold text-emerald-600 mb-1" id="modal-unit-label"></p>
                    <h3 class="text-xl font-black text-slate-900" id="modal-title"></h3>
                    <p class="text-xs text-slate-400 font-medium mt-1" id="modal-date"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-2 rounded-xl hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="overflow-y-auto px-8 py-6">
                <div id="modal-content" class="text-slate-700 font-medium leading-relaxed text-sm whitespace-pre-wrap mb-6"></div>
                <!-- 파일 다운로드 버튼 (파일 있을 때만 표시) -->
                <a id="modal-file-btn" href="#" target="_blank"
                    class="hidden items-center justify-center space-x-2 w-full bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold py-3.5 rounded-2xl hover:bg-emerald-100 transition-colors">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    <span id="modal-file-name">파일 다운로드</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // ── Firebase 초기화 ───────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM",
            authDomain: "book-c2d05.firebaseapp.com",
            projectId: "book-c2d05",
            storageBucket: "book-c2d05.firebasestorage.app",
            messagingSenderId: "566939045493",
            appId: "1:566939045493:web:da65c6ad61f528d446f23c"
        };
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const db  = firebase.firestore(app);

        const UNIT_MAP = { 'I':'unit1', 'II':'unit2', 'III':'unit3', 'IV':'unit4', 'V':'unit5' };
        const UNIT_NAMES = {
            'I':'I. 컴퓨팅 시스템', 'II':'II. 데이터',
            'III':'III. 알고리즘과 프로그래밍', 'IV':'IV. 인공지능', 'V':'V. 디지털 문화'
        };

        let loaded = false;

        // ── Firestore에서 자료 불러오기 ──────────────────────
        async function loadMaterials() {
            if (loaded) return;
            loaded = true;

            try {
                const snapshot = await db.collection('materials')
                    .orderBy('createdAt', 'desc')
                    .get();

                const allMaterials = snapshot.docs.map(doc => {
                    const d = doc.data();
                    const ts = d.createdAt;
                    const date = ts ? ts.toDate().toLocaleDateString('ko-KR', {
                        year:'numeric', month:'2-digit', day:'2-digit'
                    }).replace(/\. /g,'.').replace(/\.$/,'') : '';
                    return { id: doc.id, unit: d.unit, title: d.title,
                             content: d.content, fileName: d.fileName || '',
                             fileUrl: d.fileUrl || '', date };
                });

                Object.entries(UNIT_MAP).forEach(([roman, uid]) => {
                    const items = allMaterials.filter(m => m.unit === roman);
                    // 자료 개수 배지 표시
                    const countEl = document.getElementById('count-' + uid);
                    if (countEl) {
                        countEl.textContent = items.length + '개';
                        if (items.length > 0) {
                            countEl.classList.remove('hidden');
                            countEl.classList.add('text-emerald-600', 'bg-emerald-50');
                            countEl.classList.remove('text-slate-400', 'bg-slate-100');
                        } else {
                            countEl.classList.remove('hidden');
                        }
                    }
                    renderUnitMaterials(uid, items);
                });
            } catch(e) {
                console.error(e);
                Object.values(UNIT_MAP).forEach(uid => renderUnitMaterials(uid, []));
            }
        }

        function renderUnitMaterials(uid, items) {
            const container = document.getElementById('mat-' + uid);
            if (!container) return;
            if (!items.length) {
                container.innerHTML = `
                    <div class="py-10 flex flex-col items-center space-y-2 text-slate-400">
                        <i data-lucide="inbox" class="w-8 h-8 text-slate-300"></i>
                        <p class="font-medium text-sm">등록된 자료가 없습니다.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }
            const rows = items.map(item => {
                const safeItem = JSON.stringify(item).replace(/'/g, "\\'");
                return `<button onclick='openModal(${JSON.stringify(item).replace(/\\/g,"\\\\").replace(/'/g,"\\'")})'
                    class="w-full flex items-center justify-between px-2 py-4 hover:bg-slate-50 rounded-2xl transition-colors text-left group">
                    <div class="flex items-center space-x-4">
                        <div class="w-8 h-8 bg-emerald-50 border border-emerald-100 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
                            <i data-lucide="file-text" class="w-4 h-4 text-emerald-600"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800 group-hover:text-emerald-600 transition-colors">${item.title}</p>
                            <p class="text-xs text-slate-400 font-medium mt-0.5">${item.date}</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-emerald-500 transition-colors shrink-0 ml-4"></i>
                </button>`;
            });
            container.innerHTML = `<div class="divide-y divide-slate-100">${rows.join('')}</div>
                <p class="text-xs text-slate-400 font-medium mt-3 flex items-center space-x-1 px-2">
                    <i data-lucide="info" class="w-3.5 h-3.5"></i><span>자료를 클릭하면 내용을 확인할 수 있습니다.</span>
                </p>`;
            lucide.createIcons();
        }

        function openModal(item) {
            document.getElementById('modal-unit-label').textContent = UNIT_NAMES[item.unit] || ('단원 ' + item.unit);
            document.getElementById('modal-title').textContent   = item.title;
            document.getElementById('modal-date').textContent    = item.date + ' 등록';
            document.getElementById('modal-content').textContent = item.content;

            // 파일 다운로드 버튼
            const fileBtn  = document.getElementById('modal-file-btn');
            const fileName = document.getElementById('modal-file-name');
            if (item.fileUrl) {
                fileBtn.href = item.fileUrl;
                fileName.textContent = item.fileName || '첨부파일 다운로드';
                fileBtn.classList.remove('hidden');
                fileBtn.classList.add('flex');
            } else {
                fileBtn.classList.add('hidden');
                fileBtn.classList.remove('flex');
            }

            const modal = document.getElementById('mat-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('mat-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function toggleUnit(unitId) {
            const body    = document.getElementById(unitId);
            const chevron = document.getElementById('chevron-' + unitId);
            const isOpen  = body.classList.contains('open');
            if (isOpen) {
                body.classList.remove('open');
                chevron.classList.remove('open');
            } else {
                body.classList.add('open');
                chevron.classList.add('open');
                if (!loaded) loadMaterials();
            }
        }

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
