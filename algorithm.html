<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알고리즘 공작소 — Sungce AI-ON</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family:'Pretendard',-apple-system,sans-serif; background:#f8fafc; margin:0; }
  .card { background:white; border-radius:1.5rem; border:1px solid #e2e8f0; }
  .nav-link { font-size:13px; font-weight:700; color:#475569; transition:color .15s; white-space:nowrap; }
  .nav-link:hover { color:#2563eb; }
  .nav-link.active { color:#2563eb; border-bottom:2px solid #2563eb; padding-bottom:2px; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- 1줄 통합 네비 -->
<nav class="shrink-0 w-full z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
  <div class="max-w-7xl mx-auto px-4 md:px-6 flex justify-between items-center h-14">

    <!-- 로고 -->
    <a href="index.html" class="flex items-center space-x-2 shrink-0 outline-none">
      <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold">AI</div>
      <div>
        <div class="text-[15px] font-bold text-slate-900 leading-tight">Sungce <span class="text-blue-600">AI-ON</span></div>
        <div class="text-[12px] font-medium text-slate-500 leading-tight">정보 교과 클래스룸</div>
      </div>
    </a>

    <!-- 메뉴 -->
    <div class="hidden md:flex items-center gap-6">
      <a href="#" onclick="loadPage('https://sungce.github.io/coseware/index.html#classes','교과수업');return false;" class="nav-link" id="menu-classes">교과수업</a>
      <span class="nav-link active" id="menu-algo">알고리즘 공작소</span>
      <a href="#" onclick="loadPage('https://sungce.github.io/coseware/data_play.html','데이터 실습실');return false;" class="nav-link" id="menu-data">데이터 실습실</a>
      <a href="#" onclick="loadPage('https://sungce.github.io/coseware/chatting.html','Vibe Room');return false;" class="nav-link" id="menu-vibe">Vibe Room</a>
    </div>

    <!-- 메인으로 -->
    <a href="index.html" class="flex items-center gap-1.5 text-slate-500 hover:text-blue-600 text-sm font-bold bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-xl transition-colors shrink-0">
      <i data-lucide="home" class="w-4 h-4"></i><span class="hidden sm:inline">메인으로</span>
    </a>
  </div>
</nav>

<!-- 기본 콘텐츠 영역 -->
<main id="native-content" class="max-w-7xl mx-auto px-6 pt-8 pb-16 w-full flex-1">
  <div class="mb-10">
    <div class="inline-flex items-center space-x-2 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full text-xs font-bold mb-4 border border-indigo-100">
      <i data-lucide="git-branch" class="w-3.5 h-3.5"></i><span>인터렉티브 수업실</span>
    </div>
    <h1 class="text-4xl font-black text-slate-900 mb-3">알고리즘 공작소 <span class="text-indigo-500">⚙️</span></h1>
    <p class="text-lg text-slate-500 font-medium">알고리즘의 원리를 시각화하고 직접 만들어보세요.</p>
  </div>
  <div class="card p-12 flex flex-col items-center justify-center text-center min-h-[55vh]">
    <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mb-6 shadow-sm">
      <i data-lucide="git-branch" class="w-10 h-10 text-indigo-500"></i>
    </div>
    <h2 class="text-2xl font-black text-slate-800 mb-3">준비 중입니다</h2>
    <p class="text-slate-500 font-medium max-w-md leading-relaxed">
      <span class="font-black text-slate-700">알고리즘 공작소</span> 페이지를 준비하고 있어요.<br>
      곧 멋진 콘텐츠로 찾아오겠습니다! 🚀
    </p>
  </div>
</main>

<!-- iframe 영역 -->
<section id="iframe-section" class="hidden fixed left-0 right-0 bottom-0 overflow-hidden" style="top:56px;">
  <iframe id="content-frame" class="w-full h-full border-0 bg-white" src=""></iframe>
</section>

<script>
  lucide.createIcons();
  if (window.self !== window.top) {
    document.querySelector('nav').style.display = 'none';
    document.getElementById('native-content').style.paddingTop = '2rem';
  }

  function loadPage(url, label) {
    // 모든 메뉴 비활성화
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.remove('active');
      el.style.borderBottom = '';
      el.style.paddingBottom = '';
    });
    // 현재 메뉴 활성화
    const menuMap = { '교과수업':'menu-classes', '데이터 실습실':'menu-data', 'Vibe Room':'menu-vibe' };
    const id = menuMap[label];
    if (id) {
      const el = document.getElementById(id);
      if (el) { el.classList.add('active'); }
    }

    const sec = document.getElementById('iframe-section');
    const nav = document.querySelector('nav');
    sec.style.top = nav.offsetHeight + 'px';
    document.getElementById('native-content').classList.add('hidden');
    document.getElementById('content-frame').src = url;
    sec.classList.remove('hidden');
  }

  function showNative() {
    document.getElementById('iframe-section').classList.add('hidden');
    document.getElementById('native-content').classList.remove('hidden');
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById('menu-algo').classList.add('active');
  }

  // 알고리즘 공작소 메뉴 클릭 시 기본 콘텐츠로 복귀
  document.getElementById('menu-algo').addEventListener('click', e => {
    e.preventDefault(); showNative();
  });
</script>
</body>
</html>
