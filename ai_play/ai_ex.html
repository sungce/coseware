<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 체험관</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#f0f2f8;color:#1e293b;min-height:100vh;line-height:1.6}
button,input,textarea{font-family:inherit}
.header{background:#f0f2f8;padding:36px 24px 32px;border-bottom:1px solid #e2e8f0}
.header-inner{max-width:1020px;margin:0 auto}
.badge{display:inline-flex;align-items:center;gap:6px;background:#ede9fe;border:1px solid #ddd6fe;border-radius:100px;padding:4px 14px;font-size:12px;font-weight:700;color:#6d28d9;margin-bottom:14px;letter-spacing:.04em}
.header h1{font-size:34px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;color:#0f172a}
.header-sub{font-size:15px;color:#64748b}
.container{max-width:1020px;margin:0 auto;padding:28px 20px 60px;background:#f0f2f8}
.tool-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
@media(max-width:820px){.tool-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.tool-grid{grid-template-columns:repeat(2,1fr)}}
.tool-card{background:#fff;border:2px solid #e8ecf0;border-radius:16px;padding:15px 13px;transition:all .2s;text-align:left;width:100%;cursor:pointer}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.08)}
.tool-card.active{transform:translateY(-2px)}
.t-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.t-name{font-size:12.5px;font-weight:700;color:#1e293b;margin-bottom:3px;line-height:1.3}
.t-desc{font-size:11px;color:#94a3b8;line-height:1.4}
.tool-card.active .t-name{color:#fff!important}
.tool-card.active .t-desc{color:rgba(255,255,255,.78)!important}
.t-cat{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;margin-bottom:6px}
.panel{background:#fff;border-radius:20px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.06);border:1.5px solid #e8ecf0}
.panel-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.p-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.p-title{font-size:22px;font-weight:900;color:#1e293b}
.p-divider{height:3px;border-radius:3px;margin:14px 0 20px;width:80px}
.p-desc{font-size:14px;color:#64748b;margin-bottom:18px}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:14px;outline:none;color:#1e293b;background:#fafafa;transition:border-color .2s}
.inp:focus{background:#fff}
.ta{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;outline:none;color:#1e293b;background:#fafafa;resize:vertical;min-height:100px;transition:border-color .2s}
.ta:focus{background:#fff}
.btn-p{padding:10px 22px;border:none;border-radius:10px;font-size:14px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:6px;margin-top:12px;color:#fff;cursor:pointer}
.btn-p:disabled{background:#e2e8f0!important;color:#94a3b8!important;cursor:not-allowed}
.rbox{border-radius:12px;padding:18px 20px;margin-top:16px}
.dots{display:inline-flex;gap:4px;align-items:center}
.dots span{width:6px;height:6px;border-radius:50%;background:currentColor;animation:db 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.drop{border:2px dashed #cbd5e1;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.drop:hover{border-color:#94a3b8;background:#f1f5f9}
.chip{display:inline-block;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;margin:2px}
.sel-btn{border-radius:8px;padding:6px 13px;font-size:12.5px;cursor:pointer;transition:all .15s;border:1.5px solid #e2e8f0;background:#fff;color:#475569;font-weight:400}
.chatbox{height:300px;overflow-y:auto;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px;background:#f8fafc;display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.6;white-space:pre-line}
.msg.user{background:#3b82f6;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.ai{background:#fff;color:#1e293b;align-self:flex-start;border:1.5px solid #e2e8f0;border-bottom-left-radius:4px}
.chat-row{display:flex;gap:8px}
.chat-inp{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none}
.bar-track{background:#e2e8f0;border-radius:99px;height:12px;overflow:hidden;margin:6px 0}
.bar-fill{height:100%;border-radius:99px;transition:width .8s ease}
.qitem{background:#fafafa;border:1.5px solid #e8ecf0;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.qopts{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.qopt{text-align:left;padding:9px 14px;border-radius:8px;font-size:13.5px;transition:all .15s;border:1.5px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer}
.poem{border-radius:12px;padding:24px;text-align:center;font-size:15px;line-height:2.1;white-space:pre-line}
.jcard{background:#fafafa;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.mstep{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.mstep:last-child{border:none}
.mnum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.footer{text-align:center;padding:24px;color:#94a3b8;font-size:12px;border-top:1px solid #e2e8f0}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="badge">🤖 AI 탐험</div>
    <h1>AI 체험관 🤖</h1>
    <p class="header-sub">다양한 인공지능 도구를 직접 체험하고 비교해보세요. — 10가지 AI 기능 체험</p>
  </div>
</div>
<div class="container">
  <div class="tool-grid" id="toolGrid"></div>
  <div class="panel" id="panel"></div>
</div>
<div class="footer">
  ※ 이 앱은 Google Gemini AI를 활용한 중학교 정보 수업용 AI 탐험 도구입니다.<br>
  텍스트 분석·생성: Gemini 2.0 Flash | 이미지 생성: Pollinations AI
</div>
<script>
var TOOLS=[
  {id:'img-rec',   icon:'👁️',label:'AI 이미지 인식',  desc:'이미지를 업로드하면 AI가 내용을 분석합니다.',  color:'#4F8EF7',bg:'#EEF4FF',cat:'인식'},
  {id:'sentiment', icon:'💬',label:'감정 분석기',      desc:'문장을 입력하면 감정을 분석합니다.',           color:'#E8527A',bg:'#FFF0F4',cat:'분석'},
  {id:'translate', icon:'🌐',label:'AI 언어 번역',     desc:'다양한 언어로 자동 번역합니다.',               color:'#14B8A6',bg:'#F0FDFB',cat:'언어'},
  {id:'writing',   icon:'✍️',label:'글쓰기 도우미',    desc:'주제를 입력하면 AI가 글을 씁니다.',            color:'#F97316',bg:'#FFF7F0',cat:'생성'},
  {id:'img-gen',   icon:'🎨',label:'AI 이미지 생성',   desc:'텍스트로 이미지를 생성합니다.',                color:'#8B5CF6',bg:'#F5F0FF',cat:'생성'},
  {id:'quiz',      icon:'❓',label:'AI 퀴즈 생성기',   desc:'주제로 퀴즈를 만들어줍니다.',                  color:'#0EA5E9',bg:'#F0F9FF',cat:'교육'},
  {id:'chatbot',   icon:'🤖',label:'AI 챗봇',          desc:'AI와 자유롭게 대화해보세요.',                  color:'#10B981',bg:'#F0FDF4',cat:'대화'},
  {id:'poem',      icon:'🌸',label:'시 창작 도우미',   desc:'주제를 주면 AI가 시를 써줍니다.',              color:'#EC4899',bg:'#FDF2F8',cat:'창작'},
  {id:'jobs',      icon:'🔮',label:'미래 직업 탐색기', desc:'내 관심사로 미래 직업을 찾아요.',              color:'#F59E0B',bg:'#FFFBEB',cat:'진로'},
  {id:'math',      icon:'📐',label:'수학 풀이 도우미', desc:'수학 문제를 단계별로 풀어줍니다.',             color:'#6366F1',bg:'#EEF2FF',cat:'학습'}
];
var LANGS=[{c:'영어',f:'🇺🇸'},{c:'일본어',f:'🇯🇵'},{c:'중국어',f:'🇨🇳'},{c:'프랑스어',f:'🇫🇷'},{c:'스페인어',f:'🇪🇸'},{c:'독일어',f:'🇩🇪'},{c:'아랍어',f:'🇸🇦'},{c:'러시아어',f:'🇷🇺'},{c:'이탈리아어',f:'🇮🇹'},{c:'포르투갈어',f:'🇧🇷'}];
var WRITE_TYPES=['이야기','편지','설명문','일기','광고문','뉴스기사'];
var POEM_MOODS=['설레는','슬픈','재미있는','신비로운','따뜻한','용감한'];
var activeTool='img-rec',chatHistory=[],selectedLang='영어',selectedWriteType='이야기',selectedMood='설레는';
var uploadedImgData=null,uploadedImgType=null,quizData=null,quizAnswers={},quizSubmitted=false;
var GEMINI_KEY='AIzaSyCk8CIys1pwORVtS3WGwuwpfy3GoxuGbwc';
var GEMINI_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+GEMINI_KEY;
function tc(){return(TOOLS.find(function(t){return t.id===activeTool})||{color:'#3b82f6'}).color}
function tbg(){return(TOOLS.find(function(t){return t.id===activeTool})||{bg:'#EEF4FF'}).bg}

/* Claude 형식 메시지 → Gemini 형식으로 변환 후 호출 */
async function callClaude(messages,system){
  /* contents 변환 */
  var contents=messages.map(function(m){
    var role=m.role==='assistant'?'model':'user';
    /* content가 배열인 경우 (이미지+텍스트 멀티모달) */
    if(Array.isArray(m.content)){
      var parts=m.content.map(function(c){
        if(c.type==='text') return {text:c.text};
        if(c.type==='image') return {inlineData:{mimeType:c.source.media_type,data:c.source.data}};
        return {text:''};
      });
      return {role:role,parts:parts};
    }
    return {role:role,parts:[{text:m.content}]};
  });
  var body={contents:contents};
  if(system) body.systemInstruction={parts:[{text:system}]};
  body.generationConfig={maxOutputTokens:1000};

  var res=await fetch(GEMINI_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  var data=await res.json();
  if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  return data.candidates[0].content.parts[0].text;
}
function dots(){return '<span class="dots" style="color:'+tc()+'"><span></span><span></span><span></span></span>'}
function rbox(c){return '<div class="rbox" style="background:'+tc()+'09;border:1.5px solid '+tc()+'30">'+c+'</div>'}
function setHTML(id,h){var e=document.getElementById(id);if(e)e.innerHTML=h}
function setBtn(id,h,d){var e=document.getElementById(id);if(!e)return;e.innerHTML=h;e.disabled=!!d}
function getVal(id){var e=document.getElementById(id);return e?e.value.trim():''}
function errBox(m){return rbox('<p style="margin:0;font-size:14px;color:#ef4444">⚠️ '+m+'</p>')}
function parseJSON(raw){try{return JSON.parse(raw.replace(/```json|```/g,'').trim())}catch(e){throw new Error('JSON 파싱 실패')}}
function setActiveTool(id){
  activeTool=id;chatHistory=[];uploadedImgData=null;quizData=null;quizAnswers={};quizSubmitted=false;
  renderGrid();renderPanel();
}
function renderGrid(){
  document.getElementById('toolGrid').innerHTML=TOOLS.map(function(t){
    var on=t.id===activeTool;
    return '<button class="tool-card '+(on?'active':'')+'" onclick="setActiveTool(\''+t.id+'\')" style="'+(on?'background:'+t.color+';border-color:'+t.color+';box-shadow:0 4px 18px '+t.color+'40':'')+'">'
      +'<span class="t-cat" style="background:'+(on?'rgba(255,255,255,.22)':t.bg)+';color:'+(on?'#fff':t.color)+'">'+t.cat+'</span><br>'
      +'<div class="t-icon" style="background:'+(on?'rgba(255,255,255,.22)':t.bg)+'">'+t.icon+'</div>'
      +'<div class="t-name">'+t.label+'</div>'
      +'<div class="t-desc">'+t.desc+'</div>'
      +'</button>';
  }).join('');
}
function renderPanel(){
  var tool=TOOLS.find(function(t){return t.id===activeTool});
  document.getElementById('panel').innerHTML='<div class="panel-head"><div class="p-icon" style="background:'+tool.bg+'">'+tool.icon+'</div><div><div class="p-title">'+tool.label+'</div></div></div><div class="p-divider" style="background:linear-gradient(90deg,'+tool.color+',transparent)"></div><div id="toolContent"></div>';
  var R={
    'img-rec':renderImgRec,'sentiment':renderSentiment,'translate':renderTranslate,
    'writing':renderWriting,'img-gen':renderImgGen,'quiz':renderQuiz,
    'chatbot':renderChatbot,'poem':renderPoem,'jobs':renderJobs,'math':renderMath
  };
  if(R[activeTool])R[activeTool]();
}
/* 1. 이미지 인식 */
function renderImgRec(){
  setHTML('toolContent','<p class="p-desc">이미지 파일을 업로드하면 AI가 이미지 속 내용, 색상, 분위기를 분석해드립니다.</p>'
    +'<div class="drop" id="dropZone" onclick="document.getElementById(\'fileInput\').click()">'
    +'<div style="font-size:40px;margin-bottom:10px">📁</div><p style="color:#94a3b8;font-size:14px;margin:0">클릭하여 이미지 선택 (JPG, PNG, GIF)</p></div>'
    +'<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">'
    +'<button class="btn-p" id="analyzeBtn" onclick="analyzeImg()" disabled style="background:'+tc()+'">🔍 이미지 분석하기</button>'
    +'<div id="imgResult"></div>');
}
function handleFile(e){
  var f=e.target.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    uploadedImgData=ev.target.result.split(',')[1];uploadedImgType=f.type;
    var dz=document.getElementById('dropZone');
    dz.innerHTML='<img src="'+ev.target.result+'" style="max-width:100%;max-height:200px;border-radius:8px">';
    document.getElementById('analyzeBtn').disabled=false;
  };
  reader.readAsDataURL(f);
}
async function analyzeImg(){
  if(!uploadedImgData)return;
  setBtn('analyzeBtn',dots(),true);setHTML('imgResult','');
  try{
    var r=await callClaude([{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:uploadedImgType,data:uploadedImgData}},
      {type:'text',text:'이 이미지를 한국어로 자세히 분석해주세요. 무엇이 있는지, 주요 특징, 색상, 분위기를 설명해주세요. 중학생이 이해할 수 있는 쉬운 언어로 3~4문장으로 작성해주세요.'}
    ]}]);
    setHTML('imgResult',rbox('<p style="margin:0 0 6px;font-size:12px;font-weight:700;color:'+tc()+'">🤖 AI 분석 결과</p><p style="margin:0;font-size:14px;line-height:1.8;color:#1e293b">'+r+'</p>'));
  }catch(e){setHTML('imgResult',errBox(e.message));}
  setBtn('analyzeBtn','🔍 이미지 분석하기',false);
}
/* 2. 감정 분석 */
function renderSentiment(){
  setHTML('toolContent','<p class="p-desc">한국어 문장을 입력하면 AI가 감정(긍정/부정/중립)을 점수와 함께 분석합니다.</p>'
    +'<textarea class="ta" id="sentText" placeholder="예: 오늘 친구들과 함께 맛있는 점심을 먹었어요! 정말 행복한 하루였습니다." oninput="document.getElementById(\'sentBtn\').disabled=!this.value.trim()"></textarea>'
    +'<button class="btn-p" id="sentBtn" onclick="doSentiment()" disabled style="background:'+tc()+'">💬 감정 분석하기</button>'
    +'<div id="sentResult"></div>');
}
async function doSentiment(){
  var text=getVal('sentText');if(!text)return;
  setBtn('sentBtn',dots(),true);setHTML('sentResult','');
  try{
    var raw=await callClaude([{role:'user',content:'다음 문장의 감정을 분석해주세요: "'+text+'"\n반드시 JSON만 응답:\n{"sentiment":"긍정/부정/중립","score":0~100,"emoji":"이모지","reason":"이유 한 문장","keywords":["단어1","단어2","단어3"]}'}],'감정 분석 전문가. 순수 JSON만.');
    var d=parseJSON(raw);
    var sc={'긍정':'#22c55e','부정':'#ef4444','중립':'#94a3b8'}[d.sentiment]||tc();
    var sb={'긍정':'#f0fdf4','부정':'#fef2f2','중립':'#f8fafc'}[d.sentiment]||'#fafafa';
    setHTML('sentResult','<div style="margin-top:16px;background:'+sb+';border:1.5px solid '+sc+'30;border-radius:12px;padding:20px">'
      +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><span style="font-size:46px">'+d.emoji+'</span>'
      +'<div><span style="background:'+sc+';color:#fff;border-radius:8px;padding:4px 14px;font-size:15px;font-weight:700">'+d.sentiment+'</span>'
      +'<p style="margin:6px 0 0;font-size:13px;color:#64748b">'+d.reason+'</p></div></div>'
      +'<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px"><span>감정 강도</span><span style="font-weight:700;color:'+sc+'">'+d.score+'점</span></div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+d.score+'%;background:'+sc+'"></div></div></div>'
      +'<div>'+(d.keywords||[]).map(function(k){return '<span class="chip" style="background:'+sc+'18;color:'+sc+'">#'+k+'</span>';}).join('')+'</div></div>');
  }catch(e){setHTML('sentResult',errBox(e.message));}
  setBtn('sentBtn','💬 감정 분석하기',false);
}
/* 3. 번역 */
function renderTranslate(){
  setHTML('toolContent','<p class="p-desc">한국어 텍스트를 10가지 언어로 번역해보세요.</p>'
    +'<textarea class="ta" id="transText" placeholder="번역할 한국어 텍스트를 입력하세요." oninput="document.getElementById(\'transBtn\').disabled=!this.value.trim()"></textarea>'
    +'<div style="margin:12px 0 4px"><label style="font-size:13px;font-weight:600;color:#475569;display:block;margin-bottom:6px">번역 언어 선택</label>'
    +'<div style="display:flex;flex-wrap:wrap;gap:7px">'+LANGS.map(function(l){return '<button class="sel-btn" id="lang_'+l.c+'" onclick="pickLang(\''+l.c+'\')" style="'+(selectedLang===l.c?'border-color:'+tc()+';background:'+tc()+'15;color:'+tc()+';font-weight:700':'')+'">'+l.f+' '+l.c+'</button>';}).join('')+'</div></div>'
    +'<button class="btn-p" id="transBtn" onclick="doTranslate()" disabled style="background:'+tc()+'">🌐 번역하기</button>'
    +'<div id="transResult"></div>');
}
function pickLang(c){
  selectedLang=c;
  LANGS.forEach(function(l){
    var b=document.getElementById('lang_'+l.c);if(!b)return;
    var on=l.c===c;b.style.borderColor=on?tc():'#e2e8f0';b.style.background=on?tc()+'15':'#fff';b.style.color=on?tc():'#475569';b.style.fontWeight=on?'700':'400';
  });
}
async function doTranslate(){
  var text=getVal('transText');if(!text)return;
  setBtn('transBtn',dots(),true);setHTML('transResult','');
  try{

async function doQuiz(){
  var topic=getVal('quizTopic');if(!topic)return;
  setBtn('quizBtn',dots(),true);quizData=null;quizAnswers={};quizSubmitted=false;setHTML('quizResult','');
  try{
    var raw=await callClaude([{role:'user',content:'\''+topic+'\' 주제로 객관식 5문제를 만들어주세요. 순수 JSON만:\n{"questions":[{"q":"질문","options":["①답1","②답2","③답3","④답4"],"answer":0,"explanation":"해설"}]}'}],'중학생 퀴즈 생성기. answer는 0부터 시작하는 인덱스. 순수 JSON만.');
    quizData=parseJSON(raw).questions;
    renderQuizUI();
  }catch(e){setHTML('quizResult',errBox(e.message));}
  setBtn('quizBtn','❓ 퀴즈 생성하기',false);

function renderQuizUI(){
  if(!quizData)return;
  setHTML('quizResult','<div style="margin-top:16px">'+quizData.map(function(q,qi){
    return '<div class="qitem"><p style="margin:0 0 10px;font-weight:700;font-size:14px;color:#1e293b"><span style="color:'+tc()+'">Q'+(qi+1)+'.</span> '+q.q+'</p><div class="qopts">'+q.options.map(function(opt,oi){return '<button class="qopt" id="qo_'+qi+'_'+oi+'" onclick="pickOpt('+qi+','+oi+')">'+opt+'</button>';}).join('')+'</div><div id="qexp_'+qi+'" style="display:none;margin-top:10px;font-size:12px;color:#64748b;background:#f1f5f9;border-radius:6px;padding:8px 10px">💡 '+q.explanation+'</div></div>';
  }).join('')+'<button id="submitBtn" onclick="submitQuiz()" style="background:#e2e8f0;color:#94a3b8;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;cursor:not-allowed;margin-top:4px">채점하기</button><div id="quizScore"></div></div>');
}
function pickOpt(qi,oi){
  if(quizSubmitted)return;
  quizAnswers[qi]=oi;
  if(quizData)quizData[qi].options.forEach(function(_,i){
    var b=document.getElementById('qo_'+qi+'_'+i);if(!b)return;
    var on=i===oi;b.style.borderColor=on?tc():'#e2e8f0';b.style.background=on?tc()+'10':'#fff';b.style.color=on?tc():'#475569';b.style.fontWeight=on?'600':'400';
  });
  var sb=document.getElementById('submitBtn');
  if(sb&&quizData&&Object.keys(quizAnswers).length>=quizData.length){sb.style.background=tc();sb.style.color='#fff';sb.style.cursor='pointer';}
}
function submitQuiz(){
  if(!quizData||Object.keys(quizAnswers).length<quizData.length)return;
  quizSubmitted=true;var score=0;
  quizData.forEach(function(q,qi){
    var correct=q.answer,sel=quizAnswers[qi];
    q.options.forEach(function(_,oi){
      var b=document.getElementById('qo_'+qi+'_'+oi);if(!b)return;b.disabled=true;
      if(oi===correct){b.style.borderColor='#22c55e';b.style.background='#f0fdf4';b.style.color='#16a34a';b.style.fontWeight='700';b.innerHTML+=' ✓';}
      else if(oi===sel&&oi!==correct){b.style.borderColor='#ef4444';b.style.background='#fef2f2';b.style.color='#dc2626';b.innerHTML+=' ✗';}
    });
    var exp=document.getElementById('qexp_'+qi);if(exp)exp.style.display='block';
    if(sel===correct)score++;
  });
  var sb=document.getElementById('submitBtn');if(sb)sb.style.display='none';
  var msg=score===quizData.length?'🎉 완벽해요! 모두 맞혔습니다!':score>=quizData.length/2?'👍 잘했어요! 조금만 더 공부해보세요.':'📚 다시 공부하고 도전해보세요!';
  setHTML('quizScore','<div style="margin-top:12px;background:'+tc()+'10;border:1.5px solid '+tc()+'30;border-radius:12px;padding:18px 20px;text-align:center"><p style="margin:0;font-size:26px;font-weight:900;color:'+tc()+'">'+score+' / '+quizData.length+'점</p><p style="margin:6px 0 10px;font-size:13px;color:#64748b">'+msg+'</p><button onclick="doQuiz()" style="background:#fff;border:1.5px solid '+tc()+';color:'+tc()+';border-radius:8px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer">새 퀴즈 생성</button></div>');
}

    var raw=await callClaude([{role:'user',content:'다음 수학 문제를 단계별로 풀어주세요: "'+prob+'"\n순수 JSON만 응답:\n{"answer":"최종 답","steps":[{"step":1,"title":"단계명","explain":"설명","formula":"수식(없으면 빈 문자열)"}]}'}],'수학 선생님. 중학생 눈높이 단계별 풀이. 순수 JSON만.');
    var d=parseJSON(raw);
    setHTML('mathResult',rbox('<p style="margin:0 0 14px;font-size:13px;color:#64748b">풀이 과정</p>'+d.steps.map(function(s){return '<div class="mstep"><div class="mnum" style="background:'+tc()+'15;color:'+tc()+'">'+s.step+'</div><div style="flex:1"><p style="margin:0 0 3px;font-weight:700;font-size:13px;color:#1e293b">'+s.title+'</p><p style="margin:0;font-size:13px;color:#475569">'+s.explain+'</p>'+(s.formula?'<code style="display:block;margin-top:6px;background:#f1f5f9;border-radius:6px;padding:6px 10px;font-size:14px;color:'+tc()+';font-family:monospace">'+s.formula+'</code>':'')+'</div></div>';}).join('')+'<div style="margin-top:14px;padding:12px 16px;background:'+tc()+';border-radius:10px;text-align:center"><p style="margin:0;font-size:13px;color:rgba(255,255,255,.8)">정답</p><p style="margin:4px 0 0;font-size:22px;font-weight:900;color:#fff">'+d.answer+'</p></div>'));
  }catch(e){setHTML('mathResult',errBox(e.message));}
  setBtn('mathBtn','📐 풀이 시작하기',false);
}
/* INIT */
renderGrid();renderPanel();
</script>
