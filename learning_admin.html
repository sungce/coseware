<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 현황 - 정보 클래스룸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family:'Pretendard',sans-serif; -webkit-font-smoothing:antialiased; }
        .fade-in { animation:fadeIn .45s cubic-bezier(.16,1,.3,1) forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .card { background:#fff; border-radius:1.5rem; border:1px solid #f1f5f9; box-shadow:0 1px 4px rgba(0,0,0,.05); }
        .tab-btn { transition: all .2s; }
        .tab-btn.active { background: #0d9488; color: #fff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" style="background-image:radial-gradient(#e2e8f0 1px,transparent 1px);background-size:32px 32px;">

    <div id="access-denied" class="fixed inset-0 z-[200] bg-white hidden flex-col items-center justify-center">
        <i data-lucide="shield-off" class="w-10 h-10 text-rose-400 mb-4"></i>
        <h2 class="text-xl font-black text-slate-900 mb-2">접근 권한 없음</h2>
        <a href="index.html" class="mt-4 bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold">메인으로</a>
    </div>

    <nav class="fixed w-full top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200/50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center py-4">
            <div class="flex items-center space-x-4">
                <a href="admin.html" class="text-slate-400 hover:text-slate-700 p-2 rounded-lg hover:bg-slate-100 transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-br from-teal-500 to-emerald-600 text-white p-2.5 rounded-xl shadow-lg shadow-teal-500/30">
                        <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                    </div>
                    <span class="font-black text-lg text-slate-900">학습 현황</span>
                    <span class="text-xs bg-teal-100 text-teal-700 font-bold px-2 py-0.5 rounded-full">Admin</span>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <div class="hidden sm:flex items-center space-x-2 bg-slate-100 px-4 py-2 rounded-xl">
                    <i data-lucide="user-check" class="w-4 h-4 text-slate-500"></i>
                    <span id="admin-name" class="text-sm font-bold text-slate-700"></span>
                </div>
                <button onclick="handleSignOut()" class="flex items-center space-x-1.5 text-slate-500 hover:text-rose-500 px-3 py-2 rounded-xl hover:bg-rose-50 text-sm font-bold transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i><span class="hidden sm:inline">로그아웃</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-28 pb-24 fade-in">

        <!-- Apps Script URL 설정 -->
        <div id="setup-banner" class="card p-6 mb-8 border-amber-200 bg-amber-50">
            <div class="flex items-start space-x-4">
                <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center shrink-0">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-black text-slate-900 mb-1">학습 기록 Google Sheets 연동 설정</h3>
                    <p class="text-sm text-slate-600 font-medium mb-3">새 Apps Script 배포 후 URL을 입력하세요. 아래 <strong>연동 방법</strong>을 참고하세요.</p>
                    <div class="flex space-x-3">
                        <input type="text" id="gs-url-input" placeholder="https://script.google.com/macros/s/.../exec"
                            class="flex-1 bg-white border border-amber-300 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all">
                        <button onclick="saveGsUrl()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-5 py-2.5 rounded-xl transition-colors text-sm">
                            저장 & 로드
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 통계 카드 -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
            <div class="card p-5">
                <div class="w-9 h-9 bg-teal-50 text-teal-600 rounded-xl flex items-center justify-center mb-3"><i data-lucide="users" class="w-4 h-4"></i></div>
                <p class="text-2xl font-black text-slate-900" id="stat-students">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">학습 학생 수</p>
            </div>
            <div class="card p-5">
                <div class="w-9 h-9 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-3"><i data-lucide="check-circle" class="w-4 h-4"></i></div>
                <p class="text-2xl font-black text-slate-900" id="stat-completed">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">완료 소단원</p>
            </div>
            <div class="card p-5">
                <div class="w-9 h-9 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3"><i data-lucide="edit" class="w-4 h-4"></i></div>
                <p class="text-2xl font-black text-slate-900" id="stat-activities">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">활동 저장</p>
            </div>
            <div class="card p-5">
                <div class="w-9 h-9 bg-violet-50 text-violet-600 rounded-xl flex items-center justify-center mb-3"><i data-lucide="star" class="w-4 h-4"></i></div>
                <p class="text-2xl font-black text-slate-900" id="stat-selfchecks">-</p>
                <p class="text-xs font-medium text-slate-400 mt-0.5">자기 평가</p>
            </div>
        </div>

        <!-- 단원/소단원 필터 -->
        <div class="card p-5 mb-6">
            <div class="flex flex-wrap items-center gap-3">
                <span class="text-xs font-black text-slate-500 uppercase tracking-wider shrink-0">대단원</span>
                <div class="flex flex-wrap gap-2" id="unit-filter-btns">
                    <button onclick="setUnitFilter('all')" id="uf-all"
                        class="text-xs font-bold px-3 py-1.5 rounded-full bg-teal-500 text-white transition-all">전체</button>
                    <button onclick="setUnitFilter('I')"   id="uf-I"   class="text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all">I. 컴퓨팅</button>
                    <button onclick="setUnitFilter('II')"  id="uf-II"  class="text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all">II. 데이터</button>
                    <button onclick="setUnitFilter('III')" id="uf-III" class="text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all">III. 알고리즘</button>
                    <button onclick="setUnitFilter('IV')"  id="uf-IV"  class="text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all">IV. 인공지능</button>
                    <button onclick="setUnitFilter('V')"   id="uf-V"   class="text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all">V. 디지털문화</button>
                </div>
                <span id="unit-lesson-filter-wrap" class="hidden items-center space-x-2">
                    <span class="text-xs font-black text-slate-400">·</span>
                    <span class="text-xs font-black text-slate-500 uppercase tracking-wider">소단원</span>
                    <select id="lesson-filter" onchange="renderCurrentTab()"
                        class="text-xs font-bold bg-white border border-slate-200 rounded-xl px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                        <option value="all">전체 소단원</option>
                    </select>
                </span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- 학생별 요약 -->
            <div class="card p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-base font-black text-slate-900 flex items-center space-x-2">
                        <i data-lucide="users" class="w-4 h-4 text-teal-500"></i><span>학생별 학습 요약</span>
                    </h2>
                    <button onclick="loadData()" class="text-xs font-bold text-slate-400 hover:text-teal-600 p-1.5 rounded-lg hover:bg-teal-50 transition-colors">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
                <div id="student-summary">
                    <div class="py-8 flex flex-col items-center space-y-2 text-slate-400">
                        <i data-lucide="loader" class="w-5 h-5 animate-spin text-teal-400"></i>
                        <span class="text-xs">데이터 로드 중...</span>
                    </div>
                </div>
            </div>

            <!-- 상세 기록 -->
            <div class="lg:col-span-2 card p-6">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-base font-black text-slate-900 flex items-center space-x-2">
                        <i data-lucide="list" class="w-4 h-4 text-teal-500"></i><span>상세 학습 기록</span>
                    </h2>
                    <!-- 탭 -->
                    <div class="flex gap-1.5 bg-slate-100 p-1 rounded-xl">
                        <button onclick="switchTab('completed')" id="tab-completed"
                            class="tab-btn active text-xs font-bold px-3 py-1.5 rounded-lg">완료</button>
                        <button onclick="switchTab('activities')" id="tab-activities"
                            class="tab-btn text-xs font-bold px-3 py-1.5 rounded-lg text-slate-500">활동</button>
                        <button onclick="switchTab('selfchecks')" id="tab-selfchecks"
                            class="tab-btn text-xs font-bold px-3 py-1.5 rounded-lg text-slate-500">평가</button>
                    </div>
                </div>

                <!-- 검색 -->
                <div class="relative mb-4">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="record-search" placeholder="학생명 검색..."
                        oninput="renderCurrentTab()"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all">
                </div>

                <!-- 기록 테이블 -->
                <div class="overflow-x-auto rounded-2xl border border-slate-100">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100" id="record-thead">
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">날짜</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">학생명</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">학번</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">단원</th>
                                <th class="text-left px-4 py-3 text-xs font-black text-slate-400 uppercase tracking-widest">내용</th>
                            </tr>
                        </thead>
                        <tbody id="record-tbody">
                            <tr><td colspan="4" class="text-center py-10 text-slate-400 font-medium text-sm">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
                <p class="text-xs text-slate-400 font-medium mt-2" id="record-count-label"></p>
            </div>
        </div>

    </main>

    <!-- 토스트 -->
    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900/95 text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-32 opacity-0 z-50 flex items-center space-x-3 border border-slate-700">
        <div class="p-1.5 rounded-full bg-emerald-500/20"><i data-lucide="check" class="w-4 h-4 text-emerald-400" id="toast-icon"></i></div>
        <span class="font-medium text-sm" id="toast-msg"></span>
    </div>

    <script>
        const UNIT_LESSONS = {
            'I'  : ['1. 컴퓨팅 시스템의 이해','2. 운영체제','3. HW와 SW 구성','4. 피지컬 컴퓨팅 기초','5. 마이크로비트','6. 센서 기반 프로그래밍'],
            'II' : ['1. 디지털 데이터 표현','2. 문자와 이미지 인코딩','3. 소리와 동영상 데이터','4. 데이터 수집','5. 데이터 구조화','6. 데이터 분석(CODAP)'],
            'III': ['1. 문제 분석과 추상화','2. 알고리즘 설계','3. 순서도와 의사코드','4. 순차 구조','5. 선택 구조','6. 반복 구조','7. 변수와 연산','8. 리스트','9. 함수','10. 프로젝트'],
            'IV' : ['1. 인공지능의 이해','2. 머신러닝 원리','3. 이미지 분류(티처블머신)','4. 소리와 텍스트 분류','5. AI 윤리','6. 개인정보 보호'],
            'V'  : ['1. 디지털 시민의식','2. 저작권','3. 개인정보','4. 사이버폭력 예방','5. 미디어 리터러시','6. 올바른 인터넷 사용'],
        };
        let currentUnitFilter   = 'all';
        let currentLessonFilter = 'all';

        function setUnitFilter(unit) {
            currentUnitFilter   = unit;
            currentLessonFilter = 'all';
            // 버튼 스타일
            ['all','I','II','III','IV','V'].forEach(u => {
                const btn = document.getElementById('uf-'+u);
                if (!btn) return;
                btn.className = u===unit
                    ? 'text-xs font-bold px-3 py-1.5 rounded-full bg-teal-500 text-white transition-all'
                    : 'text-xs font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 hover:bg-teal-50 hover:text-teal-600 transition-all';
            });
            // 소단원 선택 표시/숨김
            const wrap = document.getElementById('unit-lesson-filter-wrap');
            const sel  = document.getElementById('lesson-filter');
            if (unit !== 'all' && UNIT_LESSONS[unit]) {
                sel.innerHTML = '<option value="all">전체 소단원</option>' +
                    UNIT_LESSONS[unit].map((l,i) => `<option value="${i+1}">${l}</option>`).join('');
                wrap.classList.remove('hidden'); wrap.classList.add('flex');
            } else {
                wrap.classList.add('hidden'); wrap.classList.remove('flex');
            }
            renderCurrentTab();
        }

        function getUnitFromRecord(r) {
            // completed: unit 필드 직접
            if (r.unit) return r.unit;
            // activities/selfchecks: lessonKey 형식 'lXX' → 단원 추정
            const key = (r.lessonKey || '').toLowerCase();
            if (key.startsWith('l1')) return 'I';
            if (key.startsWith('l2')) return 'II';
            if (key.startsWith('l3')) return 'III';
            if (key.startsWith('l4')) return 'IV';
            if (key.startsWith('l5')) return 'V';
            return '';
        }

        function getLessonNumFromRecord(r) {
            if (r.lessonNum) return String(r.lessonNum);
            const key = (r.lessonKey || '').replace(/[^0-9]/g,'');
            return key ? String(parseInt(key.slice(-2)||key)) : '';
        }
        const STORAGE_KEY  = 'learning_gs_url';
        const firebaseConfig = { apiKey:"AIzaSyAIiqU7pLdcibQM3u7Jy88-jSZahIM_jMM", authDomain:"book-c2d05.firebaseapp.com", projectId:"book-c2d05", storageBucket:"book-c2d05.firebasestorage.app", messagingSenderId:"566939045493", appId:"1:566939045493:web:da65c6ad61f528d446f23c" };
        const app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);
        let GS_URL = localStorage.getItem(STORAGE_KEY) || '';
        let allData = { completed: [], activities: [], selfchecks: [] };
        let currentTab = 'completed';

        auth.onAuthStateChanged(user => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('access-denied').classList.remove('hidden');
                document.getElementById('access-denied').classList.add('flex');
                lucide.createIcons(); return;
            }
            document.getElementById('admin-name').textContent = user.displayName || user.email.split('@')[0];
            lucide.createIcons();
            if (GS_URL) {
                document.getElementById('gs-url-input').value = GS_URL;
                loadData();
            }
        });

        async function handleSignOut() { await auth.signOut(); window.location.href = 'index.html'; }

        function saveGsUrl() {
            const url = document.getElementById('gs-url-input').value.trim();
            if (!url || !url.includes('script.google.com')) { showToast('올바른 Apps Script URL을 입력해주세요.', 'error'); return; }
            GS_URL = url;
            localStorage.setItem(STORAGE_KEY, url);
            loadData();
            showToast('URL이 저장되었습니다! 데이터를 불러옵니다.');
        }

        // ── 데이터 로드 ───────────────────────────────────────
        function loadData() {
            if (!GS_URL) {
                document.getElementById('student-summary').innerHTML =
                    `<p class="text-xs text-slate-400 text-center py-4">위에서 Apps Script URL을 먼저 입력해주세요.</p>`;
                return;
            }

            // 학생 요약
            const s1 = document.createElement('script');
            s1.src = `${GS_URL}?action=getSummary&callback=__summaryCb&_=${Date.now()}`;
            const old1 = document.getElementById('jsonp-summary'); if (old1) old1.remove();
            s1.id = 'jsonp-summary';
            document.body.appendChild(s1);

            // 상세 기록
            const s2 = document.createElement('script');
            s2.src = `${GS_URL}?action=getRecords&callback=__recordsCb&_=${Date.now()}`;
            const old2 = document.getElementById('jsonp-records'); if (old2) old2.remove();
            s2.id = 'jsonp-records';
            document.body.appendChild(s2);
        }

        window.__summaryCb = function(data) {
            const el = document.getElementById('student-summary');
            const list = data.summary || [];
            document.getElementById('stat-students').textContent = list.length;
            if (!list.length) {
                el.innerHTML = `<div class="py-8 flex flex-col items-center space-y-2 text-slate-400"><i data-lucide="inbox" class="w-7 h-7 text-slate-300"></i><p class="text-xs font-medium">학습 기록이 없습니다.</p></div>`;
                lucide.createIcons(); return;
            }
            el.innerHTML = `<div class="space-y-2">
                ${list.map(s => `
                <div class="flex items-center justify-between p-3.5 bg-slate-50 hover:bg-white border border-slate-100 hover:border-teal-100 rounded-2xl transition-all cursor-pointer"
                    onclick="filterByStudent('${s.name.replace(/'/g,"\\'")}')">
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 bg-teal-100 text-teal-700 rounded-xl flex items-center justify-center font-black text-xs">
                            ${s.name.charAt(0)}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${s.name}</p>
                            <p class="text-xs text-slate-400">최근: ${s.latest ? String(s.latest).substring(0,10) : '-'}</p>
                        </div>
                    </div>
                    <span class="text-xs font-black text-teal-600 bg-teal-50 px-2.5 py-1 rounded-full">${s.count}완료</span>
                </div>`).join('')}
            </div>`;
            lucide.createIcons();
        };

        window.__recordsCb = function(data) {
            allData.activities  = (data.activities  || []).reverse();
            allData.selfchecks  = (data.selfchecks  || []).reverse();
            allData.completed   = (data.completed   || []).reverse();

            document.getElementById('stat-completed').textContent  = allData.completed.length;
            document.getElementById('stat-activities').textContent = allData.activities.length;
            document.getElementById('stat-selfchecks').textContent = allData.selfchecks.length;

            renderCurrentTab();
        };

        function switchTab(tab) {
            currentTab = tab;
            ['completed','activities','selfchecks'].forEach(t => {
                const btn = document.getElementById('tab-'+t);
                btn.className = t===tab
                    ? 'tab-btn active text-xs font-bold px-3 py-1.5 rounded-lg'
                    : 'tab-btn text-xs font-bold px-3 py-1.5 rounded-lg text-slate-500';
            });
            document.getElementById('record-search').value = '';
            renderCurrentTab();
        }

        function filterByStudent(name) {
            switchTab('completed');
            document.getElementById('record-search').value = name;
            renderCurrentTab();
        }

        function renderCurrentTab() {
            const q       = (document.getElementById('record-search').value || '').toLowerCase();
            const lessonF = (document.getElementById('lesson-filter') || {}).value || 'all';
            let rows = allData[currentTab] || [];

            // 학생명 검색
            if (q) rows = rows.filter(r => (r.userName||'').toLowerCase().includes(q));

            // 대단원 필터
            if (currentUnitFilter !== 'all') {
                rows = rows.filter(r => getUnitFromRecord(r) === currentUnitFilter);
            }

            // 소단원 필터
            if (lessonF !== 'all') {
                rows = rows.filter(r => getLessonNumFromRecord(r) === lessonF);
            }

            document.getElementById('record-count-label').textContent = `${rows.length}건`;

            const tbody = document.getElementById('record-tbody');
            if (!rows.length) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-slate-400 font-medium text-sm">${GS_URL ? '기록이 없습니다.' : 'Apps Script URL을 먼저 설정해주세요.'}</td></tr>`;
                return;
            }

            tbody.innerHTML = rows.map(r => {
                const unit    = getUnitFromRecord(r);
                const lessonN = getLessonNumFromRecord(r);
                let unitBadge = '', content = '';
                if (currentTab === 'completed') {
                    unitBadge = `<span class="bg-teal-50 text-teal-700 text-xs font-bold px-2 py-0.5 rounded-lg">단원 ${unit}</span>`;
                    content   = `소단원 ${r.lessonNum || lessonN} · ${r.lessonName || ''}`;
                } else {
                    unitBadge = unit ? `<span class="bg-slate-100 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-lg">단원 ${unit}</span>` : `<span class="text-xs font-medium text-slate-400">${r.lessonKey||''}</span>`;
                    content   = r.lessonName || r.lessonKey || '-';
                }
                const dateStr = r.date ? String(r.date).substring(0,16) : '-';
                return `<tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3.5 text-xs text-slate-400 font-medium whitespace-nowrap">${dateStr}</td>
                    <td class="px-4 py-3.5 font-bold text-slate-800 text-sm whitespace-nowrap">${r.userName || '-'}</td>
                    <td class="px-4 py-3.5 text-slate-500 font-medium text-sm whitespace-nowrap">${r.studentId || '-'}</td>
                    <td class="px-4 py-3.5">${unitBadge}</td>
                    <td class="px-4 py-3.5 text-slate-600 font-medium text-sm">${content}</td>
                </tr>`;
            }).join('');
        }

        // ── 토스트 ─────────────────────────────────────────────
        let toastTimeout;
        function showToast(message, type='success') {
            const toast=document.getElementById('toast'), icon=document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent=message;
            icon.className=type==='error'?'w-4 h-4 text-rose-400':'w-4 h-4 text-emerald-400';
            icon.setAttribute('data-lucide',type==='error'?'alert-circle':'check'); lucide.createIcons();
            clearTimeout(toastTimeout); toast.classList.remove('translate-y-32','opacity-0');
            toastTimeout=setTimeout(()=>toast.classList.add('translate-y-32','opacity-0'),4000);
        }

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
